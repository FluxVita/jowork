# CLA Assistant configuration
# https://github.com/cla-assistant/cla-assistant
#
# To activate: install the CLA Assistant GitHub App at https://cla-assistant.io
# and link it to the fluxvita/jowork repository.
#
# The CLA text is stored in a GitHub Gist; update the `claUrl` after creating it.

remote: https://cla-assistant.io

# URL to the CLA text gist (create at https://gist.github.com)
# Replace with the actual gist URL after publishing.
claUrl: https://gist.github.com/fluxvita/jowork-cla

# Minimum GitHub account age in days required to sign
minAccountAge: 0

# Users/bots exempt from CLA signing
allowlist:
  - dependabot
  - renovate[bot]
  - github-actions[bot]

# Message shown on PR when CLA has not been signed
prMessage: >
  Thank you for your pull request!

  Before we can merge this contribution, we need you to sign our
  **Contributor License Agreement (CLA)**.

  Please visit [cla-assistant.io/fluxvita/jowork](https://cla-assistant.io/fluxvita/jowork)
  to sign the CLA with your GitHub account. It only takes a minute, and you only need
  to do it once.

  If you have any questions, see our [CONTRIBUTING.md](./CONTRIBUTING.md) or
  reach out on [Discord](https://discord.gg/jowork).
