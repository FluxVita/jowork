<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FluxVita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #c6f135;
      letter-spacing: -0.5px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #333;
      border-top-color: #c6f135;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      font-size: 14px;
      color: #666;
    }

    .error-msg {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.7;
      display: none;
    }

    .error-msg span { color: #f87171; }

    .retry-btn {
      display: none;
      margin-top: 4px;
      padding: 8px 20px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 8px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: border-color 0.15s;
    }
    .retry-btn:hover { border-color: #c6f135; color: #c6f135; }
  </style>
</head>
<body>
  <div class="logo">FluxVita</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">正在连接服务器...</div>
  <div class="error-msg" id="errorMsg">
    <span>无法连接到 Gateway</span><br>
    请检查网络，或在设置中修改连接地址
  </div>
  <button class="retry-btn" id="retryBtn" onclick="retry()">重试</button>
  <button class="retry-btn" id="settingsBtn" onclick="openSettings()" style="display:none">修改地址</button>

  <script>
    // 由 Tauri 在连接失败时通知此页面显示错误状态
    // 也可独立运行（用于健康检查失败后的离线页面）
    const { listen } = window.__TAURI__?.event ?? {};
    const { invoke } = window.__TAURI__?.core ?? {};

    async function retry() {
      showConnecting();
      try {
        const status = await invoke('check_health');
        if (status.online) {
          const settings = await invoke('get_settings');
          location.href = settings.gateway_url;
        } else {
          showError();
        }
      } catch (_) {
        showError();
      }
    }

    function showConnecting() {
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('msg').style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
    }

    function showError() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('retryBtn').style.display = 'block';
      document.getElementById('settingsBtn').style.display = 'block';
    }

    async function openSettings() {
      try {
        await invoke('open_settings');
      } catch (_) {}
    }

    // 监听健康检查事件
    listen?.('health-status', ({ payload }) => {
      if (payload.online) {
        invoke?.('get_settings').then(s => { location.href = s.gateway_url; });
      } else {
        showError();
      }
    });
  </script>
</body>
</html>
