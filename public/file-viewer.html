<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件预览</title>
<script src="/theme.js"></script>
<script src="/lib/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  background: #141416;
  color: rgba(255,255,255,0.85);
}
#root { height: 100vh; overflow-y: auto; overflow-x: hidden; }
#root::-webkit-scrollbar { width: 5px; }
#root::-webkit-scrollbar-track { background: transparent; }
#root::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ─── MD 正文 ─── */
.md-body {
  padding: 28px 40px;
  max-width: 820px;
  margin: 0 auto;
  color: rgba(255,255,255,0.85);
  line-height: 1.75;
  user-select: text;
}
.md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6 {
  color: #fff; margin: 1.5em 0 0.5em; line-height: 1.3; font-weight: 600;
}
.md-body h1 { font-size: 1.8em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: .4em; }
.md-body h2 { font-size: 1.4em; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: .3em; }
.md-body h3 { font-size: 1.15em; }
.md-body p { margin: .75em 0; }
.md-body a { color: #9DD84A; text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body code {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; padding: 1px 5px;
  font-family: 'JetBrains Mono','Menlo',monospace; font-size: .88em; color: #9DD84A;
}
.md-body pre {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 16px; overflow-x: auto; margin: 1em 0;
}
.md-body pre code { background: none; border: none; padding: 0; color: rgba(255,255,255,0.85); font-size: .9em; }
.md-body blockquote {
  border-left: 3px solid rgba(157,216,74,.5); padding: 4px 0 4px 16px;
  margin: 1em 0; color: rgba(255,255,255,.5);
}
.md-body ul,.md-body ol { padding-left: 1.5em; margin: .6em 0; }
.md-body li { margin: .25em 0; }
.md-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.md-body th,.md-body td { border: 1px solid rgba(255,255,255,.1); padding: 8px 12px; text-align: left; }
.md-body th { background: rgba(255,255,255,.06); font-weight: 600; }
.md-body img { max-width: 100%; border-radius: 6px; }
.md-body hr { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 2em 0; }

/* ─── HTML frame ─── */
.html-frame { width: 100%; height: 100vh; border: none; background: #fff; display: block; }

/* ─── 状态提示 ─── */
.status {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; gap: 10px;
  color: rgba(255,255,255,.25); font-size: 13px;
}
.status.error { color: rgba(255,100,100,.7); }

/* ─── 日间模式 ─── */
[data-theme="light"] body { background: #f5f5f2; }
[data-theme="light"] #root { scrollbar-color: rgba(0,0,0,0.1) transparent; }
[data-theme="light"] #root::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); }
[data-theme="light"] .md-body { color: rgba(0,0,0,0.8); }
[data-theme="light"] .md-body h1,[data-theme="light"] .md-body h2,[data-theme="light"] .md-body h3,
[data-theme="light"] .md-body h4,[data-theme="light"] .md-body h5,[data-theme="light"] .md-body h6 { color: #1a1a1e; }
[data-theme="light"] .md-body h1 { border-bottom-color: rgba(0,0,0,0.1); }
[data-theme="light"] .md-body h2 { border-bottom-color: rgba(0,0,0,0.07); }
[data-theme="light"] .md-body code { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: #5a8a1a; }
[data-theme="light"] .md-body pre { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
[data-theme="light"] .md-body pre code { color: rgba(0,0,0,0.8); }
[data-theme="light"] .md-body blockquote { color: rgba(0,0,0,0.45); border-left-color: rgba(90,138,26,0.5); }
[data-theme="light"] .md-body th,.md-body td { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .md-body th { background: rgba(0,0,0,0.04); }
[data-theme="light"] .md-body hr { border-top-color: rgba(0,0,0,0.1); }
[data-theme="light"] .status { color: rgba(0,0,0,0.25); }
[data-theme="light"] .status.error { color: rgba(180,0,0,0.7); }
</style>
</head>
<body>
<div id="root"><div class="status">⏳ 加载中...</div></div>
<script>
const params = new URLSearchParams(location.search);
const filePath = params.get('path');
const ext = filePath ? filePath.split('.').pop().toLowerCase() : '';
let token = null;
let loaded = false;

window.addEventListener('message', (e) => {
  if (e.data?.type === 'SHELL_TOKEN' && e.data.token && !loaded) {
    token = e.data.token;
    loadFile();
  }
});
window.parent.postMessage({ type: 'REQUEST_TOKEN' }, '*');

// 降级：从 localStorage 读 token
setTimeout(() => {
  if (!token) {
    const stored = localStorage.getItem('jowork_token');
    if (stored) { token = stored; loadFile(); }
  }
}, 600);

async function loadFile() {
  if (loaded) return;
  loaded = true;

  if (!filePath) {
    setStatus('未指定文件路径', true);
    return;
  }

  try {
    const resp = await fetch(`/api/files/content?path=${encodeURIComponent(filePath)}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(txt || `HTTP ${resp.status}`);
    }
    const { content } = await resp.json();
    render(content);
  } catch (e) {
    setStatus('加载失败: ' + e.message, true);
  }
}

function render(content) {
  const root = document.getElementById('root');
  if (ext === 'md' || ext === 'markdown') {
    const div = document.createElement('div');
    div.className = 'md-body';
    div.innerHTML = marked.parse(content);
    div.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
    root.innerHTML = '';
    root.appendChild(div);
  } else {
    // html：srcdoc 沙盒预览
    const iframe = document.createElement('iframe');
    iframe.className = 'html-frame';
    iframe.sandbox = 'allow-scripts allow-same-origin';
    iframe.srcdoc = content;
    root.innerHTML = '';
    root.appendChild(iframe);
  }
}

function setStatus(msg, isError) {
  const root = document.getElementById('root');
  root.innerHTML = `<div class="status${isError ? ' error' : ''}">${msg}</div>`;
}
</script>
</body>
</html>
