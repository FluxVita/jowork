<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="x-app-id" content="fluxvita">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxVita</title>
<link rel="stylesheet" href="/styles/tokens.css">
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<style>
/* ── Shell 专用颜色层级 ── */
:root {
  --sh-bg:      #0f0f12;
  --sh-sidebar: #18181b;
  --sh-card:    #252528;
  --sh-sep:     rgba(255,255,255,0.09);
}
[data-theme="light"] {
  --sh-bg:      #f0f0ed;
  --sh-sidebar: #e8e8e4;
  --sh-card:    #ffffff;
  --sh-sep:     rgba(0,0,0,0.09);
}

html, body {
  height: 100%; margin: 0; padding: 0;
  background: var(--sh-bg);
  color: var(--text);
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════
   登录蒙层
   ═══════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background-color: var(--sh-bg);
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  display: none; align-items: center; justify-content: center;
}
[data-theme="light"] #login-screen {
  background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
}

.login-box {
  background: rgba(37, 37, 40, 0.88);
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-radius: var(--radius-lg, 14px);
  padding: 36px 32px 32px;
  width: 340px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
  position: relative;
  overflow: hidden;
}
[data-theme="light"] .login-box {
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid rgba(0,0,0,0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.8) inset;
}
/* 顶部品牌色条 */
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gradient-brand, linear-gradient(90deg,#9DD84A,#5CC8D8,#C4B8E8,#E8A898));
}

.login-logo {
  width: 52px; height: 52px; border-radius: 13px;
  object-fit: cover; margin: 0 auto 18px; display: block;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
}
[data-theme="light"] .login-logo {
  box-shadow: 0 4px 16px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.06);
}

.login-box h1 {
  font-size: 18px; font-weight: 700;
  color: var(--text); margin: 0 0 6px; letter-spacing: -0.4px;
}
.login-box p { color: var(--text2); font-size: 13px; margin: 0 0 24px; line-height: 1.55; }

.btn-primary {
  background: var(--accent, #9DD84A); color: #0a0a0b;
  border: none; border-radius: var(--radius-sm, 7px); padding: 11px;
  font-size: 14px; font-weight: 600;
  width: 100%; cursor: pointer; font-family: inherit;
  transition: opacity .15s, box-shadow .15s;
  box-shadow: 0 3px 14px rgba(157,216,74,0.28);
}
.btn-primary:hover { opacity: .9; box-shadow: 0 5px 20px rgba(157,216,74,0.4); }
.btn-primary:active { opacity: .76; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

.dev-login { margin-top: 16px; }
.dev-login a { color: var(--text2); font-size: 12px; text-decoration: none; opacity: 0.6; transition: opacity .15s; }
.dev-login a:hover { opacity: 1; }
.dev-form { margin-top: 10px; display: none; }
.dev-form input {
  width: 100%; padding: 9px 12px; margin-bottom: 7px; box-sizing: border-box;
  background: rgba(255,255,255,0.04); border: 1px solid var(--sh-sep);
  border-radius: var(--radius-sm, 7px); color: var(--text); font-size: 13px;
  outline: none; font-family: inherit; transition: border-color .15s;
}
.dev-form input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(157,216,74,0.18);
}
[data-theme="light"] .dev-form input { background: rgba(0,0,0,0.04); }
[data-theme="light"] .dev-form input:focus {
  box-shadow: 0 0 0 3px rgba(90,138,26,0.15);
}
.login-error { color: var(--red, #ff5a72); font-size: 12px; margin-top: 10px; display: none; }

/* ═══════════════════════════════════════
   主壳
   ═══════════════════════════════════════ */
#app { display: none; flex-direction: row; height: 100vh; }

/* ═══════════════════════════════════════
   Sidebar
   ═══════════════════════════════════════ */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--sh-sidebar);
  border-right: 1px solid var(--sh-sep);
  display: flex; flex-direction: column;
  height: 100%; overflow: hidden;
  -webkit-user-select: none; user-select: none;
  -webkit-app-region: drag;
  transition: width .22s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.sidebar.collapsed { width: 54px; }

/* 折叠按钮 */
.collapse-btn {
  flex-shrink: 0; width: 22px; height: 22px;
  border-radius: 5px; border: none; background: transparent;
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s, color .1s, transform .22s cubic-bezier(0.16, 1, 0.3, 1);
  -webkit-app-region: no-drag;
  margin-left: auto;
}
.collapse-btn:hover { background: var(--accent-bg, rgba(157,216,74,0.08)); color: var(--accent); }
.sidebar.collapsed .collapse-btn { transform: rotate(180deg); display: none; }

/* 折叠状态 */
.sidebar.collapsed .sidebar-brand { justify-content: center; padding-left: 0; padding-right: 0; }
.sidebar.collapsed .brand-text { display: none; }
.sidebar.collapsed .nav-group-label { display: none; }
.sidebar.collapsed .action-btn-label { display: none; }
.sidebar.collapsed .sidebar-user-name { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 0; font-size: 0; }
.sidebar.collapsed .nav-item-icon { width: auto; }
.sidebar.collapsed .sidebar-actions { flex-direction: column; padding: 6px 8px 2px; gap: 2px; }
.sidebar.collapsed .action-btn { flex-direction: row; justify-content: center; padding: 8px 0; }
.sidebar.collapsed .sidebar-user-row { justify-content: center; padding: 10px 4px 8px; }
.sidebar.collapsed .sidebar-user-info { display: none; }
.sidebar.collapsed .brand-logo {
  width: 28px; height: 28px; border-radius: 7px; cursor: pointer;
  transition: box-shadow .15s, transform .15s;
}
.sidebar.collapsed .brand-logo:hover { box-shadow: 0 0 0 2px rgba(157,216,74,0.5); transform: scale(1.06); }
.sidebar.collapsed .status-dot { display: none; }
.sidebar.collapsed .nav-item.active::before { display: none; }
.sidebar.collapsed .sidebar-resize-handle { display: none; }

/* 品牌区 */
.sidebar-brand {
  flex-shrink: 0; padding: 16px 14px 12px;
  display: flex; align-items: center; gap: 10px;
  -webkit-app-region: no-drag;
}
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand {
  padding-top: 28px; -webkit-app-region: drag;
}
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand * { -webkit-app-region: no-drag; }
html[data-platform="tauri"].fullscreen .sidebar-brand { padding-top: 16px; }
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand {
  background: rgba(22,22,25,0.88) !important;
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
}
html[data-platform="tauri"][data-theme="light"]:not(.fullscreen) .sidebar-brand {
  background: rgba(232,232,228,0.92) !important;
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
}

.brand-logo {
  width: 34px; height: 34px; border-radius: 9px;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.45);
}
.brand-text { flex: 1; min-width: 0; }
.brand-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; line-height: 1.2; }
.brand-sub { font-size: 10.5px; color: var(--text2); opacity: 0.65; margin-top: 1px; }

.sidebar-divider { height: 1px; background: var(--sh-sep); margin: 0 0 4px; flex-shrink: 0; }

/* Resize handle */
.sidebar-resize-handle {
  position: absolute; right: -4px; top: 0; bottom: 0;
  width: 8px; cursor: ew-resize; z-index: 10;
  -webkit-app-region: no-drag; transition: background .15s;
}
.sidebar-resize-handle:hover,
.sidebar-resize-handle.dragging { background: rgba(157,216,74,0.25); }

/* 导航区 */
.sidebar-nav {
  flex: 1; overflow-y: auto; padding: 4px 8px 4px;
  -webkit-app-region: no-drag; scrollbar-width: none;
}
.sidebar-nav::-webkit-scrollbar { display: none; }

.nav-group { margin-bottom: 4px; }
.nav-group-label {
  font-size: 10px; font-weight: 600;
  color: var(--text2); opacity: 0.55;
  text-transform: uppercase; letter-spacing: 0.4px;
  padding: 12px 8px 4px; display: block;
}
.nav-group:first-child .nav-group-label { padding-top: 2px; }

.nav-item {
  position: relative;
  display: flex; align-items: center; gap: 8px;
  padding: 0 9px; height: 30px;
  border-radius: 7px; cursor: pointer;
  border: none; background: transparent;
  width: 100%; text-align: left;
  font-size: 13px; color: var(--text2); font-weight: 500;
  letter-spacing: -0.15px;
  transition: background .1s, color .1s;
  -webkit-app-region: no-drag; white-space: nowrap;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active {
  background: var(--accent-bg, rgba(157,216,74,0.08));
  color: var(--text); font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 1px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px; background: var(--accent);
}

.nav-item-icon {
  width: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.65; transition: opacity .1s, color .1s;
  color: var(--text2);
}
.nav-item.active .nav-item-icon { opacity: 1; color: var(--accent); }
.nav-item:hover .nav-item-icon { opacity: 1; color: inherit; }

[data-theme="light"] .nav-item:hover { background: rgba(0,0,0,0.05); }
[data-theme="light"] .nav-item.active { background: rgba(90,138,26,0.09); }
[data-theme="light"] .nav-item.active::before { background: var(--accent2, #5a8a1a); }
[data-theme="light"] .nav-item.active .nav-item-icon { color: var(--accent2, #5a8a1a); }

/* 底部区域 */
.sidebar-footer { flex-shrink: 0; -webkit-app-region: no-drag; }

.sidebar-actions {
  display: flex; gap: 4px;
  padding: 6px 10px 2px;
  border-top: 1px solid var(--sh-sep);
}
.action-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 7px 4px;
  border-radius: 8px; border: none;
  background: transparent;
  color: var(--text2); font-family: inherit; cursor: pointer;
  transition: background .12s, color .12s;
}
.action-btn:hover {
  background: rgba(255,255,255,0.07);
  color: var(--text);
}
.action-btn.danger:hover {
  background: var(--red-bg, rgba(255,77,106,0.08));
  color: var(--red, #ff4d6a);
}
.action-btn-icon {
  line-height: 1; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.action-btn-label { font-size: 9.5px; letter-spacing: 0.1px; line-height: 1; }

[data-theme="light"] .action-btn { background: transparent; }
[data-theme="light"] .action-btn:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.78); }
[data-theme="light"] .action-btn.danger:hover { background: rgba(220,53,69,0.06); color: #dc3545; }

/* Gateway 状态圆点 */
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.14); flex-shrink: 0; transition: background .3s;
}
.status-dot.online {
  background: var(--accent);
  animation: status-pulse 2.5s ease-out infinite;
}
@keyframes status-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(157,216,74,0.55); }
  60%  { box-shadow: 0 0 0 5px rgba(157,216,74,0);    }
  100% { box-shadow: 0 0 0 0   rgba(157,216,74,0);    }
}
.status-dot.offline { background: var(--red, #ff4d6a); }
[data-theme="light"] .status-dot { background: rgba(0,0,0,0.14); }

/* Offline banner */
.offline-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9997;
  background: rgba(220,40,40,0.11);
  border-bottom: 1px solid rgba(255,100,80,0.18);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  align-items: center; gap: 8px;
  padding: 6px 16px; font-size: 12px; color: var(--red, #ff4d6a);
  animation: banner-slide-down .22s ease-out;
}
@keyframes banner-slide-down {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
.offline-banner-msg { flex: 1; }
.offline-retry {
  padding: 3px 10px; background: transparent;
  border: 1px solid rgba(255,100,80,0.3); border-radius: 5px;
  color: var(--red, #ff4d6a); font-size: 11px; cursor: pointer;
  font-family: inherit; transition: background .12s;
}
.offline-retry:hover { background: rgba(255,100,80,0.1); }
[data-theme="light"] .offline-banner {
  background: rgba(255,59,48,0.07);
  border-bottom-color: rgba(255,59,48,0.15);
}

/* 用户行 */
.sidebar-user-row {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 14px 8px;
  border-top: 1px solid var(--sh-sep);
  cursor: pointer; border-radius: 0 0 8px 8px; transition: background .1s;
}
.sidebar-user-row:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .sidebar-user-row:hover { background: rgba(0,0,0,0.04); }
.sidebar-user-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent-bg); border: 1.5px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 700; color: var(--accent); flex-shrink: 0;
}
.sidebar-user-name {
  flex: 1; font-size: 12.5px; color: var(--text2); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Tooltip（折叠时） */
.nav-tooltip {
  position: fixed; z-index: 9999;
  background: rgba(52, 52, 56, 0.97);
  border: none;
  color: var(--text); font-size: 12px; font-weight: 500;
  padding: 4px 9px; border-radius: 5px;
  pointer-events: none; opacity: 0; transition: opacity .12s;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.07);
  transform: translateY(-50%);
}
.nav-tooltip.visible { opacity: 1; }
[data-theme="light"] .nav-tooltip {
  background: rgba(248, 248, 248, 0.98);
  border: none;
  color: rgba(0,0,0,0.82);
  box-shadow: 0 2px 8px rgba(0,0,0,0.16), 0 0 0 0.5px rgba(0,0,0,0.08);
}

/* 面板切换 fade-in */
@keyframes panelFadeIn {
  from { opacity: 0; transform: scale(0.985); }
  to   { opacity: 1; transform: scale(1); }
}
.panel-frame.fade-in {
  animation: panelFadeIn .22s cubic-bezier(0.16, 1, 0.3, 1);
  transform-origin: center top;
}

/* ═══════════════════════════════════════
   文件树侧边栏
   ═══════════════════════════════════════ */
#file-tree-panel {
  width: 0; flex-shrink: 0; overflow: hidden;
  border-right: 0px solid var(--sh-sep);
  transition: width .22s cubic-bezier(0.16, 1, 0.3, 1);
  background: var(--sh-sidebar); position: relative;
}
#file-tree-panel.open { width: 260px; border-right-width: 1px; }
#file-tree-panel > iframe { width: 260px; height: 100%; border: none; display: block; }

/* ═══════════════════════════════════════
   内容区
   ═══════════════════════════════════════ */
.content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Tab 栏 */
.panel-tabbar {
  display: none; align-items: center; gap: 2px;
  padding: 0 8px; height: 36px; flex-shrink: 0;
  background: rgba(13,13,16,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--sh-sep);
  -webkit-app-region: drag;
  -webkit-user-select: none; user-select: none;
}
.panel-tabbar.visible { display: flex; }
[data-theme="light"] .panel-tabbar { background: rgba(240,240,237,0.92); }

.panel-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 7px;
  border: none; background: transparent;
  color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit; letter-spacing: -0.1px;
  transition: background .12s, color .12s;
  -webkit-app-region: no-drag;
}
.panel-tab:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.panel-tab.active { color: var(--text); background: rgba(255,255,255,0.1); font-weight: 600; }
.panel-tab-icon { display: flex; align-items: center; }
.panel-tab-close {
  width: 14px; height: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px; font-size: 13px; line-height: 1;
  color: var(--text2); margin-left: 3px;
  transition: color .1s, background .1s; pointer-events: all;
}
.panel-tab-close:hover { color: var(--text); background: rgba(255,255,255,0.1); }
[data-theme="light"] .panel-tab { color: rgba(0,0,0,0.4); }
[data-theme="light"] .panel-tab:hover { color: rgba(0,0,0,0.72); background: rgba(0,0,0,0.05); }
[data-theme="light"] .panel-tab.active { color: rgba(0,0,0,0.88); background: rgba(0,0,0,0.08); }
[data-theme="light"] .panel-tab-close { color: rgba(0,0,0,0.25); }
[data-theme="light"] .panel-tab-close:hover { color: rgba(0,0,0,0.7); background: rgba(0,0,0,0.08); }

/* 面板区 */
.panels { flex: 1; position: relative; overflow: hidden; background: var(--sh-bg); }
.panel-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: transparent; }
.panel-frame.active { display: block; }

/* CSS 加载指示器（旋转圆弧） */
.panel-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--sh-bg);
  pointer-events: none; transition: opacity .3s;
}
.panel-loading::after {
  content: '';
  width: 24px; height: 24px;
  border: 2px solid rgba(255,255,255,0.07);
  border-top-color: var(--accent, #9DD84A);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
[data-theme="light"] .panel-loading::after {
  border-color: rgba(0,0,0,0.07);
  border-top-color: var(--accent2, #5a8a1a);
}
.panel-loading.hidden { opacity: 0; pointer-events: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 更新提示条 */
.update-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--sh-card); border: 1px solid var(--accent-border, rgba(157,216,74,0.18));
  border-radius: var(--radius-md, 10px); padding: 10px 18px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 9999;
  animation: slideUp .3s cubic-bezier(0.16, 1, 0.3, 1);
}
.update-bar.hidden { display: none !important; }
.update-version { color: var(--accent); font-weight: 600; }
.update-btn {
  padding: 5px 12px; background: var(--accent); color: #0a0a0b;
  border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.update-dismiss {
  padding: 5px 8px; background: transparent; border: none;
  color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
</head>
<body>

<!-- ── 登录蒙层 ── -->
<div id="login-screen">
  <div class="login-box">
    <img class="login-logo" src="/jovida-logo.png" alt="FluxVita">
    <h1>FluxVita</h1>
    <p>内部数据与 AI 协作平台</p>
    <button class="btn-primary" id="oauth-btn" onclick="startOAuthLogin()">使用飞书账号登录</button>
    <div id="login-error" class="login-error"></div>
    <div class="dev-login" id="dev-login-section" style="display:none">

<script>
const API = '';
let token = localStorage.getItem('fluxvita_token');
let currentUser = null;
let activePanel = 'chat';
const loadedPanels = new Set();
const openFileTabs = new Map(); // fileId → { path, name, ext }

// ── 主题 ──
ThemeManager.initShell();

// ── Sidebar 折叠 ──
const SIDEBAR_KEY = 'fv_sidebar_collapsed';

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const collapsed = sidebar.classList.toggle('collapsed');
  localStorage.setItem(SIDEBAR_KEY, collapsed ? '1' : '0');
  document.getElementById('collapse-btn').title = collapsed ? '展开侧边栏' : '折叠侧边栏';
}

// 初始化折叠状态
if (localStorage.getItem(SIDEBAR_KEY) === '1') {
  document.querySelector('.sidebar').classList.add('collapsed');
  const btn = document.getElementById('collapse-btn');
  if (btn) btn.title = '展开侧边栏';
}

// 折叠时 logo 点击展开
document.getElementById('brand-logo').addEventListener('click', () => {
  if (document.querySelector('.sidebar').classList.contains('collapsed')) toggleSidebar();
});

// ── Sidebar 宽度拖动调整 ──
(function () {
  const sidebar = document.querySelector('.sidebar');
  const handle = document.getElementById('sidebar-resize');
  const MIN_W = 160, MAX_W = 400, W_KEY = 'fv_sidebar_width';

  const savedW = parseInt(localStorage.getItem(W_KEY));
  if (savedW && !sidebar.classList.contains('collapsed')) sidebar.style.width = savedW + 'px';

  handle.addEventListener('mousedown', (e) => {
    if (sidebar.classList.contains('collapsed')) return;
    e.preventDefault();
    handle.classList.add('dragging');
    const startX = e.clientX, startW = sidebar.offsetWidth;
    function onMove(e) {
      sidebar.style.width = Math.min(MAX_W, Math.max(MIN_W, startW + e.clientX - startX)) + 'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      localStorage.setItem(W_KEY, sidebar.offsetWidth);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── 折叠时自定义 tooltip ──
(function () {
  const tooltip = document.getElementById('nav-tooltip');
  const sidebar = document.querySelector('.sidebar');
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('mouseenter', (e) => {
      if (!sidebar.classList.contains('collapsed')) return;
      const label = btn.title;
      if (!label) return;
      const rect = btn.getBoundingClientRect();
      tooltip.textContent = label;
      tooltip.style.left = (rect.right + 10) + 'px';
      tooltip.style.top = (rect.top + rect.height / 2) + 'px';
      tooltip.classList.add('visible');
    });
    btn.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });
})();

// ── Gateway 状态检查 ──
let gatewayChecked = false;
function setGatewayStatus(online) {
  gatewayChecked = true;
  const dot = document.getElementById('status-dot');
  if (dot) {
    dot.className = 'status-dot ' + (online ? 'online' : 'offline');
    dot.title = online ? 'Gateway 在线' : 'Gateway 离线';
  }
  const banner = document.getElementById('offline-banner');
  if (banner) banner.style.display = (!online && token) ? 'flex' : 'none';
}
async function checkGatewayStatus() {
  try {
    const r = await fetch(API + '/health', { signal: AbortSignal.timeout(4000) });
    setGatewayStatus(r.ok);
  } catch { setGatewayStatus(false); }
}
function startGatewayMonitor() {
  checkGatewayStatus();
  setInterval(checkGatewayStatus, 30000);
}

// ── 键盘快捷键 ──
const PANEL_SHORTCUT = ['chat', 'dashboard', 'aiservices', 'admin', 'chat'];
document.addEventListener('keydown', (e) => {
  if (!token) return;
  const meta = e.metaKey || e.ctrlKey;
  if (meta && e.key >= '1' && e.key <= '5') {
    e.preventDefault();
    const panel = PANEL_SHORTCUT[parseInt(e.key) - 1];
    if (panel) switchPanel(panel);
  }
  if (meta && e.key === '\\') { e.preventDefault(); toggleSidebar(); }
});

const THEME_ICONS = {
  auto: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="5.5"/><line x1="8" y1="2.5" x2="8" y2="13.5" stroke-width="2.2"/></svg>`,
  light: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="2.6"/><path d="M8 2v1.8M8 12.2V14M2 8h1.8M12.2 8H14M3.88 3.88l1.27 1.27M10.85 10.85l1.27 1.27M10.85 5.15l1.27-1.27M3.88 12.12l1.27-1.27"/></svg>`,
  dark: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13.5 9.5A6 6 0 017 3.5a5.5 5.5 0 100 9 6 6 0 006.5-3z"/></svg>`,
};

function updateThemeBtn() {
  const pref = ThemeManager.getPreference();
  const btn = document.querySelector('.action-btn[onclick="toggleTheme()"]');
  if (btn) btn.querySelector('.action-btn-icon').innerHTML = THEME_ICONS[pref] || THEME_ICONS.auto;
}

function toggleTheme() {
  ThemeManager.toggle();
  updateThemeBtn();
}

// ── 语言切换 ──
function updateLangBtn() {
  const locale = window.__jowork_locale || localStorage.getItem('jowork_locale') || 'zh';
  const icon = document.getElementById('lang-toggle-icon');
  const label = document.getElementById('lang-toggle-label');
  if (!icon || !label) return;
  if (locale === 'zh') { icon.textContent = '中'; label.textContent = 'EN'; }
  else { icon.textContent = 'EN'; label.textContent = '中'; }
}
function toggleLocale() {
  const current = window.__jowork_locale || localStorage.getItem('jowork_locale') || 'zh';
  const next = current === 'zh' ? 'en' : 'zh';
  try { localStorage.setItem('jowork_locale', next); } catch { /* ignore */ }
  location.reload();
}
updateLangBtn();

// ── 启动：检测 dev 登录 ──
fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
  .then(r => r.json()).then(d => {
    if (d.hint && d.hint.includes('DEV_DIRECT_LOGIN_ENABLED')) {
      const el = document.getElementById('dev-login-section');
      if (el) el.style.display = '';
    }
  }).catch(() => {});

// ── Onboarding 检查 ──
// 有 token → 直接验证进入（老用户换浏览器不应再走 onboarding）
// 无 token → 去 onboarding 做首次登录引导
if (!token) {
  location.replace('/onboarding.html');
} else {
  verifyAndEnter();
}

async function verifyAndEnter() {
  try {
    const resp = await fetch(API + '/api/auth/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    currentUser = data.user;
    if (data.feishu_verified === false) {
      console.warn('[auth] Token not feishu_verified. AI features will be restricted.');
    }
    localStorage.setItem('fv_onboarding_done', '1');
    enterApp();
  } catch {
    token = null;
    localStorage.removeItem('fluxvita_token');
    localStorage.removeItem('fluxvita_user');
    localStorage.removeItem('fv_onboarding_done');
    location.replace('/onboarding.html');
  }
}

// ── 登录 ──
async function startOAuthLogin() {
  const btn = document.getElementById('oauth-btn');
  btn.disabled = true; btn.textContent = '正在跳转...';
  try {
    const resp = await fetch(API + '/api/auth/oauth/url');
    const data = await resp.json();
    if (data.url) { location.href = data.url; }
    else { showLoginError('无法获取授权链接'); btn.disabled = false; btn.textContent = '使用飞书账号登录'; }
  } catch { showLoginError('网络连接失败'); btn.disabled = false; btn.textContent = '使用飞书账号登录'; }
}

async function devLogin() {
  const openId = document.getElementById('dev-open-id').value.trim();
  const name = document.getElementById('dev-name').value.trim();
  if (!openId || !name) { showLoginError('请填写 Open ID 和姓名'); return; }
  try {
    const resp = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feishu_open_id: openId, name }),
    });
    const data = await resp.json();
    if (data.challenge_id && data.dev_code) {
      const resp2 = await fetch(API + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ feishu_open_id: openId, name, challenge_id: data.challenge_id, code: data.dev_code }),
      });
      const data2 = await resp2.json();
      if (data2.token) {
        token = data2.token; currentUser = data2.user;
        localStorage.setItem('fluxvita_token', token);
        enterApp();
      } else { showLoginError(data2.error || '验证失败'); }
    } else if (data.token) {
      token = data.token; currentUser = data.user;
      localStorage.setItem('fluxvita_token', token);
      enterApp();
    } else { showLoginError(data.error || '登录失败'); }
  } catch { showLoginError('网络连接失败'); }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('fluxvita_token');
  localStorage.removeItem('fluxvita_user');
  localStorage.removeItem('fv_onboarding_done');
  localStorage.removeItem('fv_oauth_just_done');
  location.replace('/onboarding.html');
}


// ── Toast 通知 ──
function showToast(msg, type = 'info') {
  const toast = document.createElement('div');
  toast.textContent = msg;
  Object.assign(toast.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: type === 'success' ? 'var(--accent, #9dd84a)' : 'rgba(40,40,44,0.95)',
    color: type === 'success' ? '#111' : 'var(--text, #e8e8e8)',
    padding: '10px 20px', borderRadius: '10px', fontSize: '13px', fontWeight: '500',
    boxShadow: '0 4px 20px rgba(0,0,0,0.3)', zIndex: '9999',
    transition: 'opacity 0.3s', opacity: '1',
  });
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function forceReload() {
  document.querySelectorAll('.panel-frame').forEach(f => { f.src = 'about:blank'; });
  loadedPanels.clear();
  const frame = document.getElementById(`frame-${activePanel}`);
  if (frame) {
    const src = frame.dataset.src;
    const ts = Date.now();
    const sep = src.includes('?') ? '&' : '?';
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    frame.onload = () => {
      injectToken(frame);
      setTimeout(() => injectToken(frame), 200);
      loading.classList.add('hidden');
    };
    frame.src = src + sep + '_t=' + ts + '#token=' + encodeURIComponent(token || '');
    loadedPanels.add(activePanel);
  }
}

// ── 进入主界面 ──
async function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  const name = currentUser?.name || '?';
  document.getElementById('user-chip').textContent = name;
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();

  await ServicesGuard.ready;
  document.querySelectorAll('[data-service]').forEach(el => {
    const svcId = el.getAttribute('data-service');
    if (svcId && !ServicesGuard.hasService(svcId)) {
      el.style.display = 'none';
    }
  });

  switchPanel('chat');
  updateThemeBtn();
  startGatewayMonitor();
  if (localStorage.getItem(FILE_TREE_KEY) === '1') toggleFileTree();
}

// ── 文件树侧边栏 toggle ──
const FILE_TREE_KEY = 'fv_file_tree_open';
let fileTreeLoaded = false;

function toggleFileTree() {
  if (!token) return;
  const panel = document.getElementById('file-tree-panel');
  const btn = document.getElementById('files-tree-btn');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  localStorage.setItem(FILE_TREE_KEY, isOpen ? '1' : '0');

  if (isOpen && !fileTreeLoaded) {
    fileTreeLoaded = true;
    const frame = document.getElementById('frame-files-tree');
    frame.onload = () => {
      injectToken(frame);
      setTimeout(() => injectToken(frame), 300);
    };
    frame.src = '/files.html#token=' + encodeURIComponent(token || '');
  } else if (isOpen) {
    injectToken(document.getElementById('frame-files-tree'));
  }
}

document.getElementById('files-tree-btn').addEventListener('click', toggleFileTree);

// ── 导航切换 ──
document.querySelectorAll('.nav-item[data-panel]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!token) return;
    switchPanel(btn.dataset.panel);
  });
});

function switchPanel(name) {
  if (name === 'geek') { switchSubPanel('geek'); return; }
  if (activePanel === name && loadedPanels.has(name)) return;
  activePanel = name;

  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.panel === name));

  const tabbar = document.getElementById('panel-tabbar');
  tabbar.classList.toggle('visible', name === 'chat' || openFileTabs.size > 0);

  document.querySelectorAll('.panel-frame').forEach(f => {
    const isActive = f.id === `frame-${name}`;
    f.classList.toggle('active', isActive);
    if (isActive) { f.classList.remove('fade-in'); void f.offsetWidth; f.classList.add('fade-in'); }
  });

  if (!loadedPanels.has(name)) {
    loadedPanels.add(name);
    const frame = document.getElementById(`frame-${name}`);
    const src = frame.dataset.src;
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    frame.onload = () => {
      injectToken(frame);
      setTimeout(() => injectToken(frame), 200);
      loading.classList.add('hidden');
    };
    frame.src = src + '#token=' + encodeURIComponent(token || '');
  }
}

// ── AI 助手子面板切换（对话 / 终端）──
function switchSubPanel(name) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.panel === 'chat'));
  document.getElementById('panel-tabbar').classList.add('visible');

  document.getElementById('tab-chat').classList.toggle('active', name === 'chat');
  document.getElementById('tab-geek').classList.toggle('active', name === 'geek');

  ['chat', 'geek'].forEach(p => {
    const f = document.getElementById(`frame-${p}`);
    f.classList.toggle('active', p === name);
    if (p === name) { f.classList.remove('fade-in'); void f.offsetWidth; f.classList.add('fade-in'); }
  });

  activePanel = name;

  if (name === 'geek' && !loadedPanels.has('geek')) {
    loadedPanels.add('geek');
    const frame = document.getElementById('frame-geek');
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    frame.onload = () => {
      injectToken(frame);
      setTimeout(() => injectToken(frame), 200);
      loading.classList.add('hidden');
    };
    frame.src = frame.dataset.src + '#token=' + encodeURIComponent(token || '');
  }
}

function injectToken(frame) {
  try {
    frame.contentWindow.postMessage({ type: 'SHELL_TOKEN', token, user: currentUser }, '*');
  } catch {}
}

window.addEventListener('message', (e) => {
  if (e.data?.type === 'REQUEST_TOKEN') {
    const allFrames = [
      ...document.querySelectorAll('.panel-frame'),
      document.getElementById('frame-files-tree'),
    ].filter(Boolean);
    allFrames.forEach(f => {
      try { if (f.contentWindow === e.source) injectToken(f); } catch {}
    });
  }
  if (e.data?.type === 'LOGOUT') logout();
  if (e.data?.type === 'relogin') {
    localStorage.removeItem('fluxvita_token');
    token = null;
    startOAuthLogin();
  }
  if (e.data?.type === 'NAVIGATE') {
    const panel = e.data.panel;
    if (panel) switchPanel(panel);
  }
  if (e.data?.type === 'OPEN_FILE') {
    openFileTab(e.data);
  }
});

// ── 文件标签页 ──
function _fileTabId(path) {
  let h = 5381;
  for (let i = 0; i < path.length; i++) h = ((h << 5) + h) ^ path.charCodeAt(i);
  return 'file_' + (h >>> 0).toString(36);
}

function openFileTab({ path, name, ext }) {
  const fileId = _fileTabId(path);

  if (openFileTabs.has(fileId)) {
    activateFileTab(fileId);
    return;
  }

  const icon = (ext === 'md' || ext === 'markdown') ? '📝' : '🌐';
  const tabBtn = document.createElement('button');
  tabBtn.className = 'panel-tab';
  tabBtn.id = `tab-${fileId}`;
  tabBtn.innerHTML =
    `<span class="panel-tab-icon">${icon}</span><span>${name}</span>` +
    `<span class="panel-tab-close" data-file-id="${fileId}">×</span>`;
  tabBtn.addEventListener('click', (e) => {
    if (e.target.classList.contains('panel-tab-close')) {
      closeFileTab(e.target.dataset.fileId);
    } else {
      activateFileTab(fileId);
    }
  });
  document.getElementById('panel-tabbar').appendChild(tabBtn);

  const frame = document.createElement('iframe');
  frame.className = 'panel-frame';
  frame.id = `frame-${fileId}`;
  frame.onload = () => {
    injectToken(frame);
    setTimeout(() => injectToken(frame), 200);
  };
  frame.src = `/file-viewer.html?path=${encodeURIComponent(path)}`;
  const panels = document.getElementById('panels');
  panels.insertBefore(frame, document.getElementById('panel-loading'));

  openFileTabs.set(fileId, { path, name, ext });
  activateFileTab(fileId);
}

function activateFileTab(fileId) {
  activePanel = fileId;
  document.querySelectorAll('.nav-item').forEach(b =>
    b.classList.toggle('active', b.dataset.panel === 'chat'));
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${fileId}`)?.classList.add('active');
  document.querySelectorAll('.panel-frame').forEach(f => f.classList.remove('active'));
  const frame = document.getElementById(`frame-${fileId}`);
  if (frame) {
    frame.classList.add('active');
    frame.classList.remove('fade-in'); void frame.offsetWidth; frame.classList.add('fade-in');
  }
  document.getElementById('panel-tabbar').classList.add('visible');
}

function closeFileTab(fileId) {
  const wasActive = activePanel === fileId;
  openFileTabs.delete(fileId);
  document.getElementById(`tab-${fileId}`)?.remove();
  document.getElementById(`frame-${fileId}`)?.remove();

  if (wasActive) {
    const remaining = [...openFileTabs.keys()];
    if (remaining.length > 0) {
      activateFileTab(remaining[remaining.length - 1]);
    } else {
      switchSubPanel('chat');
    }
  }
}

// ── Tauri 事件 ──
if (window.__TAURI__) {
  window.__TAURI__.event.listen('health-status', (event) => {
    setGatewayStatus(event.payload.online);
  });
}

// ── Tauri 自动更新 ──
if (window.__TAURI__) {
  window.__TAURI__.event.listen('update-available', (event) => {
    const { version } = event.payload;
    document.getElementById('update-version').textContent = `v${version}`;
    document.getElementById('update-bar').classList.remove('hidden');
  });
}
async function doUpdate() {
  if (!window.__TAURI__) return;
  document.querySelector('.update-btn').textContent = '更新中...';
  try {
    await window.__TAURI__.core.invoke('install_update');
  } catch (e) {
    alert('更新失败：' + e);
    document.querySelector('.update-btn').textContent = '立即更新';
  }
}

// ── Tauri 全屏状态检测 ──
if (window.__TAURI__) {
  const appWin = window.__TAURI__.window.getCurrentWindow();
  async function syncFullscreen() {
    const isFs = await appWin.isFullscreen();
    document.documentElement.classList.toggle('fullscreen', isFs);
  }
  syncFullscreen();
  appWin.listen('tauri://resize', syncFullscreen);
  appWin.listen('tauri://enter-full-screen', () => document.documentElement.classList.add('fullscreen'));
  appWin.listen('tauri://leave-full-screen', () => document.documentElement.classList.remove('fullscreen'));
}

// ── Tauri 原生拖动（sidebar 区域）──
if (window.__TAURI__) {
  document.querySelector('.sidebar').addEventListener('mousedown', async (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('button, a, input, .nav-item, .action-btn, .sidebar-footer')) return;
    try {
      await window.__TAURI__.window.getCurrentWindow().startDragging();
    } catch (_) {}
  });
}
