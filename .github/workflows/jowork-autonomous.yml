name: Jowork Autonomous Dev

on:
  workflow_dispatch:
  schedule:
    # fallback：每 3 小时检查一次，防止自触发链断掉
    - cron: '0 */3 * * *'

permissions:
  contents: write   # git push
  actions: write    # 触发下一轮 workflow_dispatch

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: setup-pnpm
        uses: pnpm/action-setup@v4
        # ⚠️ 不写 version，由 package.json 的 packageManager 字段决定

      - name: install-deps
        run: pnpm install --frozen-lockfile

      - name: install-claude
        run: npm install -g @anthropic-ai/claude-code

      - name: setup-git
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          TOKEN=${{ secrets.GITHUB_TOKEN }}
          git remote set-url origin \
            "https://x-access-token:${TOKEN}@github.com/FluxVita/jowork.git"

      - name: dev-loop
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset CLAUDECODE
          bash .github/scripts/dev-loop.sh

      - name: trigger-next-run
        # ⚠️ if: always() 确保即使 dev-loop 出错也能触发下一轮
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/trigger-next.sh
