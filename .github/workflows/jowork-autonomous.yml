name: Jowork Autonomous Dev

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: check-pending
        id: check
        run: |
          PENDING=$(python3 -c "
          text = open('docs/JOWORK-PLAN.md').read()
          print(text.count('- [ ]'))
          ")
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"
          echo "Pending tasks: $PENDING"

      - name: run-claude
        if: ${{ steps.check.outputs.pending != '0' }}
        uses: grll/claude-code-action@beta
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_oauth: true
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
          secrets_admin_pat: ${{ secrets.SECRETS_ADMIN_PAT }}
          max_turns: "200"
          timeout_minutes: "420"
          direct_prompt: |
            你是一名全栈工程师，在 fluxvita_allinone 的 main 分支上开发 Jowork。

            工作流程（循环直到没有待做任务）：
            1. 读 docs/JOWORK-PLAN.md，找第一个 - [ ] 任务
            2. 理解任务要求（查阅 openclaw-main/ 复用已有代码）
            3. 实现功能，TypeScript strict，ESM，pnpm workspaces
            4. 运行验证：pnpm install && pnpm --filter <包名> build
            5. 把 - [ ] 改为 - [x]
            6. git add -A && git commit -m "feat(jowork): <任务描述>"
            7. 回到第 1 步，继续下一个任务

            允许修改：packages/ apps/jowork/ docs/JOWORK-PLAN.md
            禁止修改：src/ src-tauri/ public/ .env master 分支

      - name: push-all-commits
        if: ${{ steps.check.outputs.pending != '0' }}
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          git pull --rebase origin main || true
          git push origin main || echo "Nothing to push"
