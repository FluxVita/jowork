name: Jowork Autonomous Dev

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: install-deps
        run: pnpm install --frozen-lockfile

      - name: install-claude
        run: npm install -g @anthropic-ai/claude-code

      - name: setup-git
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          TOKEN=${{ secrets.GITHUB_TOKEN }}
          git remote set-url origin \
            "https://x-access-token:${TOKEN}@github.com/FluxVita/jowork.git"

      - name: dev-loop
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset CLAUDECODE
          bash .github/scripts/dev-loop.sh
