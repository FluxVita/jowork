name: Jowork Autonomous Dev

on:
  workflow_dispatch:        # 手动触发（GitHub 页面点按钮）
  schedule:
    - cron: '0 */3 * * *'  # 每3小时自动触发一次

jobs:
  develop:
    runs-on: [self-hosted, macOS, jowork]  # 跑在你的 MacBook 上
    timeout-minutes: 150

    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 检查待完成任务
        id: check
        run: |
          PENDING=$(python3 -c "print(open('docs/JOWORK-PLAN.md').read().count('- [ ]'))")
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"
          echo "待完成任务: $PENDING"

      - name: 运行 Claude Code 自主开发
        if: steps.check.outputs.pending != '0'
        run: |
          unset CLAUDECODE
          claude \
            --dangerously-skip-permissions \
            --max-turns 80 \
            --output-format stream-json \
            --verbose \
            -p "$(cat .github/prompts/jowork-autonomous.md)" \
          | python3 -u -c "
import sys, json
for line in sys.stdin:
    line = line.strip()
    if not line:
        continue
    try:
        d = json.loads(line)
        t = d.get('type', '')
        if t == 'assistant':
            for block in d.get('message', {}).get('content', []):
                if block.get('type') == 'text' and block.get('text'):
                    print(block['text'][:300], flush=True)
                elif block.get('type') == 'tool_use':
                    name = block.get('name', '?')
                    inp = str(block.get('input', ''))[:100]
                    print(f'[工具] {name}: {inp}', flush=True)
        elif t == 'tool_result':
            content = d.get('content', '')
            if isinstance(content, list):
                content = ' '.join(c.get('text','') for c in content if c.get('type')=='text')
            print(f'[结果] {str(content)[:200]}', flush=True)
        elif t == 'result':
            print(f'[完成] turns={d.get(\"num_turns\",\"?\")}', flush=True)
    except Exception:
        print(line[:200], flush=True)
"

      - name: 提交并推送
        if: steps.check.outputs.pending != '0'
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          git add -A
          if ! git diff --cached --quiet; then
            DONE=$(python3 -c "print(open('docs/JOWORK-PLAN.md').read().count('- [x]'))")
            git commit -m "feat(jowork): 自主开发 — 已完成 ${DONE} 项 [skip ci]"
            git push
            echo "✅ 推送成功"
          else
            echo "本轮无新改动"
          fi

      - name: 全部完成
        if: steps.check.outputs.pending == '0'
        run: echo "🎉 所有任务已完成！"
