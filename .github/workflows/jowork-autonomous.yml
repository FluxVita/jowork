name: Jowork Autonomous Dev

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: install-deps
        run: pnpm install --frozen-lockfile

      - name: install-claude
        run: npm install -g @anthropic-ai/claude-code

      - name: setup-git
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          TOKEN=${{ secrets.GITHUB_TOKEN }}
          git remote set-url origin \
            "https://x-access-token:${TOKEN}@github.com/FluxVita/jowork.git"

      - name: dev-loop
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          unset CLAUDECODE
          ROUND=0
          MAX_ROUNDS=25
          PROMPT=$(cat .github/prompts/jowork-autonomous.md)

          while [ "$ROUND" -lt "$MAX_ROUNDS" ]; do
            PENDING=$(python3 -c "
          text = open('docs/JOWORK-PLAN.md').read()
          print(text.count('- [ ]'))
          ")
            echo "=== Round ${ROUND} | Pending: ${PENDING} ==="

            if [ "$PENDING" -eq 0 ]; then
              echo "All tasks completed!"
              break
            fi

            claude \
              --dangerously-skip-permissions \
              --max-turns 30 \
              -p "$PROMPT"

            git add -A
            if ! git diff --cached --quiet; then
              DONE=$(python3 -c "
          text = open('docs/JOWORK-PLAN.md').read()
          print(text.count('- [x]'))
          ")
              git commit \
                -m "feat(jowork): round=${ROUND} done=${DONE} [skip ci]"
              git push origin main
              echo "Pushed round ${ROUND}, done=${DONE}"
            else
              echo "No changes in round ${ROUND}"
            fi

            ROUND=$((ROUND + 1))
          done
