name: Jowork Autonomous Dev

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  develop:
    runs-on: [self-hosted, macOS, jowork]
    timeout-minutes: 480

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup-git
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          TOKEN=${{ secrets.GITHUB_TOKEN }}
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/FluxVita/jowork.git"

      - name: dev-loop
        run: |
          unset CLAUDECODE
          ROUND=0
          MAX_ROUNDS=30

          while [ "$ROUND" -lt "$MAX_ROUNDS" ]; do
            PENDING=$(python3 -c "
          text = open('docs/JOWORK-PLAN.md').read()
          print(text.count('- [ ]'))
          ")

            echo ""
            echo "=============================="
            echo "Round ${ROUND} | Pending: ${PENDING}"
            echo "=============================="

            if [ "$PENDING" -eq 0 ]; then
              echo "All tasks completed!"
              break
            fi

            PROMPT=$(cat .github/prompts/jowork-autonomous.md)
            claude \
              --dangerously-skip-permissions \
              --max-turns 30 \
              --output-format stream-json \
              --verbose \
              -p "$PROMPT" \
            | python3 -u .github/scripts/stream-parser.py

            git pull --rebase origin main || true
            git add -A
            if ! git diff --cached --quiet; then
              DONE=$(python3 -c "
          text = open('docs/JOWORK-PLAN.md').read()
          print(text.count('- [x]'))
          ")
              git commit -m "feat(jowork): round=${ROUND} done=${DONE} tasks [skip ci]"
              git push origin main
              echo "Pushed: done=${DONE}"
            else
              echo "No changes in round ${ROUND}"
            fi

            ROUND=$((ROUND + 1))
          done
