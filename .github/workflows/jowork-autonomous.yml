name: Jowork Autonomous Dev

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  develop:
    runs-on: [self-hosted, macOS, jowork]
    timeout-minutes: 150

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: check-pending
        id: check
        run: |
          PENDING=$(python3 -c "
          import re
          text = open('docs/JOWORK-PLAN.md').read()
          print(text.count('- [ ]'))
          ")
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"
          echo "Pending tasks: $PENDING"

      - name: run-claude
        if: ${{ steps.check.outputs.pending != '0' }}
        run: |
          unset CLAUDECODE
          PROMPT=$(cat .github/prompts/jowork-autonomous.md)
          claude \
            --dangerously-skip-permissions \
            --max-turns 80 \
            --output-format stream-json \
            --verbose \
            -p "$PROMPT" \
          | python3 -u .github/scripts/stream-parser.py

      - name: commit-and-push
        if: ${{ steps.check.outputs.pending != '0' }}
        run: |
          git config user.name "Jowork AI Dev"
          git config user.email "ai@fluxvita.com"
          git add -A
          if ! git diff --cached --quiet; then
            DONE=$(python3 -c "
            import re
            text = open('docs/JOWORK-PLAN.md').read()
            print(text.count('- [x]'))
            ")
            git commit -m "feat(jowork): auto-dev done=${DONE} [skip ci]"
            git push
            echo "Pushed successfully"
          else
            echo "No changes this round"
          fi

      - name: all-done
        if: ${{ steps.check.outputs.pending == '0' }}
        run: echo "All tasks completed!"
