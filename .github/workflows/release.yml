name: Release (macOS)

# 由 GitLab CI sync-github-tag job 推送 tag 时触发
# 前置条件：代码已通过 sync-github job 同步到 GitHub main
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # 创建 Release 需要写权限

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version into tauri.conf.json
        run: |
          BUILD_VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const v = process.env.BUILD_VERSION;
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
            console.log('tauri.conf.json version ->', v);
          "
        env:
          BUILD_VERSION: ${{ github.ref_name }}

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles app,dmg,updater

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
