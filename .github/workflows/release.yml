name: Release — Jowork macOS DMG

# 触发方式：
#   1. GitLab CI 的 sync-github-tag job 推 tag 到 GitHub → 自动触发
#   2. 手动在 GitHub 打 tag（v*.*.* 格式）
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

jobs:
  build-jowork-dmg:
    runs-on: macos-latest   # macos-14, Apple Silicon (arm64)
    permissions:
      contents: write       # 创建 GitHub Release 需要写权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/jowork/src-tauri -> target

      - name: Install dependencies
        run: pnpm install

      - name: Build Jowork DMG
        run: pnpm --filter @jowork/app tauri:build -- --bundles app,dmg
        env:
          # 可选：配置 Tauri 自动更新签名（在 GitHub Secrets 里设置）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jowork-macOS-${{ github.ref_name }}
          path: apps/jowork/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: apps/jowork/src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
