name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch_flag: "--arm64"
          - os: macos-13
            platform: mac
            arch_flag: "--x64"
          - os: windows-latest
            platform: win
            arch_flag: ""
          - os: ubuntu-latest
            platform: linux
            arch_flag: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 libsecret-1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm --filter @jowork/desktop build

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          cd apps/desktop
          npx electron-builder --${{ matrix.platform }} ${{ matrix.arch_flag }} --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jowork-${{ matrix.platform }}-${{ matrix.os }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/latest*.yml
          if-no-files-found: warn
