# Jowork — one-command Docker deployment
#
# Usage:
#   cp .env.example .env
#   # Edit .env — set ANTHROPIC_API_KEY
#   docker compose up -d
#
# Data is persisted in ./jowork-data/
# Access Jowork at http://localhost:18800

services:
  jowork:
    image: ghcr.io/fluxvita/jowork:latest
    # Or build locally:
    # build: .
    container_name: jowork
    restart: unless-stopped
    ports:
      - "18800:18800"
    volumes:
      - ./jowork-data:/app/data        # SQLite DB + uploads
      - ./jowork-logs:/app/logs        # Application logs
      - ./.env:/app/.env:ro            # Environment variables (read-only)
    environment:
      - NODE_ENV=production
      - JOWORK_IN_DOCKER=1
      - JOWORK_DATA_DIR=/app/data
      - JOWORK_LOG_DIR=/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18800/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Optional: resource limits
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: '1.0'
