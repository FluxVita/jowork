# FluxVita CI/CD Pipeline
#
# 触发规则：
#   push main/master      →  build-macos + publish-latest + deploy-gateway + sync-github
#   push tag v*.*.*       →  build-macos（正式版本）+ release + deploy-gateway
#
# 必须在 GitLab CI/CD > Variables 配置：
#   TAURI_SIGNING_PRIVATE_KEY          : Tauri 签名私钥内容（cat ~/.tauri/fluxvita.key）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD : 私钥密码（生成时设置的，留空则填空字符串）
#   GITLAB_ACCESS_TOKEN                : 有 api + write_repository 权限的 Personal Access Token
#   GATEWAY_PATH                       : Mac mini 上 Gateway 的绝对路径（如 /Users/jovida/Documents/...）
#   GITHUB_TOKEN                       : GitHub Personal Access Token（repo 写权限，用于同步开源代码）

stages:
  - check
  - build
  - release
  - deploy

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  GIT_DEPTH: "1"

# ═══════════════════════════════════════════════════════
# CHECK — 开源代码安全检查（每次 push 都触发，快速 fail-fast）
# ═══════════════════════════════════════════════════════

check-opensource:
  stage: check
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - bash scripts/check-opensource.sh --ci
  allow_failure: false   # 检查失败必须阻断后续所有 job


# ═══════════════════════════════════════════════════════
# BUILD — 打包客户端（master push 和 tag 都触发）
# ═══════════════════════════════════════════════════════

build-macos:
  stage: build
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
  cache:
    key: "macos-cargo-master"
    paths:
      - .cargo/registry/
      - src-tauri/target/release/.fingerprint/
  script:
    - command -v pnpm || npm install -g pnpm
    - echo "▶ Node $(node --version) | Rust $(rustc --version) | pnpm $(pnpm --version)"
    - pnpm install --frozen-lockfile
    - |
      # 动态计算版本号：tag 用 tag，master 用 0.1.{IID}
      if [ -n "$CI_COMMIT_TAG" ]; then
        BUILD_VERSION="${CI_COMMIT_TAG#v}"
      else
        BUILD_VERSION="0.1.${CI_PIPELINE_IID}"
      fi
      echo "▶ 构建版本 $BUILD_VERSION"
      echo "BUILD_VERSION=${BUILD_VERSION}" > build.env

      # 注入版本号到 tauri.conf.json
      export BUILD_VERSION
      node -e "
        const fs = require('fs');
        const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
        cfg.version = process.env.BUILD_VERSION;
        fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
        console.log('tauri.conf.json version ->', cfg.version);
      "
    - npx tauri build --bundles app,dmg,updater
    - |
      # 打印产物路径方便 debug
      DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1 || true)
      [ -n "$DMG" ] && echo "▶ DMG: $DMG" || echo "⚠ 未找到 DMG"
  artifacts:
    name: "FluxVita-macOS-${CI_PIPELINE_IID}"
    reports:
      dotenv: build.env
    paths:
      - src-tauri/target/release/bundle/dmg/*.dmg
      - src-tauri/target/release/bundle/macos/*.tar.gz
      - src-tauri/target/release/bundle/macos/*.tar.gz.sig
    expire_in: 90 days


# ═══════════════════════════════════════════════════════
# PUBLISH-LATEST — 上传到固定 "latest" 包槽（仅 master，方便下载最新 dev 包）
# ═══════════════════════════════════════════════════════

publish-latest:
  stage: release
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"'
      when: on_success
  needs:
    - job: build-macos
      artifacts: true
  script:
    - |
      DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1 || true)
      DMG_TAR=$(find src-tauri/target/release/bundle/macos -name "*.tar.gz" 2>/dev/null | head -1 || true)
      DMG_SIG=$(find src-tauri/target/release/bundle/macos -name "*.tar.gz.sig" 2>/dev/null | head -1 || true)

      if [ -z "$DMG" ]; then
        echo "⚠ 未找到 DMG，跳过 publish-latest"
        exit 0
      fi

      echo "▶ 发布 latest dev 包，版本 $BUILD_VERSION"

      # 删除旧 latest 包（先查 package ID，再删，忽略 404）
      PKG_ID=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=fluxvita-client-dev&package_version=latest&per_page=1" \
        | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" 2>/dev/null || true)

      if [ -n "$PKG_ID" ]; then
        echo "  删除旧 latest 包 (id=$PKG_ID)..."
        curl -s -X DELETE --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${PKG_ID}" || true
      fi

      # 上传 DMG
      LATEST_BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fluxvita-client-dev/latest"
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
        --upload-file "$DMG" "${LATEST_BASE}/FluxVita_latest_aarch64.dmg")
      if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
        echo "✗ DMG 上传失败 (HTTP $HTTP_STATUS)"; exit 1
      fi
      echo "✓ latest DMG 上传成功"

      # 上传 tar.gz（Tauri 自动更新器使用）
      if [ -n "$DMG_TAR" ]; then
        LATEST_TAR_URL="${LATEST_BASE}/FluxVita_latest_aarch64.app.tar.gz"
        curl -s -o /dev/null -w "  tar.gz 上传: %{http_code}\n" \
          --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
          --upload-file "$DMG_TAR" "$LATEST_TAR_URL"
      fi

      # 更新 latest.json（让 Tauri 自动更新器感知到新版本）
      if [ -n "$DMG_SIG" ] && [ -n "$DMG_TAR" ]; then
        MACOS_SIG=$(cat "$DMG_SIG")
        PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        cat > latest.json << EOF
      {
        "version": "${BUILD_VERSION}",
        "notes": "Dev build ${CI_PIPELINE_IID} (${CI_COMMIT_SHORT_SHA})",
        "pub_date": "${PUB_DATE}",
        "platforms": {
          "darwin-aarch64": {
            "signature": "${MACOS_SIG}",
            "url": "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/packages/generic/fluxvita-client-dev/latest/FluxVita_latest_aarch64.app.tar.gz"
          }
        }
      }
      EOF

        git config user.email "ci@jowork.dev"
        git config user.name "Jowork CI"
        git remote set-url origin "https://oauth2:${GITLAB_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git add latest.json
        git diff --cached --quiet || git commit -m "chore: update latest.json to ${BUILD_VERSION} [skip ci]"
        git push origin HEAD:master
        git remote set-url origin "https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        echo "✓ latest.json 已更新 → 用户 App 将收到自动更新通知"
      else
        echo "⚠ 未找到签名文件，latest.json 未更新（请确认 TAURI_SIGNING_PRIVATE_KEY 已配置）"
      fi

      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  最新 Dev 包下载地址（需登录 GitLab）："
      echo "  ${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/packages/generic/fluxvita-client-dev/latest/FluxVita_latest_aarch64.dmg"
      echo "  版本: $BUILD_VERSION  Pipeline: #${CI_PIPELINE_IID}"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"


# ═══════════════════════════════════════════════════════
# RELEASE — 正式发布（仅 tag 触发）
# ═══════════════════════════════════════════════════════

release:
  stage: release
  tags:
    - macos
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  needs:
    - job: build-macos
      artifacts: true
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "▶ 发布版本 $VERSION"

      # ── 上传 macOS DMG 到 Package Registry ──
      DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1 || true)
      DMG_SIG=$(find src-tauri/target/release/bundle/macos -name "*.tar.gz.sig" 2>/dev/null | head -1 || true)
      DMG_TAR=$(find src-tauri/target/release/bundle/macos -name "*.tar.gz" 2>/dev/null | head -1 || true)
      DMG_NAME="FluxVita_${VERSION}_aarch64.dmg"
      DMG_TAR_NAME="FluxVita_${VERSION}_aarch64.app.tar.gz"

      upload_pkg() {
        local file="$1" url="$2" label="$3"
        local status
        status=$(curl -s -o /dev/null -w "%{http_code}" \
                   --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
                   --upload-file "$file" "$url")
        case "$status" in
          201|200) echo "  ✓ $label 上传成功 ($status)" ;;
          409)     echo "  ℹ $label 已存在，跳过 (409)" ;;
          *)       echo "  ✗ $label 上传失败 (HTTP $status)"; return 1 ;;
        esac
      }

      if [ -n "$DMG" ]; then
        echo "▶ 上传 macOS DMG..."
        PKG_BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fluxvita-client/${VERSION}"
        upload_pkg "$DMG" "${PKG_BASE}/${DMG_NAME}" "macOS DMG"
        MACOS_DMG_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/packages/generic/fluxvita-client/${VERSION}/${DMG_NAME}"
        if [ -n "$DMG_TAR" ]; then
          upload_pkg "$DMG_TAR" "${PKG_BASE}/${DMG_TAR_NAME}" "macOS tar.gz"
          MACOS_TAR_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/packages/generic/fluxvita-client/${VERSION}/${DMG_TAR_NAME}"
          MACOS_SIG=$(cat "$DMG_SIG" 2>/dev/null || true)
        fi
        echo "✓ macOS 上传完成"
      fi

      # ── 生成 latest.json（仅在有签名包时才更新，否则跳过）──
      if [ -n "$MACOS_SIG" ]; then
        echo "▶ 更新 latest.json..."
        PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        cat > latest.json << EOF
      {
        "version": "${VERSION}",
        "notes": "${CI_COMMIT_TAG_MESSAGE:-版本 ${VERSION}}",
        "pub_date": "${PUB_DATE}",
        "platforms": {
          "darwin-aarch64": {
            "signature": "${MACOS_SIG}",
            "url": "${MACOS_TAR_URL}"
          }
        }
      }
      EOF

        git config user.email "ci@jowork.dev"
        git config user.name "Jowork CI"
        git remote set-url origin "https://oauth2:${GITLAB_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git add latest.json
        git diff --cached --quiet || git commit -m "chore: update latest.json to ${VERSION} [skip ci]"
        git push origin HEAD:master
        git remote set-url origin "https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        echo "✓ latest.json 已更新"
      else
        echo "⚠ 跳过 latest.json（无签名包，请配置 TAURI_SIGNING_PRIVATE_KEY）"
      fi

      # ── 创建 GitLab Release ──
      if [ -n "$MACOS_DMG_URL" ]; then
        echo "▶ 创建 GitLab Release..."
        LINKS_JSON="[{\"name\":\"macOS 安装包 (.dmg)\",\"url\":\"${MACOS_DMG_URL}\",\"link_type\":\"package\"}]"
        curl -s -X DELETE --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}" || true
        RELEASE_HTTP=$(curl -s -o /tmp/release_resp.json -w "%{http_code}" -X POST \
             --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
             --header "Content-Type: application/json" \
             --data "{\"name\":\"FluxVita ${CI_COMMIT_TAG}\",\"tag_name\":\"${CI_COMMIT_TAG}\",\"description\":\"版本 ${VERSION}\",\"assets\":{\"links\":${LINKS_JSON}}}" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
        if [ "$RELEASE_HTTP" = "201" ] || [ "$RELEASE_HTTP" = "200" ]; then
          echo "✓ GitLab Release 创建成功"
        else
          echo "✗ Release 创建失败 (HTTP $RELEASE_HTTP):"
          cat /tmp/release_resp.json
          exit 1
        fi
      fi


# ═══════════════════════════════════════════════════════
# DEPLOY — Mac mini 服务端自动部署（仅 main/master push 触发）
# ═══════════════════════════════════════════════════════

deploy-gateway:
  stage: deploy
  tags:
    - macos
    - deploy
  needs: []   # 不依赖 build-macos，Gateway 部署独立进行
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: always
  script:
    - bash "$CI_PROJECT_DIR/scripts/deploy.sh" "$CI_PROJECT_DIR"


# ═══════════════════════════════════════════════════════
# SYNC-GITHUB — 开源代码同步到 GitHub（仅 main/master push 触发）
#
# 安全策略：
#   1. 使用 rsync --exclude 保护 GitHub 独有文件，绝不删除/覆盖
#      保护列表：CLAUDE.md / README.zh.md / LICENSE / docs/ / .github/ / .claassistant.yml
#   2. 排除闭源目录：apps/fluxvita/ / packages/premium/
#   3. 普通 push，绝不 --force
#   4. 无变更时静默跳过，不产生空 commit
# ═══════════════════════════════════════════════════════

sync-github:
  stage: deploy
  tags:
    - macos
    - deploy
  needs:
    - deploy-gateway
  allow_failure: true   # GitHub 同步失败不阻断主流程
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: on_success
  script:
    - |
      # 克隆 GitHub 仓库
      SYNC_DIR="/tmp/gh-sync-${CI_PIPELINE_ID}"
      git clone "https://oauth2:${GITHUB_TOKEN}@github.com/FluxVita/jowork.git" "${SYNC_DIR}"
      cd "${SYNC_DIR}"
      git config user.email "ci@fluxvita.com"
      git config user.name "FluxVita CI"
    - |
      SYNC_DIR="/tmp/gh-sync-${CI_PIPELINE_ID}"
      # rsync 同步开源代码：
      #   --delete        : 删除目标中源没有的文件（仅在未 exclude 的路径内生效）
      #   --exclude       : 排除闭源目录 + GitHub 独有文件（不同步也不删除）
      rsync -av --delete \
        --exclude='.git/' \
        --exclude='apps/fluxvita/' \
        --exclude='packages/premium/' \
        --exclude='node_modules/' \
        --exclude='data/' \
        --exclude='logs/' \
        --exclude='log/' \
        --exclude='dist/' \
        --exclude='cache/' \
        --exclude='tauri-ui/' \
        --exclude='openclaw-main/' \
        --exclude='.env' \
        --exclude='*.db' \
        --exclude='test_data/' \
        --exclude='latest.json' \
        --exclude='CLAUDE.md' \
        --exclude='README.zh.md' \
        --exclude='LICENSE' \
        --exclude='docs/' \
        --exclude='.github/' \
        --exclude='.claassistant.yml' \
        --exclude='.gitlab-ci.yml' \
        --exclude='.mcp.json' \
        --exclude='.claude/' \
        --exclude='AGENTS.md' \
        --exclude='scripts/deploy.sh' \
        --exclude='scripts/install-app.sh' \
        --exclude='产品规划计划/' \
        --exclude='src-tauri/' \
        --exclude='public/' \
        "${CI_PROJECT_DIR}/" "${SYNC_DIR}/"
    - |
      SYNC_DIR="/tmp/gh-sync-${CI_PIPELINE_ID}"
      cd "${SYNC_DIR}"
      git add -A
      if git diff --staged --quiet; then
        echo "✓ 无变更，跳过 GitHub 同步"
      else
        git commit -m "sync: from GitLab ${CI_COMMIT_SHORT_SHA} [skip ci]"
        git push origin main
        echo "✓ 已同步到 GitHub (FluxVita/jowork)"
      fi
      rm -rf "${SYNC_DIR}"


# ═══════════════════════════════════════════════════════
# SYNC-GITHUB-TAG — tag 同步到 GitHub（触发 GitHub Actions 打包）
#
# 流程：GitLab push tag v*.*.* → 本 job 在 GitHub 打同名 tag
#       → 触发 GitHub Actions release.yml → GitHub 自动打包 DMG
# ═══════════════════════════════════════════════════════

sync-github-tag:
  stage: deploy
  tags:
    - macos
    - deploy
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: always
  script:
    - |
      TAG_DIR="/tmp/gh-tag-${CI_PIPELINE_ID}"
      git clone "https://oauth2:${GITHUB_TOKEN}@github.com/FluxVita/jowork.git" "${TAG_DIR}"
      cd "${TAG_DIR}"
      git config user.email "ci@fluxvita.com"
      git config user.name "FluxVita CI"
      if git tag "${CI_COMMIT_TAG}" 2>/dev/null; then
        git push origin "${CI_COMMIT_TAG}"
        echo "✓ Tag ${CI_COMMIT_TAG} 已推送到 GitHub，GitHub Actions 将开始打包"
      else
        echo "Tag ${CI_COMMIT_TAG} 在 GitHub 已存在，跳过"
      fi
      rm -rf "${TAG_DIR}"
