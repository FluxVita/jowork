<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="x-app-id" content="jowork">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jowork</title>
<link rel="stylesheet" href="/styles/tokens.css">
<!-- Vercel 部署时注入后端地址，本地运行时此文件不存在（忽略错误） -->
<script src="/runtime-config.js" onerror="void 0"></script>
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
/* ── Shell 专用颜色层级 ── */
:root {
  --sh-bg:      #0f0f12;
  --sh-sidebar: #18181b;
  --sh-card:    #252528;
  --sh-sep:     rgba(255,255,255,0.09);
}
[data-theme="light"] {
  --sh-bg:      #f0f0ed;
  --sh-sidebar: #e8e8e4;
  --sh-card:    #ffffff;
  --sh-sep:     rgba(0,0,0,0.09);
}

html, body {
  height: 100%; margin: 0; padding: 0;
  background: var(--sh-bg);
  color: var(--text);
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════
   Login screen
   ═══════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background-color: var(--sh-bg);
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  display: none; align-items: center; justify-content: center;
}
[data-theme="light"] #login-screen {
  background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
}

.login-box {
  background: rgba(37, 37, 40, 0.88);
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-radius: var(--radius-lg, 14px);
  padding: 36px 32px 32px;
  width: 340px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
  position: relative;
  overflow: hidden;
}
[data-theme="light"] .login-box {
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid rgba(0,0,0,0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.8) inset;
}
/* 顶部品牌色条 */
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gradient-brand, linear-gradient(90deg,#9DD84A,#5CC8D8,#C4B8E8,#E8A898));
}

/* 登录页 logo */
.login-logo-mark {
  width: 64px; height: 64px; border-radius: 16px;
  margin: 0 auto 18px;
  display: block; object-fit: contain;
}

.login-box h1 {
  font-size: 18px; font-weight: 700;
  color: var(--text); margin: 0 0 6px; letter-spacing: -0.4px;
}
.login-box p { color: var(--text2); font-size: 13px; margin: 0 0 22px; line-height: 1.55; }

.login-input {
  width: 100%; padding: 10px 12px; margin-bottom: 10px; box-sizing: border-box;
  background: rgba(255,255,255,0.04); border: 1px solid var(--sh-sep);
  border-radius: var(--radius-sm, 7px); color: var(--text); font-size: 14px;
  outline: none; font-family: inherit; transition: border-color .15s;
}
.login-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(157,216,74,0.18);
}
[data-theme="light"] .login-input { background: rgba(0,0,0,0.04); }
[data-theme="light"] .login-input:focus {
  box-shadow: 0 0 0 3px rgba(90,138,26,0.15);
}

.btn-primary {
  background: var(--accent, #9DD84A); color: #0a0a0b;
  border: none; border-radius: var(--radius-sm, 7px); padding: 11px;
  font-size: 14px; font-weight: 600;
  width: 100%; cursor: pointer; font-family: inherit;
  transition: opacity .15s, box-shadow .15s;
  box-shadow: 0 3px 14px rgba(157,216,74,0.28);
}
.btn-primary:hover { opacity: .9; box-shadow: 0 5px 20px rgba(157,216,74,0.4); }
.btn-primary:active { opacity: .76; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

.login-error {
  margin-top: 10px; padding: 8px 12px;
  background: var(--red-bg, rgba(255,59,48,0.1)); border-radius: var(--radius-sm, 7px);
  color: var(--red, #ff6b6b); font-size: 12px; display: none;
}

/* ═══════════════════════════════════════
   Sidebar
   ═══════════════════════════════════════ */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--glass-sidebar-dark, rgba(28,28,30,0.72));
  backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  -webkit-backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  border-right: 0.5px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  position: relative;
  transition: width .22s var(--ease-spring, cubic-bezier(0.16, 1, 0.3, 1));
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
}
[data-theme="light"] .sidebar {
  background: var(--glass-sidebar-light, rgba(242,242,239,0.82));
  border-right: 0.5px solid rgba(0,0,0,0.06);
}
.sidebar.collapsed { width: 54px; }

.sidebar-resize-handle {
  position: absolute; right: -3px; top: 0; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 20; transition: background .15s;
}
.sidebar-resize-handle:hover,
.sidebar-resize-handle.dragging { background: rgba(157,216,74,0.25); }
.sidebar.collapsed .sidebar-resize-handle { display: none; }

/* ── 专用拖拽覆盖层：覆盖侧边栏顶部 44px，让 macOS traffic light 旁边可以拖拽 ── */
.drag-zone {
  position: absolute; top: 0; left: 0; right: 0; height: 44px;
  -webkit-app-region: drag;
  z-index: 2;
  display: none; /* 非 Tauri 时隐藏 */
  pointer-events: auto;
}
html[data-platform="tauri"]:not(.fullscreen) .drag-zone { display: block; }

/* Brand */
.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 14px 12px; flex-shrink: 0;
}
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand { padding-top: 44px; }
html[data-platform="tauri"].fullscreen .sidebar-brand { padding-top: 14px; }
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand {
  -webkit-backdrop-filter: blur(40px) saturate(1.5);
  backdrop-filter: blur(40px) saturate(1.5);
  background: rgba(22,22,25,0.8) !important;
}
html[data-platform="tauri"][data-theme="light"]:not(.fullscreen) .sidebar-brand {
  background: rgba(232,232,228,0.85) !important;
}

/* Logo mark */
.brand-logo {
  width: 30px; height: 30px; border-radius: 8px;
  flex-shrink: 0; cursor: default; object-fit: contain;
}
.sidebar.collapsed .brand-logo { cursor: pointer; width: 30px; height: 30px; margin: 0 auto; }
.sidebar.collapsed .brand-logo:hover { opacity: .85; }

.brand-text { flex: 1; min-width: 0; }
.brand-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.brand-sub { font-size: 11px; color: var(--text2); opacity: 0.65; white-space: nowrap; }

.collapse-btn {
  background: transparent; border: none; cursor: pointer;
  color: var(--text2); padding: 2px; opacity: 0.6;
  border-radius: 5px; transition: opacity .12s, background .12s, transform .22s cubic-bezier(0.16,1,0.3,1);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  -webkit-app-region: no-drag; width: 20px; height: 20px;
}
.collapse-btn:hover { opacity: 1; background: var(--accent-bg, rgba(157,216,74,0.08)); color: var(--accent); }
.sidebar.collapsed .brand-text { display: none; }
.sidebar.collapsed .collapse-btn { display: none; }

.sidebar-divider { height: 0.5px; background: var(--sh-sep); margin: 0 10px; flex-shrink: 0; }
.sidebar.collapsed .sidebar-divider { margin: 0 8px; }

/* Nav */
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 8px; scrollbar-width: none; }
/* ::-webkit-scrollbar 移除 → WKWebView 恢复原生覆盖式滚动条；scrollbar-width:none 已隐藏侧边栏滚动条 */

.nav-group { margin-bottom: 4px; }
.nav-group-label {
  font-size: 10px; font-weight: 600; color: var(--text2); opacity: 0.5;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 8px 8px 4px; display: block;
}
.sidebar.collapsed .nav-group-label { display: none; }

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 0 9px; height: 30px;
  border-radius: 7px; border: none; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; width: 100%; text-align: left;
  transition: background .1s, color .1s; letter-spacing: -0.1px;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active {
  background: var(--accent-bg, rgba(157,216,74,0.08));
  color: var(--text); font-weight: 600;
}
.nav-item.active::before {
  content: ''; position: absolute; left: 1px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; background: var(--accent); border-radius: 2px;
}
.nav-item-icon {
  width: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.65; transition: opacity .1s, color .1s; color: var(--text2);
}
.nav-item.active .nav-item-icon { opacity: 1; color: var(--accent); }
.nav-item:hover .nav-item-icon { opacity: 1; color: inherit; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 0; font-size: 0; }
.sidebar.collapsed .nav-item.active::before { display: none; }
.sidebar.collapsed .nav-item-icon { width: auto; }

[data-theme="light"] .nav-item:hover { background: rgba(0,0,0,0.05); }
[data-theme="light"] .nav-item.active { background: rgba(90,138,26,0.09); }
[data-theme="light"] .nav-item.active::before { background: var(--accent2, #5a8a1a); }
[data-theme="light"] .nav-item.active .nav-item-icon { color: var(--accent2, #5a8a1a); }

/* Sidebar footer */
.sidebar-footer { flex-shrink: 0; padding: 6px 8px 10px; }
.sidebar-actions {
  display: flex; gap: 3px; margin-bottom: 6px;
  border-top: var(--separator, 0.5px solid rgba(255,255,255,0.07)); padding-top: 8px;
}
.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 6px 8px; border-radius: 7px; border: none; background: transparent;
  color: var(--text2); font-size: 12px;
  cursor: pointer; font-family: inherit;
  transition: background .1s, color .1s; flex: 1;
}
.action-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.action-btn.danger:hover { background: var(--red-bg, rgba(255,59,48,0.12)); color: var(--red, #ff6b6b); }
.action-btn-icon { display: flex; align-items: center; justify-content: center; line-height: 1; }
.action-btn-label { font-size: 11px; }
.sidebar.collapsed .action-btn-label { display: none; }
.sidebar.collapsed .action-btn { padding: 8px; }
[data-theme="light"] .action-btn { color: rgba(0,0,0,0.4); }
[data-theme="light"] .action-btn:hover { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.65); }

/* User row */
.sidebar-user-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 8px; cursor: pointer;
  transition: background .1s;
}
.sidebar-user-row:hover { background: rgba(255,255,255,0.05); }
[data-theme="light"] .sidebar-user-row:hover { background: rgba(0,0,0,0.05); }
.sidebar-user-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent-bg); border: 1.5px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0;
}
.sidebar-user-name {
  font-size: 12px; color: var(--text2); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.14); flex-shrink: 0;
}
.status-dot.online {
  background: var(--accent);
  animation: status-pulse 2.5s ease-out infinite;
}
@keyframes status-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(157,216,74,0.55); }
  60%  { box-shadow: 0 0 0 5px rgba(157,216,74,0);    }
  100% { box-shadow: 0 0 0 0   rgba(157,216,74,0);    }
}
.status-dot.offline { background: var(--red, #ff6b6b); }
.sidebar.collapsed .sidebar-user-name { display: none; }
.sidebar.collapsed .sidebar-user-row { justify-content: center; }
[data-theme="light"] .sidebar-user-avatar { background: rgba(90,138,26,0.1); border-color: rgba(90,138,26,0.2); color: #5a8a1a; }
[data-theme="light"] .sidebar-user-name { color: rgba(0,0,0,0.5); }
[data-theme="light"] .status-dot { background: rgba(0,0,0,0.14); }

/* Tooltip */
.nav-tooltip {
  position: fixed; z-index: 9999;
  background: rgba(30, 30, 32, 0.85);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.08);
  color: var(--text); font-size: 12px; font-weight: 500;
  padding: 4px 9px; border-radius: 6px;
  pointer-events: none; opacity: 0; transition: opacity .12s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(0,0,0,0.28);
  transform: translateY(-50%);
}
.nav-tooltip.visible { opacity: 1; }
[data-theme="light"] .nav-tooltip {
  background: rgba(248, 248, 248, 0.98);
  border: none;
  color: rgba(0,0,0,0.82);
  box-shadow: 0 2px 8px rgba(0,0,0,0.16), 0 0 0 0.5px rgba(0,0,0,0.08);
}

@keyframes panelFadeIn {
  from { opacity: 0; transform: scale(0.985); }
  to   { opacity: 1; transform: scale(1); }
}
.panel-frame.fade-in {
  animation: panelFadeIn .22s cubic-bezier(0.16, 1, 0.3, 1);
  transform-origin: center top;
}

/* File tree panel */
#file-tree-panel {
  width: 0; flex-shrink: 0; overflow: hidden;
  border-right: 0px solid var(--sh-sep);
  transition: width .22s var(--ease-spring, cubic-bezier(0.16, 1, 0.3, 1));
  background: var(--glass-sidebar-dark, rgba(28,28,30,0.72));
  backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  -webkit-backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  position: relative;
}
#file-tree-panel.open { width: 260px; border-right-width: 0.5px; }
#file-tree-panel > iframe { width: 260px; height: 100%; border: none; display: block; }

/* Content area — must stay opaque so sidebar glass shows through to desktop */
.content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--sh-bg); }

/* Tab bar (file tabs only) */
.panel-tabbar {
  display: none; align-items: center; gap: 2px; padding: 0 8px;
  height: 36px; flex-shrink: 0;
  background: rgba(13,13,16,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--sh-sep); -webkit-app-region: drag;
  -webkit-user-select: none; user-select: none;
}
.panel-tabbar.visible { display: flex; }
[data-theme="light"] .panel-tabbar { background: rgba(240,240,237,0.92); }

.panel-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 7px; border: none; background: transparent;
  color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit; letter-spacing: -.1px;
  transition: background .12s, color .12s; -webkit-app-region: no-drag;
}
.panel-tab:hover { color: var(--text); background: rgba(255,255,255,.06); }
.panel-tab.active { color: var(--text); background: rgba(255,255,255,.1); font-weight: 600; }
.panel-tab-icon { font-size: 11px; }
.panel-tab-close {
  width: 14px; height: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px; font-size: 13px; line-height: 1;
  color: var(--text2); margin-left: 3px;
  transition: color .1s, background .1s; pointer-events: all;
}
.panel-tab-close:hover { color: var(--text); background: rgba(255,255,255,.1); }
[data-theme="light"] .panel-tab { color: rgba(0,0,0,.4); }
[data-theme="light"] .panel-tab:hover { color: rgba(0,0,0,.72); background: rgba(0,0,0,.05); }
[data-theme="light"] .panel-tab.active { color: rgba(0,0,0,.88); background: rgba(0,0,0,.08); }

/* Panels */
.panels { flex: 1; position: relative; overflow: hidden; background: var(--sh-bg); }
.panel-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: transparent; }
.panel-frame.active { display: block; }

/* CSS loading spinner */
.panel-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--sh-bg);
  pointer-events: none; transition: opacity .3s;
}
.panel-loading::after {
  content: '';
  width: 24px; height: 24px;
  border: 2px solid rgba(255,255,255,0.07);
  border-top-color: var(--accent, #9DD84A);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
[data-theme="light"] .panel-loading::after {
  border-color: rgba(0,0,0,0.07);
  border-top-color: var(--accent2, #5a8a1a);
}
.panel-loading.hidden { opacity: 0; pointer-events: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Offline banner */
.offline-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9997;
  background: rgba(220,40,40,0.11);
  border-bottom: 1px solid rgba(255,100,80,0.18);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px; font-size: 12px; color: var(--red, #ff6b6b);
  animation: banner-slide-down .22s ease-out;
}
@keyframes banner-slide-down {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
.offline-banner-msg { flex: 1; }
.offline-retry {
  padding: 3px 10px; background: transparent;
  border: 1px solid rgba(255,100,80,0.3); border-radius: 5px;
  color: var(--red, #ff6b6b); font-size: 11px; cursor: pointer;
  font-family: inherit; transition: background .12s;
}
.offline-retry:hover { background: rgba(255,100,80,0.1); }
[data-theme="light"] .offline-banner {
  background: rgba(255,59,48,0.07);
  border-bottom-color: rgba(255,59,48,0.15);
}

/* Update bar */
.update-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--sh-card); border: 1px solid var(--accent-border, rgba(157,216,74,.18));
  border-radius: var(--radius-md, 10px); padding: 10px 18px;
  display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 9999;
  animation: slideUp .3s cubic-bezier(0.16,1,0.3,1);
}
.update-bar.hidden { display: none !important; }
.update-version { color: var(--accent); font-weight: 600; }
.update-btn { padding: 5px 12px; background: var(--accent); color: #0a0a0b; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.update-dismiss { padding: 5px 8px; background: transparent; border: none; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.btn-secondary {
  padding: 9px 16px; background: transparent; border: 1px solid var(--sh-sep);
  border-radius: 7px; color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: background .12s, color .12s;
}
.btn-secondary:hover { background: rgba(255,255,255,0.06); color: var(--text); }
[data-theme="light"] .btn-secondary { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .btn-secondary:hover { background: rgba(0,0,0,0.05); }

/* ═══════════════════════════════════════
   Settings modal
   ═══════════════════════════════════════ */
.settings-backdrop {
  position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; animation: fadeIn .18s ease-out;
}
.settings-dialog {
  background: var(--sh-card, #252528);
  border: 1px solid var(--sh-sep);
  border-radius: 14px;
  width: 420px; max-width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}
[data-theme="light"] .settings-dialog { background: #ffffff; border-color: rgba(0,0,0,0.08); }

.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 16px; border-bottom: 1px solid var(--sh-sep);
}
.settings-header h3 { margin: 0; font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
.settings-close {
  background: transparent; border: none; color: var(--text2); font-size: 18px;
  cursor: pointer; padding: 2px 6px; border-radius: 5px; line-height: 1;
  transition: color .12s, background .12s; font-family: inherit;
}
.settings-close:hover { color: var(--text); background: rgba(255,255,255,0.07); }

.settings-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }

.pref-row { display: flex; align-items: center; gap: 12px; }
.pref-row label { font-size: 13px; color: var(--text2); width: 120px; flex-shrink: 0; }
.pref-select {
  flex: 1; padding: 7px 10px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--sh-sep); border-radius: 7px; color: var(--text);
  font-size: 13px; font-family: inherit; cursor: pointer; outline: none;
  transition: border-color .12s;
}
.pref-select:focus { border-color: var(--accent); }
[data-theme="light"] .pref-select { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }

.pref-apikey {
  flex: 1; display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text2);
}
.btn-small {
  padding: 4px 10px; background: transparent; border: 1px solid var(--sh-sep);
  border-radius: 5px; color: var(--text2); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: background .12s, color .12s;
}
.btn-small:hover { background: rgba(255,255,255,0.07); color: var(--text); }
[data-theme="light"] .btn-small { border-color: rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div id="shell-root">
<script src="/services-guard.js"></script>

<!-- ── Login screen ── -->
<div id="login-screen">
  <div class="login-box">
    <img class="login-logo-mark" src="/app-icon.png" alt="Jowork">
    <h1>Jowork</h1>
    <p>Your AI work partner — runs locally</p>
    <input class="login-input" id="login-username" v-model="loginForm.username" @keydown.enter="localLoginVue" type="text" placeholder="Username" autocomplete="username">
    <input class="login-input" id="login-displayname" v-model="loginForm.displayName" @keydown.enter="localLoginVue" type="text" placeholder="Display name (optional)" autocomplete="name">
    <button class="btn-primary" id="login-btn" @click="localLoginVue">Get Started</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>


<!-- ── Settings modal ── -->
<div v-if="shellState.showSettings" class="settings-backdrop" @click.self="shellState.showSettings = false">
  <div class="settings-dialog">
    <div class="settings-header">
      <h3>Preferences</h3>
      <button class="settings-close" @click="shellState.showSettings = false">×</button>
    </div>
    <div class="settings-body">
      <div class="pref-row">
        <label>Use case</label>
        <select class="pref-select" @change="updatePref('use_case', $event.target.value)" :value="shellState.userPrefs.use_case || 'personal'">
          <option value="personal">Personal</option>
          <option value="team">Team</option>
        </select>
      </div>
      <div class="pref-row">
        <label>AI model access</label>
        <select class="pref-select" @change="updatePref('api_mode', $event.target.value)" :value="shellState.userPrefs.api_mode || 'subscription'">
          <option value="subscription">Jowork Plan</option>
          <option value="own_key">My own API Key</option>
        </select>
      </div>
      <div class="pref-row" v-if="shellState.userPrefs.api_mode === 'own_key'">
        <label>API Key</label>
        <div class="pref-apikey">
          <span>{{ shellState.userPrefsApiKeyMasked || 'Not set' }}</span>
          <button class="btn-small" onclick="doPromptChangeApiKey()">Change</button>
        </div>
      </div>
      <div class="pref-row">
        <label>Deploy mode</label>
        <select class="pref-select" @change="updatePref('deploy_mode', $event.target.value)" :value="shellState.userPrefs.deploy_mode || 'desktop'">
          <option value="desktop">Desktop App</option>
          <option value="server">Self-hosted</option>
        </select>
      </div>

      <!-- Server mode (desktop app only) -->
      <template v-if="shellState.isTauriApp">
        <div style="height:1px;background:var(--sh-sep);margin:6px 0 14px;"></div>
        <div class="pref-row" style="align-items:flex-start;">
          <label style="padding-top:2px;">Server</label>
          <div style="flex:1;">
            <div style="font-size:13px;color:var(--text);font-weight:500;margin-bottom:3px;">
              {{ shellState.appMode === 'self_hosted' ? 'Self-hosted' : 'Jowork Cloud' }}
            </div>
            <div style="font-size:11px;color:var(--text2,#666);margin-bottom:8px;line-height:1.45;">
              {{ shellState.appMode === 'self_hosted'
                ? 'Running a local server on this machine.'
                : 'Connected to the hosted Jowork service.' }}
            </div>
            <a href="tauri://localhost/app-settings.html"
               style="font-size:12px;color:var(--accent,#9DD84A);text-decoration:none;font-weight:500;">
              Change server mode →
            </a>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<!-- ── App shell ── -->
<div id="app" style="display:none; height:100%; display:none; flex-direction:row;">

  <!-- Offline banner (shown after first health check when gateway is down) -->
  <div v-if="shellState.gatewayChecked && !shellState.gatewayOnline" class="offline-banner">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v4M8 11v1"/></svg>
    <span class="offline-banner-msg">Gateway offline — retrying…</span>
    <button class="offline-retry" @click="doCheckGateway">Retry now</button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Tauri 专用拖拽区：覆盖顶部 44px，traffic light 旁边可拖拽移动窗口 -->
    <div class="drag-zone"></div>
    <div class="sidebar-resize-handle" id="sidebar-resize"></div>

    <!-- Brand -->
    <div class="sidebar-brand">
      <img class="brand-logo" id="brand-logo" src="/app-icon.png" alt="Jowork">
      <div class="brand-text">
        <div class="brand-name">Jowork</div>
        <div class="brand-sub">AI Work Partner</div>
      </div>
      <button class="collapse-btn" id="collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 4L6 8l4 4"/></svg>
      </button>
    </div>
    <div class="sidebar-divider"></div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <div class="nav-group">
        <span class="nav-group-label">Workspace</span>
        <button class="nav-item" :class="{ active: shellState.activePanel === 'chat' }" data-panel="chat" @click="onNavClick('chat')" title="AI Assistant">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M11.2 4.8l1.4-1.4M3.4 12.6l1.4-1.4"/>
              <circle cx="8" cy="8" r="2.2"/>
            </svg>
          </span>{{ tl('nav.ai_assistant') }}
        </button>
        <button class="nav-item" :class="{ active: shellState.activePanel === 'dashboard' }" data-panel="dashboard" @click="onNavClick('dashboard')" title="Dashboard">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <rect x="2" y="2" width="5.2" height="5.2" rx="1.2"/>
              <rect x="8.8" y="2" width="5.2" height="5.2" rx="1.2"/>
              <rect x="2" y="8.8" width="5.2" height="5.2" rx="1.2"/>
              <rect x="8.8" y="8.8" width="5.2" height="5.2" rx="1.2"/>
            </svg>
          </span>{{ tl('nav.dashboard') }}
        </button>
        <button class="nav-item" :class="{ active: shellState.activePanel === 'logs' }" data-panel="logs" @click="onNavClick('logs')" title="My Logs">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 3h10M3 6.5h7M3 10h8M3 13h5"/>
            </svg>
          </span>{{ tl('nav.logs') }}
        </button>
      </div>

      <div class="nav-group">
        <span class="nav-group-label">Settings</span>
        <button class="nav-item" :class="{ active: shellState.activePanel === 'billing' }" data-panel="billing" @click="onNavClick('billing')" title="Billing">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
              <path d="M1.5 6.5h13"/>
              <path d="M4.5 10h2M10 10h1.5"/>
            </svg>
          </span>{{ tl('nav.billing') || '订阅计划' }}
        </button>
        <button class="nav-item" :class="{ active: shellState.activePanel === 'aiservices' }" data-panel="aiservices" @click="onNavClick('aiservices')" data-service="svc_page_ai_services" title="AI Services">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.5 2L6 9h3.5L8 14l6.5-8H11z"/>
            </svg>
          </span>{{ tl('nav.ai_services') }}
        </button>
        <button class="nav-item" :class="{ active: shellState.activePanel === 'admin' }" data-panel="admin" @click="onNavClick('admin')" data-service="svc_page_admin" title="Admin">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
              <path d="M3 5h10M3 8.5h10M3 12h10"/>
              <circle cx="6.5" cy="5" r="1.7" fill="none"/>
              <circle cx="10" cy="8.5" r="1.7" fill="none"/>
              <circle cx="6.5" cy="12" r="1.7" fill="none"/>
            </svg>
          </span>{{ tl('nav.admin_panel') }}
        </button>
        <button class="nav-item" :class="{ active: shellState.fileTreeOpen }" id="files-tree-btn" @click="onToggleFileTree" title="File Explorer">
          <span class="nav-item-icon">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 6a1.5 1.5 0 011.5-1.5H7l1.5-2.5h4A1.5 1.5 0 0114 3.5V12A1.5 1.5 0 0112.5 13.5h-9A1.5 1.5 0 012 12V6z"/>
            </svg>
          </span>{{ tl('nav.files') }}
        </button>
      </div>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-actions">
        <button class="action-btn" onclick="toggleTheme()" title="Toggle theme">
          <span class="action-btn-icon">◑</span>
          <span class="action-btn-label">{{ tl('nav.theme') }}</span>
        </button>
        <button class="action-btn" onclick="shellState.showSettings = true" title="Preferences">
          <span class="action-btn-icon">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
              <circle cx="8" cy="8" r="2.2"/>
              <path d="M8 1.5v1.3M8 13.2v1.3M1.5 8h1.3M13.2 8h1.3M3.4 3.4l.93.93M11.67 11.67l.93.93M11.67 4.33l.93-.93M3.4 12.6l.93-.93"/>
            </svg>
          </span>
          <span class="action-btn-label">{{ tl('nav.settings') }}</span>
        </button>
        <button class="action-btn" onclick="forceReload()" title="Reload">
          <span class="action-btn-icon">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M13.5 4A6 6 0 103.5 12.5"/>
              <path d="M13.5 1.5v3h-3"/>
            </svg>
          </span>
          <span class="action-btn-label">{{ tl('nav.refresh') }}</span>
        </button>
        <button class="action-btn danger" onclick="logout()" title="Log out">
          <span class="action-btn-icon">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 3H4a1 1 0 00-1 1v8a1 1 0 001 1h2"/>
              <path d="M10.5 5.5L13 8l-2.5 2.5M7.5 8H13"/>
            </svg>
          </span>
          <span class="action-btn-label">{{ tl('nav.logout') }}</span>
        </button>
      </div>

      <!-- User row -->
      <div class="sidebar-user-row" @click="onNavClick('admin')" title="Settings &amp; Admin">
        <div class="sidebar-user-avatar" id="user-avatar">{{ userInitial }}</div>
        <div class="sidebar-user-name" id="user-chip">{{ userDisplayName }}</div>
        <div
          id="status-dot"
          :class="['status-dot', shellState.gatewayOnline ? 'online' : 'offline']"
          :title="shellState.gatewayOnline ? 'Gateway online' : 'Gateway offline'"
        ></div>
      </div>
    </div>

  </div>

  <!-- File tree panel -->
  <div id="file-tree-panel" :class="{ open: shellState.fileTreeOpen }">
    <iframe id="frame-files-tree" src="about:blank"></iframe>
  </div>

  <!-- Content area -->
  <div class="content-area">
    <!-- File tabs bar (only shown when files are open) -->
    <div class="panel-tabbar" id="panel-tabbar" :class="{ visible: shellState.fileTabs.length > 0 }">
      <button
        v-for="t in shellState.fileTabs"
        :key="t.id"
        class="panel-tab"
        :class="{ active: shellState.activePanel === t.id }"
        :id="`tab-${t.id}`"
        @click="onFileTabClick(t.id, $event)"
      >
        <span class="panel-tab-icon">{{ fileTabIcon(t.ext) }}</span>
        <span>{{ t.name }}</span>
        <span class="panel-tab-close">×</span>
      </button>
    </div>

    <div class="panels" id="panels">
      <iframe class="panel-frame" id="frame-dashboard" data-src="/dashboard.html" src="about:blank"></iframe>
      <iframe class="panel-frame active" id="frame-chat" data-src="/chat.html" src="about:blank"></iframe>
      <iframe class="panel-frame" id="frame-aiservices" data-src="/ai-services.html" src="about:blank" data-service="svc_page_ai_services"></iframe>
      <iframe class="panel-frame" id="frame-admin" data-src="/admin.html" src="about:blank" data-service="svc_page_admin"></iframe>
      <iframe class="panel-frame" id="frame-logs" data-src="/logs.html" src="about:blank"></iframe>
      <iframe class="panel-frame" id="frame-billing" data-src="/billing.html" src="about:blank"></iframe>
      <iframe
        v-for="t in shellState.fileTabs"
        :key="t.id"
        class="panel-frame"
        :class="{ active: shellState.activePanel === t.id }"
        :id="`frame-${t.id}`"
        :src="fileTabSrc(t)"
        @load="onFileFrameLoad"
      ></iframe>
      <div class="panel-loading" id="panel-loading"></div>
    </div>
  </div>

  <!-- Update bar -->
  <div class="update-bar hidden" id="update-bar">
    <span>New version <span class="update-version" id="update-version"></span> available</span>
    <button class="update-btn" onclick="doUpdate()">Update now</button>
    <button class="update-dismiss" onclick="document.getElementById('update-bar').classList.add('hidden')">Later</button>
  </div>

</div>

<!-- Nav tooltip -->
<div class="nav-tooltip" id="nav-tooltip"></div>
<div id="vue-bootstrap" style="display:none;"></div>
</div>

<script>
// Vercel 部署时使用 runtime-config.js 注入的后端地址，本地运行时为空（相对路径）
const API = (window.__JOWORK_GATEWAY_URL__ || '').replace(/\/$/, '');
const TOKEN_KEY = 'jowork_token';
const AUTO_USER_KEY = 'jowork_local_user';
const shellState = window.Vue
  ? Vue.reactive({
      token: localStorage.getItem(TOKEN_KEY),
      currentUser: null,
      activePanel: 'chat',
      fileTreeOpen: localStorage.getItem('jw_file_tree_open') === '1',
      gatewayOnline: false,
      gatewayChecked: false,
      fileTabs: [],
      // Settings
      showSettings: false,
      userPrefs: {},
      userPrefsApiKeySet: false,
      userPrefsApiKeyMasked: null,
      // Desktop app mode
      isTauriApp: !!window.__TAURI__,
      appMode: 'saas', // 'saas' | 'self_hosted'
    })
  : {
      token: localStorage.getItem(TOKEN_KEY),
      currentUser: null,
      activePanel: 'chat',
      fileTreeOpen: localStorage.getItem('jw_file_tree_open') === '1',
      gatewayOnline: false,
      gatewayChecked: false,
      fileTabs: [],
      showSettings: false,
      userPrefs: {},
      userPrefsApiKeySet: false,
      userPrefsApiKeyMasked: null,
      isTauriApp: !!window.__TAURI__,
      appMode: 'saas',
    };
const loginForm = window.Vue
  ? Vue.reactive({ username: '', displayName: '' })
  : { username: '', displayName: '' };
const loadedPanels = new Set();

// ── Theme ──
ThemeManager.initShell();

// ── Sidebar collapse ──
const SIDEBAR_KEY = 'jw_sidebar_collapsed';

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const collapsed = sidebar.classList.toggle('collapsed');
  localStorage.setItem(SIDEBAR_KEY, collapsed ? '1' : '0');
  document.getElementById('collapse-btn').title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
}

if (localStorage.getItem(SIDEBAR_KEY) === '1') {
  document.querySelector('.sidebar').classList.add('collapsed');
}

document.getElementById('brand-logo').addEventListener('click', () => {
  if (document.querySelector('.sidebar').classList.contains('collapsed')) toggleSidebar();
});

// ── Sidebar resize ──
(function () {
  const sidebar = document.querySelector('.sidebar');
  const handle = document.getElementById('sidebar-resize');
  const MIN_W = 160, MAX_W = 400, W_KEY = 'jw_sidebar_width';
  const savedW = parseInt(localStorage.getItem(W_KEY));
  if (savedW && !sidebar.classList.contains('collapsed')) sidebar.style.width = savedW + 'px';
  handle.addEventListener('mousedown', (e) => {
    if (sidebar.classList.contains('collapsed')) return;
    e.preventDefault();
    handle.classList.add('dragging');
    const startX = e.clientX, startW = sidebar.offsetWidth;
    function onMove(e) { sidebar.style.width = Math.min(MAX_W, Math.max(MIN_W, startW + e.clientX - startX)) + 'px'; }
    function onUp() {
      handle.classList.remove('dragging');
      localStorage.setItem(W_KEY, sidebar.offsetWidth);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── Nav tooltip ──
(function () {
  const tooltip = document.getElementById('nav-tooltip');
  const sidebar = document.querySelector('.sidebar');
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('mouseenter', (e) => {
      if (!sidebar.classList.contains('collapsed')) return;
      const label = btn.title;
      if (!label) return;
      const rect = btn.getBoundingClientRect();
      tooltip.textContent = label;
      tooltip.style.left = (rect.right + 10) + 'px';
      tooltip.style.top = (rect.top + rect.height / 2) + 'px';
      tooltip.classList.add('visible');
    });
    btn.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  });
})();

// ── Gateway status ──
function setGatewayStatus(online) {
  shellState.gatewayOnline = Boolean(online);
  shellState.gatewayChecked = true;
}
async function checkGatewayStatus() {
  try {
    const r = await fetch(API + '/health', { signal: AbortSignal.timeout(4000) });
    setGatewayStatus(r.ok);
  } catch { setGatewayStatus(false); }
}
function startGatewayMonitor() {
  checkGatewayStatus();
  setInterval(checkGatewayStatus, 30000);
}

// ── Keyboard shortcuts ──
const PANEL_SHORTCUT = ['chat', 'dashboard', 'aiservices', 'admin', 'chat'];
document.addEventListener('keydown', (e) => {
  if (!shellState.token) return;
  const meta = e.metaKey || e.ctrlKey;
  if (meta && e.key >= '1' && e.key <= '5') {
    e.preventDefault();
    const panel = PANEL_SHORTCUT[parseInt(e.key) - 1];
    if (panel) switchPanel(panel);
  }
  if (meta && e.key === '\\') { e.preventDefault(); toggleSidebar(); }
});

const THEME_ICONS = {
  auto: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="5.5"/><line x1="8" y1="2.5" x2="8" y2="13.5" stroke-width="2.2"/></svg>`,
  light: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="2.6"/><path d="M8 2v1.8M8 12.2V14M2 8h1.8M12.2 8H14M3.88 3.88l1.27 1.27M10.85 10.85l1.27 1.27M10.85 5.15l1.27-1.27M3.88 12.12l1.27-1.27"/></svg>`,
  dark: `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13.5 9.5A6 6 0 017 3.5a5.5 5.5 0 100 9 6 6 0 006.5-3z"/></svg>`,
};
function updateThemeBtn() {
  const pref = ThemeManager.getPreference();
  const btn = document.querySelector('.action-btn[onclick="toggleTheme()"]');
  if (btn) btn.querySelector('.action-btn-icon').innerHTML = THEME_ICONS[pref] || THEME_ICONS.auto;
}
function toggleTheme() { ThemeManager.toggle(); updateThemeBtn(); }

// ── Init: verify token ──
(async function init() {
  // Setup Wizard 检查：若 gateway 在线且 setup 未完成，跳转到 setup.html
  try {
    const setupResp = await fetch(API + '/api/system/setup-status', { signal: AbortSignal.timeout(3000) });
    if (setupResp.ok) {
      const setupData = await setupResp.json();
      if (!setupData.done) {
        location.href = '/setup.html';
        return;
      }
    }
  } catch { /* gateway 离线时跳过检查，不阻断正常流程 */ }

  if (!shellState.token) {
    const result = await autoLocalLogin();
    if (result !== true) {
      showLoginScreen();
      if (result === 'offline') setTimeout(() => showLoginError('Gateway is offline — start the server first'), 50);
    }
    return;
  }
  try {
    const resp = await fetch(API + '/api/auth/me', {
      headers: { Authorization: 'Bearer ' + shellState.token },
      signal: AbortSignal.timeout(5000),
    });
    if (!resp.ok) throw new Error('token invalid');
    const data = await resp.json();
    shellState.currentUser = data.user;
    enterApp();
  } catch (err) {
    shellState.token = null;
    localStorage.removeItem(TOKEN_KEY);
    const result = await autoLocalLogin();
    if (result !== true) {
      showLoginScreen();
      if (result === 'offline') setTimeout(() => showLoginError('Gateway is offline — start the server first'), 50);
    }
  }
})();

function showLoginScreen() {
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex';
}

// ── Local login ──
async function localLogin(input) {
  const usernameEl = document.getElementById('login-username');
  const displayEl = document.getElementById('login-displayname');
  const username = (input?.username ?? usernameEl.value).trim();
  const display_name = (input?.display_name ?? displayEl.value).trim() || username;
  if (!username || username.length < 2) { showLoginError('Username must be at least 2 characters'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const resp = await fetch(API + '/api/auth/local', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, display_name }),
    });
    const data = await resp.json();
    if (data.token) {
      shellState.token = data.token;
      shellState.currentUser = data.user;
      localStorage.setItem(TOKEN_KEY, shellState.token);
      document.getElementById('login-screen').style.display = 'none';
      enterApp();
    } else {
      showLoginError(data.error || 'Login failed');
      btn.disabled = false; btn.textContent = 'Get Started';
    }
  } catch {
    showLoginError('Cannot reach server — is Jowork Gateway running?');
    btn.disabled = false; btn.textContent = 'Get Started';
  }
}

async function autoLocalLogin() {
  const saved = localStorage.getItem(AUTO_USER_KEY);
  const username = (saved && saved.trim()) || `local_${Math.random().toString(36).slice(2, 10)}`;
  const display_name = (saved && saved.trim()) || 'Local User';
  try {
    const resp = await fetch(API + '/api/auth/local', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, display_name }),
      signal: AbortSignal.timeout(5000),
    });
    const data = await resp.json();
    if (!data.token) return false;
    shellState.token = data.token;
    shellState.currentUser = data.user;
    localStorage.setItem(TOKEN_KEY, shellState.token);
    localStorage.setItem(AUTO_USER_KEY, username);
    document.getElementById('login-screen').style.display = 'none';
    enterApp();
    return true;
  } catch { return 'offline'; }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function logout() {
  shellState.token = null;
  shellState.currentUser = null;
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}

function forceReload() {
  document.querySelectorAll('.panel-frame').forEach(f => { f.src = 'about:blank'; });
  loadedPanels.clear();
  const frame = document.getElementById(`frame-${shellState.activePanel}`);
  if (frame) {
    const src = frame.dataset.src || getFileTabSrcByPanel(shellState.activePanel);
    if (!src) return;
    const ts = Date.now();
    const sep = src.includes('?') ? '&' : '?';
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    frame.onload = () => { injectToken(frame); setTimeout(() => injectToken(frame), 200); loading.classList.add('hidden'); };
    frame.src = src + sep + '_t=' + ts + '#token=' + encodeURIComponent(shellState.token || '');
    loadedPanels.add(shellState.activePanel);
  }
}

// ── Preferences ──
async function loadUserPrefs() {
  if (!shellState.token) return;
  try {
    const resp = await fetch(API + '/api/preferences', {
      headers: { Authorization: 'Bearer ' + shellState.token },
      signal: AbortSignal.timeout(5000),
    });
    if (!resp.ok) return;
    const data = await resp.json();
    shellState.userPrefs = data.preferences || {};
    shellState.userPrefsApiKeySet = !!data.api_key_set;
    shellState.userPrefsApiKeyMasked = data.api_key_masked || null;
  } catch { /* 忽略：不影响主流程 */ }
}

async function updatePref(key, value) {
  if (!shellState.token) return;
  try {
    const resp = await fetch(API + '/api/preferences', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + shellState.token },
      body: JSON.stringify({ [key]: value }),
    });
    if (resp.ok) {
      const data = await resp.json();
      shellState.userPrefs = data.preferences || {};
      shellState.userPrefsApiKeySet = !!data.api_key_set;
      shellState.userPrefsApiKeyMasked = data.api_key_masked || null;
    }
  } catch { /* ignore */ }
}

function doPromptChangeApiKey() {
  const key = prompt('Enter your new API key (leave blank to cancel):');
  if (!key || !key.trim()) return;
  fetch(API + '/api/preferences', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + shellState.token },
    body: JSON.stringify({ api_key: key.trim() }),
  }).then(r => r.json()).then(data => {
    shellState.userPrefsApiKeySet = !!data.api_key_set;
    shellState.userPrefsApiKeyMasked = data.api_key_masked || null;
  }).catch(() => {});
}

// ── Enter app ──
async function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  await ServicesGuard.ready;
  document.querySelectorAll('[data-service]').forEach(el => {
    const svcId = el.getAttribute('data-service');
    if (svcId && !ServicesGuard.hasService(svcId)) el.style.display = 'none';
  });

  await loadUserPrefs();

  // 读取桌面端 App 模式
  if (window.__TAURI__?.core) {
    window.__TAURI__.core.invoke('get_app_mode')
      .then(m => { shellState.appMode = m; })
      .catch(() => {});
  }

  // 从 Stripe 付款页返回时的处理
  const urlParams = new URLSearchParams(location.search);
  const billingResult = urlParams.get('billing');
  if (billingResult === 'success') {
    switchPanel('billing');
    history.replaceState(null, '', location.pathname); // 清除 query string
    setTimeout(() => {
      const bar = document.getElementById('update-bar');
      if (bar) {
        bar.querySelector('.update-version') && (bar.querySelector('.update-version').textContent = '');
        bar.innerHTML = '<span style="color:#9dd84a">✓ 订阅成功！积分已更新，可以开始使用了。</span><button class="update-dismiss" onclick="this.parentElement.classList.add(\'hidden\')">关闭</button>';
        bar.classList.remove('hidden');
        setTimeout(() => bar.classList.add('hidden'), 6000);
      }
    }, 500);
  } else if (billingResult === 'cancel') {
    switchPanel('chat');
    history.replaceState(null, '', location.pathname);
  } else {
    switchPanel('chat');
  }
  updateThemeBtn();
  startGatewayMonitor();
  if (shellState.fileTreeOpen) toggleFileTree(true);
}

// ── Panel switching ──
function syncActivePanelsFromState() {
  const active = shellState.activePanel;
  document.querySelectorAll('.panel-frame').forEach(f => {
    const isActive = f.id === `frame-${active}`;
    f.classList.toggle('active', isActive);
    if (isActive) { f.classList.remove('fade-in'); void f.offsetWidth; f.classList.add('fade-in'); }
  });
}

function switchPanel(name) {
  if (shellState.activePanel === name && loadedPanels.has(name)) return;
  shellState.activePanel = name;
  syncActivePanelsFromState();

  if (!loadedPanels.has(name)) {
    loadedPanels.add(name);
    const frame = document.getElementById(`frame-${name}`);
    const src = frame.dataset.src;
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    frame.onload = () => { injectToken(frame); setTimeout(() => injectToken(frame), 200); loading.classList.add('hidden'); };
    frame.src = src + '#token=' + encodeURIComponent(shellState.token || '');
  }
}

function injectToken(frame) {
  try { frame.contentWindow.postMessage({ type: 'SHELL_TOKEN', token: shellState.token, user: shellState.currentUser }, '*'); } catch {}
}

window.addEventListener('message', (e) => {
  if (e.data?.type === 'REQUEST_TOKEN') {
    const allFrames = [
      ...document.querySelectorAll('.panel-frame'),
      document.getElementById('frame-files-tree'),
    ].filter(Boolean);
    allFrames.forEach(f => {
      try { if (f.contentWindow === e.source) injectToken(f); } catch {}
    });
  }
  if (e.data?.type === 'LOGOUT') logout();
  if (e.data?.type === 'relogin') { localStorage.removeItem(TOKEN_KEY); shellState.token = null; location.reload(); }
  if (e.data?.type === 'NAVIGATE') { const panel = e.data.panel; if (panel) switchPanel(panel); }
  if (e.data?.type === 'OPEN_FILE') openFileTab(e.data);
});

// ── File tabs ──
function _fileTabId(path) {
  let h = 5381;
  for (let i = 0; i < path.length; i++) h = ((h << 5) + h) ^ path.charCodeAt(i);
  return 'file_' + (h >>> 0).toString(36);
}
function getFileTab(fileId) { return shellState.fileTabs.find(t => t.id === fileId); }
function getFileTabSrc(tab) { return `/file-viewer.html?path=${encodeURIComponent(tab.path)}`; }
function getFileTabSrcByPanel(panelId) { const tab = getFileTab(panelId); return tab ? getFileTabSrc(tab) : ''; }

function openFileTab({ path, name, ext }) {
  if (!path) return;
  const fileId = _fileTabId(path);
  if (getFileTab(fileId)) { activateFileTab(fileId); return; }
  const fallbackName = path.split('/').pop() || 'Untitled';
  const normalizedExt = ext || fallbackName.split('.').pop() || '';
  shellState.fileTabs.push({ id: fileId, path, name: name || fallbackName, ext: normalizedExt });
  activateFileTab(fileId);
}
function activateFileTab(fileId) { shellState.activePanel = fileId; syncActivePanelsFromState(); }
function closeFileTab(fileId) {
  const wasActive = shellState.activePanel === fileId;
  shellState.fileTabs = shellState.fileTabs.filter(t => t.id !== fileId);
  if (wasActive) {
    const remaining = shellState.fileTabs.map(t => t.id);
    if (remaining.length > 0) activateFileTab(remaining[remaining.length - 1]);
    else switchPanel('chat');
  } else { syncActivePanelsFromState(); }
}

// ── File tree ──
const FILE_TREE_KEY = 'jw_file_tree_open';
let fileTreeLoaded = false;
function toggleFileTree(forceOpen) {
  if (!shellState.token) return;
  const isOpen = typeof forceOpen === 'boolean' ? forceOpen : !shellState.fileTreeOpen;
  shellState.fileTreeOpen = isOpen;
  localStorage.setItem(FILE_TREE_KEY, shellState.fileTreeOpen ? '1' : '0');
  if (shellState.fileTreeOpen && !fileTreeLoaded) {
    fileTreeLoaded = true;
    const frame = document.getElementById('frame-files-tree');
    frame.onload = () => { injectToken(frame); setTimeout(() => injectToken(frame), 200); };
    frame.src = '/files.html#token=' + encodeURIComponent(shellState.token || '');
  } else if (shellState.fileTreeOpen) {
    injectToken(document.getElementById('frame-files-tree'));
  }
}

// ── Tauri ──
if (window.__TAURI__) {
  window.__TAURI__.event.listen('health-status', (event) => { setGatewayStatus(event.payload.online); });
}
if (window.__TAURI__) {
  window.__TAURI__.event.listen('update-available', (event) => {
    const { version } = event.payload;
    document.getElementById('update-version').textContent = `v${version}`;
    document.getElementById('update-bar').classList.remove('hidden');
  });
}
async function doUpdate() {
  if (!window.__TAURI__) return;
  document.querySelector('.update-btn').textContent = 'Updating...';
  try { await window.__TAURI__.core.invoke('install_update'); }
  catch (e) { alert('Update failed: ' + e); document.querySelector('.update-btn').textContent = 'Update now'; }
}
if (window.__TAURI__) {
  const appWin = window.__TAURI__.window.getCurrentWindow();
  async function syncFullscreen() {
    const isFs = await appWin.isFullscreen();
    document.documentElement.classList.toggle('fullscreen', isFs);
  }
  syncFullscreen();
  appWin.listen('tauri://resize', syncFullscreen);
  appWin.listen('tauri://enter-full-screen', () => document.documentElement.classList.add('fullscreen'));
  appWin.listen('tauri://leave-full-screen', () => document.documentElement.classList.remove('fullscreen'));
}
if (window.__TAURI__) {
  document.querySelector('.sidebar').addEventListener('mousedown', async (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('button, a, input, .nav-item, .action-btn, .sidebar-footer')) return;
    try { await window.__TAURI__.window.getCurrentWindow().startDragging(); } catch (_) {}
  });
}

if (window.Vue) {
  window.__joworkShellVue = Vue.createApp({
    setup() {
      const tl = (key) => (window.__jowork_i18n && window.__jowork_i18n[key]) || key;
      const userDisplayName = Vue.computed(() => shellState.currentUser?.name || tl('nav.loading'));
      const userInitial = Vue.computed(() => (shellState.currentUser?.name?.charAt(0) || '?').toUpperCase());
      Vue.watch(() => shellState.activePanel, () => { syncActivePanelsFromState(); });
      function localLoginVue() {
        return localLogin({ username: loginForm.username, display_name: loginForm.displayName });
      }
      function onNavClick(panel) { if (!shellState.token) return; switchPanel(panel); }
      function onToggleFileTree() { return toggleFileTree(); }
      function onFileTabClick(fileId, event) {
        if (event?.target?.classList?.contains('panel-tab-close')) return closeFileTab(fileId);
        return activateFileTab(fileId);
      }
      function onFileFrameLoad(event) {
        const frame = event?.target;
        if (!frame) return;
        injectToken(frame);
        setTimeout(() => injectToken(frame), 200);
      }
      function fileTabIcon(ext) {
        const normalized = String(ext || '').toLowerCase();
        return normalized === 'md' || normalized === 'markdown' ? '📝' : '🌐';
      }
      function fileTabSrc(tab) { return getFileTabSrc(tab); }
      function doCheckGateway() { checkGatewayStatus(); }
      return {
        shellState, loginForm, localLoginVue, onNavClick, onToggleFileTree,
        userDisplayName, userInitial, onFileTabClick, onFileFrameLoad, fileTabIcon, fileTabSrc,
        doCheckGateway, updatePref, tl,
      };
    },
    data() { return { bootedAt: Date.now() }; },
  }).mount('#shell-root');
}
</script>
<script src="/feedback-widget.js"></script>
<script>
// ── macOS 窗口失焦变暗 ──
(function() {
  window.addEventListener('focus', () => document.documentElement.classList.remove('window-inactive'));
  window.addEventListener('blur',  () => document.documentElement.classList.add('window-inactive'));
})();

// ── NSVisualEffectView vibrancy 检测 ──
(function() {
  if (!window.__TAURI__) return;
  window.__TAURI__.core.invoke('is_vibrancy_active').then(active => {
    if (active) document.documentElement.setAttribute('data-vibrancy', '');
  }).catch(() => {});
})();

// ── 菜单栏事件处理 ──
(function() {
  if (!window.__TAURI__) return;
  window.__TAURI__.event.listen('menu-action', ({ payload }) => {
    if (payload === 'toggle_sidebar') {
      if (typeof toggleSidebar === 'function') toggleSidebar();
    }
  });
})();

// ── 右键菜单：shell 层（侧边栏 + 空白区域）──
(function() {
  if (!window.__TAURI__) return;
  const invoke = window.__TAURI__.core.invoke;
  const listen = window.__TAURI__.event.listen;

  document.addEventListener('contextmenu', e => {
    e.preventDefault();
    // iframe 内部的 contextmenu 不会冒泡到这里，各页面自己处理

    // 可编辑区（如搜索框）→ 原生 Cut/Copy/Paste
    if (e.target.closest('input, textarea, [contenteditable]')) {
      invoke('show_context_menu', { contextType: 'editable', data: null });
      return;
    }

    // 有文字选中 → 原生 Copy
    const sel = window.getSelection()?.toString().trim();
    if (sel) {
      invoke('show_context_menu', { contextType: 'selection', data: { text: sel } });
      return;
    }
    // 其他区域：仅拦截不展示菜单（消除浏览器默认菜单即可）
  });

  listen('context-menu-action', ({ payload }) => {
    if (payload.action === 'copy_sel' && payload.data?.text) {
      navigator.clipboard.writeText(payload.data.text);
    }
  });
})();
</script>
