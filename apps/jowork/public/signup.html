<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoWork — Sign Up</title>
<link rel="stylesheet" href="/styles/tokens.css">
<script src="/theme.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg, #0f0f12);
  color: var(--text, #e8e8e8);
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  font-size: 14px;
  padding: 24px;
}
.card {
  width: 100%; max-width: 400px;
  background: var(--card, #1a1a1e);
  border: 0.5px solid var(--sep, rgba(255,255,255,0.08));
  border-radius: 16px;
  padding: 32px 28px 28px;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.logo img { width: 32px; height: 32px; border-radius: 8px; }
.logo-name { font-size: 16px; font-weight: 700; }
h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: var(--text2, #888); margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text2, #888); font-weight: 500; margin-bottom: 5px; }
.field input {
  width: 100%; padding: 9px 12px;
  background: rgba(255,255,255,0.05); border: 0.5px solid var(--sep, rgba(255,255,255,0.12));
  border-radius: 8px; color: var(--text, #e8e8e8); font-size: 14px;
  outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent, #9dd84a); }
[data-theme="light"] .field input { background: rgba(0,0,0,0.04); }
.btn {
  width: 100%; padding: 10px; border-radius: 8px;
  font-size: 14px; font-weight: 600; border: none;
  cursor: pointer; transition: opacity 0.15s; margin-top: 8px;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent, #9dd84a); color: #111; }
.error { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 18px; }
.divider { text-align: center; font-size: 12px; color: var(--text2, #888); margin: 16px 0; position: relative; }
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%; width: 40%; height: 0.5px;
  background: var(--sep, rgba(255,255,255,0.08));
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.toggle { text-align: center; font-size: 13px; color: var(--text2, #888); margin-top: 18px; }
.toggle a { color: var(--accent, #9dd84a); text-decoration: none; cursor: pointer; }
.toggle a:hover { text-decoration: underline; }
.terms { font-size: 11px; color: var(--text2, #888); text-align: center; margin-top: 14px; line-height: 1.5; }
.terms a { color: inherit; }
.btn-google {
  width: 100%; padding: 10px; border-radius: 8px;
  font-size: 14px; font-weight: 500; border: 0.5px solid var(--sep, rgba(255,255,255,0.15));
  cursor: pointer; transition: opacity 0.15s; margin-top: 8px;
  background: rgba(255,255,255,0.06); color: var(--text, #e8e8e8);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
[data-theme="light"] .btn-google { background: #fff; color: #3c4043; border-color: #dadce0; }
.btn-google:hover { opacity: 0.85; }
.btn-google svg { flex-shrink: 0; }
.google-section { margin-bottom: 0; }
.error-msg { color: #f59e0b; font-size: 12px; margin-top: 6px; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/app-icon.png" alt="JoWork">
    <span class="logo-name">JoWork</span>
  </div>

  <!-- Sign Up form -->
  <div id="signup-view">
    <h2>Create your account</h2>
    <p class="subtitle">Start with 100 free credits per month.</p>

    <!-- Google Sign In -->
    <div class="google-section" id="google-section" style="display:none">
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="divider">or</div>
    </div>

    <div class="field">
      <label>Your name</label>
      <input type="text" id="su-name" placeholder="Alex Johnson" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="su-email" placeholder="alex@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="su-password" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="error" id="su-error"></div>
    <button class="btn btn-primary" id="su-btn" onclick="doSignup()">Create account</button>
    <p class="terms">By signing up you agree to our <a href="/terms.html" target="_blank">Terms</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a>.</p>
    <div class="divider">or</div>
    <div class="toggle">Already have an account? <a onclick="showLogin()">Sign in</a></div>
  </div>

  <!-- Sign In form -->
  <div id="login-view" style="display:none">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your JoWork account.</p>

    <!-- Google Sign In -->
    <div id="google-section-login" style="display:none">
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.84 2.6 3.3 4.53 6.16 4.53z"/></svg>
        Continue with Google
      </button>
      <div class="divider">or</div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="li-email" placeholder="alex@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="li-password" placeholder="Your password" autocomplete="current-password">
    </div>
    <div class="error" id="li-error"></div>
    <button class="btn btn-primary" id="li-btn" onclick="doLogin()">Sign in</button>
    <div class="divider">or</div>
    <div class="toggle">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
  </div>
</div>

<script>
const API = (window.__JOWORK_GATEWAY_URL__ || '').replace(/\/$/, '');
const TOKEN_KEY = 'jowork_token';

// If already logged in, redirect to shell
if (localStorage.getItem(TOKEN_KEY)) {
  location.replace('/shell.html');
}

// Show URL errors (e.g. from Google OAuth redirect)
const _urlParams = new URLSearchParams(location.search);
const _urlError = _urlParams.get('error');
if (_urlError) {
  document.getElementById('su-error').textContent = decodeURIComponent(_urlError).replace(/_/g, ' ');
}

// Check if Google OAuth is available and show button
fetch(API + '/api/auth/google/status')
  .then(r => r.json())
  .then(d => {
    if (d.enabled) {
      document.getElementById('google-section').style.display = '';
      document.getElementById('google-section-login').style.display = '';
    }
  })
  .catch(() => {});

function loginWithGoogle() {
  window.location.href = API + '/api/auth/google';
}

function showLogin() {
  document.getElementById('signup-view').style.display = 'none';
  document.getElementById('login-view').style.display = '';
  document.getElementById('li-email').focus();
}

function showSignup() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('signup-view').style.display = '';
  document.getElementById('su-name').focus();
}

// Auto-switch to login view if URL has ?login
if (new URLSearchParams(location.search).get('login') !== null) showLogin();

async function doSignup() {
  const btn = document.getElementById('su-btn');
  const errEl = document.getElementById('su-error');
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;

  errEl.textContent = '';
  if (!name) { errEl.textContent = 'Name is required.'; return; }
  if (!email) { errEl.textContent = 'Email is required.'; return; }
  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }

  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch(API + '/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Signup failed.'; return; }

    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(TOKEN_KEY + '_user', JSON.stringify(data.user));
    location.replace('/shell.html');
  } catch (e) {
    errEl.textContent = 'Network error. Please try again.';
  } finally {
    btn.disabled = false; btn.textContent = 'Create account';
  }
}

async function doLogin() {
  const btn = document.getElementById('li-btn');
  const errEl = document.getElementById('li-error');
  const email = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email and password required.'; return; }

  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res = await fetch(API + '/api/auth/email-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Login failed.'; return; }

    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(TOKEN_KEY + '_user', JSON.stringify(data.user));
    location.replace('/shell.html');
  } catch (e) {
    errEl.textContent = 'Network error. Please try again.';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const signupVisible = document.getElementById('signup-view').style.display !== 'none';
  if (signupVisible) doSignup();
  else doLogin();
});
</script>
</body>
</html>
