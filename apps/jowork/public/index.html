                  <label>Agent Name</label>
                  <input v-model="agentData.name" type="text" placeholder="My AI Coworker" />
                </div>
                <div class="form-row">
                  <label>What should your AI know about you and your work?</label>
                  <textarea v-model="agentData.systemPrompt" rows="5" placeholder="I'm an AI assistant for [your name]. I help with [your work]. The company is [company name] and we build [product]..."></textarea>
                </div>
              </template>
              <div v-else style="color:#6b7a99;font-size:13px;margin-bottom:16px">Loading agent…</div>
              <div class="ob-actions">
                <button class="btn-primary" :disabled="onboardingWorking" @click="onboardingNextStep">
                  {{ onboardingWorking ? 'Saving…' : 'Next →' }}
                </button>
              </div>
            </template>

            <!-- Step: add_connector -->
            <template v-else-if="onboardingStep === 'add_connector'">
              <div class="ob-title">Connect your tools</div>
              <div class="ob-desc">Connect your first data source so your AI coworker can access your work. You can add more anytime in Settings.</div>
              <div class="form-row">
                <label>Connector Type</label>
                <select v-model="newConn.kind">
                  <option v-for="t in connectorTypes" :key="t.id" :value="t.id">{{ t.name || t.id }}</option>
                </select>
              </div>
              <div class="form-row">
                <label>Name</label>
                <input v-model="newConn.name" type="text" placeholder="My GitHub" />
              </div>
              <div class="form-row">
                <label>API Key / Token</label>
                <input v-model="newConn.apiKey" type="password" placeholder="Paste your token here" />
              </div>
              <template v-for="f in extraFields(newConn.kind)" :key="f.key">
                <div class="form-row">
                  <label>{{ f.label }}</label>
                  <input v-model="newConn.extra[f.key]" :placeholder="f.placeholder" type="text" />
                </div>
              </template>
              <div v-if="connError" class="form-error">{{ connError }}</div>
              <div class="ob-actions">
                <button class="btn-primary" :disabled="connSaving || onboardingWorking" @click="onboardingAddConnectorAndAdvance">
                  {{ connSaving || onboardingWorking ? 'Working…' : 'Add & Continue →' }}
                </button>
                <button class="btn-skip" @click="skipOnboardingStep">Skip for now</button>
              </div>
            </template>

            <!-- Step: workstyle_doc -->
            <template v-else-if="onboardingStep === 'workstyle_doc'">
              <div class="ob-title">How do you work?</div>
              <div class="ob-desc">Tell your AI coworker about your working style and preferences. It will use this to personalize every response.</div>
              <div class="form-row">
                <textarea v-model="workstyleContent" rows="7" placeholder="e.g. I prefer concise, direct answers. I'm a startup founder building a life coaching app. I usually start at 10:30am and work until 10pm. I make decisions based on data first..."></textarea>
              </div>
              <div class="ob-actions">
                <button class="btn-primary" :disabled="onboardingWorking" @click="onboardingNextStep">
                  {{ onboardingWorking ? 'Saving…' : 'Complete Setup ✓' }}
                </button>
                <button class="btn-skip" @click="skipOnboardingStep">Skip for now</button>
              </div>
            </template>

            <!-- Step dots -->
            <div class="ob-steps">
              <div v-for="s in ['welcome','setup_agent','add_connector','workstyle_doc']" :key="s"
                   :class="['ob-dot', onboardingStep === s ? 'active' : (onboarding && onboarding.completedSteps && onboarding.completedSteps.includes(s) ? 'done' : '')]"></div>
            </div>
          </div>
        </div>
      `,
    };

    createApp(App).mount('#app');
  </script>
</body>
</html>
