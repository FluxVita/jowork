appId: com.jowork.app
productName: JoWork
directories:
  output: dist
  buildResources: build

asarUnpack:
  - "**/*.node"
  - "**/spawn-helper"

mac:
  target: [dmg, zip]
  category: public.app-category.productivity
  icon: build/icon.png
  hardenedRuntime: true

win:
  target: nsis
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
