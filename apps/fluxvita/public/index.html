<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxVita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0f1a; color: #e2e8f0; min-height: 100vh; display: flex; }

    /* ─── Sidebar ─────────────────────────────────────────────────────── */
    #sidebar { width: 240px; background: #111827; border-right: 1px solid #1f2a3c; display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar-header { padding: 16px; border-bottom: 1px solid #1f2a3c; }
    #sidebar-header h1 { font-size: 18px; font-weight: 700; color: #60a5fa; letter-spacing: -0.3px; }
    #sidebar-header p { font-size: 11px; color: #6b7a99; margin-top: 2px; }
    #premium-badge { display: inline-block; font-size: 9px; font-weight: 600; color: #fbbf24; background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.3); border-radius: 3px; padding: 1px 5px; margin-top: 4px; letter-spacing: 0.5px; }
    #sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #94a3b8; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
    .session-item:hover, .session-item.active { background: #1f2a3c; color: #e2e8f0; }
    .session-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-actions { display: none; gap: 2px; flex-shrink: 0; }
    .session-item:hover .session-actions { display: flex; }
    .session-action-btn { background: transparent; border: none; cursor: pointer; color: #6b7a99; padding: 1px 4px; border-radius: 3px; font-size: 12px; line-height: 1; }
    .session-action-btn:hover { background: #2a3a52; color: #e2e8f0; }
    .session-action-btn.delete:hover { color: #f87171; }
    .session-rename-input { flex: 1; background: #0d1117; border: 1px solid #3b82f6; border-radius: 3px; color: #e2e8f0; font-size: 13px; padding: 1px 6px; outline: none; min-width: 0; }
    #sidebar-footer { padding: 8px; border-top: 1px solid #1f2a3c; display: flex; gap: 6px; }
    #new-session-btn { flex: 1; padding: 8px 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    #new-session-btn:hover { background: #3b82f6; }
    #settings-btn { padding: 8px 10px; background: transparent; color: #6b7a99; border: 1px solid #1f2a3c; border-radius: 6px; cursor: pointer; font-size: 15px; }
    #settings-btn:hover { background: #1f2a3c; color: #e2e8f0; }

    /* ─── Main ────────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 720px; line-height: 1.6; font-size: 14px; }
    .msg.user { align-self: flex-end; background: #2563eb; color: white; padding: 10px 16px; border-radius: 16px 16px 4px 16px; white-space: pre-wrap; word-break: break-word; }
    .msg.assistant { align-self: flex-start; background: #111827; border: 1px solid #1f2a3c; padding: 12px 16px; border-radius: 4px 16px 16px 16px; }
    .msg.system { align-self: center; color: #6b7a99; font-size: 12px; font-style: italic; }
    .cursor { display: inline-block; width: 2px; height: 1em; background: #60a5fa; margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── Markdown rendered content ──────────────────────────────────── */
    .md-body { word-break: break-word; }
    .md-body p { margin: 0 0 8px; }
    .md-body p:last-child { margin-bottom: 0; }
    .md-body h1,.md-body h2,.md-body h3 { font-weight: 600; margin: 12px 0 6px; color: #93c5fd; }
    .md-body h1 { font-size: 18px; }
    .md-body h2 { font-size: 16px; }
    .md-body h3 { font-size: 14px; }
    .md-body ul,.md-body ol { padding-left: 20px; margin: 6px 0; }
    .md-body li { margin-bottom: 3px; }
    .md-body code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; background: #0a0f1a; border: 1px solid #1f2a3c; border-radius: 3px; padding: 1px 5px; color: #93c5fd; }
    .md-body pre { background: #0a0f1a; border: 1px solid #1f2a3c; border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 8px 0; }
    .md-body pre code { background: none; border: none; padding: 0; color: #e2e8f0; font-size: 12px; }
    .md-body blockquote { border-left: 3px solid #2563eb; padding-left: 12px; margin: 8px 0; color: #94a3b8; }
    .md-body a { color: #60a5fa; text-decoration: underline; }
    .md-body strong { color: #f1f5f9; }
    .md-body hr { border: none; border-top: 1px solid #1f2a3c; margin: 10px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .md-body th,.md-body td { border: 1px solid #1f2a3c; padding: 6px 10px; text-align: left; }
    .md-body th { background: #1f2a3c; color: #93c5fd; }

    /* ─── Input ───────────────────────────────────────────────────────── */
    #input-area { padding: 16px; border-top: 1px solid #1f2a3c; display: flex; gap: 8px; }
    #msg-input { flex: 1; background: #111827; border: 1px solid #1f2a3c; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; resize: none; max-height: 120px; font-family: inherit; }
    #msg-input:focus { border-color: #2563eb; }
    #send-btn { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-weight: 500; font-size: 14px; align-self: flex-end; min-width: 72px; }
    #send-btn:hover:not(:disabled) { background: #3b82f6; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #send-btn.stop { background: #ef4444; }
    #send-btn.stop:hover { background: #f87171; }

    /* ─── Status bar ─────────────────────────────────────────────────── */
    #status-bar { padding: 6px 16px; background: #0a0f1a; border-bottom: 1px solid #111827; font-size: 11px; color: #6b7a99; display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    .dot.error { background: #ef4444; }
    .engine-tag { margin-left: 8px; font-size: 10px; font-weight: 600; color: #60a5fa; background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.25); border-radius: 3px; padding: 1px 5px; }

    /* ─── Settings modal ─────────────────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #111827; border: 1px solid #1f2a3c; border-radius: 12px; width: 600px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #1f2a3c; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 16px; font-weight: 600; color: #e2e8f0; }
    .modal-close { background: transparent; border: none; color: #6b7a99; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
    .modal-close:hover { background: #1f2a3c; color: #e2e8f0; }
    .modal-tabs { display: flex; padding: 0 20px; border-bottom: 1px solid #1f2a3c; gap: 0; }
    .modal-tab { padding: 10px 16px; font-size: 13px; color: #6b7a99; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .modal-tab:hover { color: #e2e8f0; }
    .modal-tab.active { color: #60a5fa; border-bottom-color: #2563eb; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }

    /* ─── Settings content ───────────────────────────────────────────── */
    .setting-section { margin-bottom: 20px; }
    .setting-section h3 { font-size: 12px; font-weight: 600; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #0a0f1a; border-radius: 6px; margin-bottom: 4px; font-size: 13px; }
    .info-label { color: #6b7a99; }
    .info-value { color: #e2e8f0; font-weight: 500; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .badge.green { background: #14532d; color: #22c55e; }
    .badge.blue { background: #1e3a5f; color: #60a5fa; }
    .badge.gray { background: #1e2030; color: #6b7a99; }
    .badge.red { background: #450a0a; color: #f87171; }
    .badge.gold { background: rgba(251,191,36,0.12); color: #fbbf24; }

    /* Connector list */
    .connector-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #0a0f1a; border-radius: 6px; margin-bottom: 6px; }
    .connector-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .connector-info { flex: 1; min-width: 0; }
    .connector-name { font-size: 13px; font-weight: 500; color: #e2e8f0; }
    .connector-kind { font-size: 11px; color: #6b7a99; margin-top: 1px; }
    .connector-delete { background: transparent; border: 1px solid #450a0a; color: #f87171; border-radius: 4px; padding: 3px 8px; cursor: pointer; font-size: 12px; }
    .connector-delete:hover { background: #450a0a; }
    .empty-msg { color: #6b7a99; font-size: 13px; font-style: italic; text-align: center; padding: 16px; }

    /* Add connector form */
    .add-connector-form { border: 1px solid #1f2a3c; border-radius: 8px; padding: 14px; margin-top: 12px; }
    .add-connector-form h4 { font-size: 13px; font-weight: 600; color: #60a5fa; margin-bottom: 12px; }
    .form-row { margin-bottom: 10px; }
    .form-row label { display: block; font-size: 11px; color: #6b7a99; margin-bottom: 4px; }
    .form-row input,.form-row select { width: 100%; background: #0a0f1a; border: 1px solid #1f2a3c; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; outline: none; }
    .form-row input:focus,.form-row select:focus { border-color: #2563eb; }
    .form-row select option { background: #111827; }
    .btn-primary { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary:hover:not(:disabled) { background: #3b82f6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-error { color: #f87171; font-size: 12px; margin-top: 8px; }
    .form-success { color: #22c55e; font-size: 12px; margin-top: 8px; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card { background: #0a0f1a; border-radius: 6px; padding: 12px; text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: #60a5fa; }
    .stat-label { font-size: 11px; color: #6b7a99; margin-top: 2px; }

    /* Agent editor */
    .form-row textarea { width: 100%; background: #0a0f1a; border: 1px solid #1f2a3c; border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 13px; outline: none; resize: vertical; font-family: inherit; }
    .form-row textarea:focus { border-color: #2563eb; }

    /* Memory list */
    .memory-search { width: 100%; background: #0a0f1a; border: 1px solid #1f2a3c; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; outline: none; margin-bottom: 10px; }
    .memory-search:focus { border-color: #2563eb; }
    .memory-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; background: #0a0f1a; border-radius: 6px; margin-bottom: 6px; }
    .memory-content { flex: 1; font-size: 13px; color: #e2e8f0; line-height: 1.5; word-break: break-word; }
    .memory-meta { font-size: 11px; color: #6b7a99; margin-top: 2px; }
    .memory-delete { background: transparent; border: 1px solid #450a0a; color: #f87171; border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .memory-delete:hover { background: #450a0a; }

    /* Task list (Scheduler tab) */
    .task-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #0a0f1a; border-radius: 6px; margin-bottom: 6px; }
    .task-info { flex: 1; min-width: 0; }
    .task-name { font-size: 13px; font-weight: 500; color: #e2e8f0; }
    .task-meta { font-size: 11px; color: #6b7a99; margin-top: 2px; font-family: 'SF Mono', 'Fira Code', monospace; }
    .task-toggle { background: transparent; border: 1px solid #1f2a3c; color: #6b7a99; border-radius: 4px; padding: 3px 8px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .task-toggle:hover { background: #1f2a3c; color: #e2e8f0; }
    .task-toggle.on { border-color: #14532d; color: #22c55e; }
    .task-delete { background: transparent; border: 1px solid #450a0a; color: #f87171; border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .task-delete:hover { background: #450a0a; }

    /* Usage tab */
    .usage-bar-wrap { background: #0a0f1a; border-radius: 6px; height: 8px; margin-top: 6px; overflow: hidden; }
    .usage-bar { height: 100%; border-radius: 6px; background: #2563eb; transition: width 0.3s; }
    .usage-bar.warn { background: #f59e0b; }
    .usage-bar.alert,.usage-bar.blocked { background: #ef4444; }
    .daily-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
    .daily-date { width: 82px; color: #6b7a99; flex-shrink: 0; }
    .daily-bar-wrap { flex: 1; background: #0a0f1a; border-radius: 3px; height: 6px; overflow: hidden; }
    .daily-bar { height: 100%; border-radius: 3px; background: #2563eb; }
    .daily-cost { width: 64px; text-align: right; color: #94a3b8; flex-shrink: 0; }

    /* Admin tab */
    .btn-secondary { background: transparent; color: #60a5fa; border: 1px solid #2563eb; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 13px; }
    .btn-secondary:hover:not(:disabled) { background: rgba(37,99,235,0.15); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger-outline { display: inline-block; background: transparent; color: #f87171; border: 1px solid #450a0a; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 13px; }
    .btn-danger-outline:hover { background: #450a0a; }
    .admin-btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7a99">Loading FluxVita...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js",
        "marked": "https://esm.run/marked"
      }
    }
  </script>

  <script type="module">
    import { createApp, ref, computed, onMounted, onUnmounted, nextTick } from 'vue';
    import { marked } from 'marked';

    marked.use({ gfm: true, breaks: true });

    const API = '';
    const CONNECTOR_ICONS = { github: '🐙', notion: '📝', slack: '💬', linear: '📐', gitlab: '🦊', figma: '🎨' };
    const CONNECTOR_EXTRA_FIELDS = {
      gitlab: [{ key: 'baseUrl', label: 'GitLab URL (optional)', placeholder: 'https://gitlab.example.com' }],
      figma:  [{ key: 'teamId',  label: 'Team ID (optional)',   placeholder: 'your-team-id' }],
    };

    async function api(method, path, body) {
      const r = await fetch(API + path, {
        method,
        headers: { 'content-type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!r.ok) throw new Error(`API error ${r.status}`);
      if (r.status === 204) return null;
      return r.json();
    }

    function renderMd(text) {
      if (!text) return '';
      return marked.parse(text);
    }

    const App = {
      setup() {
        // ─── Chat state ───────────────────────────────────────────────
        const sessions      = ref([]);
        const activeSessionId = ref(null);
        const messages      = ref([]);
        const inputText     = ref('');
        const streaming     = ref(false);
        const streamingText = ref('');
        const abortController = ref(null);
        const healthy       = ref(true);
        const edition       = ref(null);

        const activeSession = computed(() => sessions.value.find(s => s.id === activeSessionId.value));
        const engineName = computed(() => {
          if (!edition.value) return '';
          return edition.value.agentEngines?.includes('claude-agent') ? 'Claude Agent' : 'Builtin';
        });

        // ─── Settings state ───────────────────────────────────────────
        const showSettings   = ref(false);
        const settingsTab    = ref('agent');
        const modelInfo      = ref(null);
        const providers      = ref([]);
        const modelPickProvider = ref('');
        const modelPickModel    = ref('');
        const modelSaving       = ref(false);
        const modelMsg          = ref('');
        const connectors     = ref([]);
        const connectorTypes = ref([]);
        const stats          = ref(null);
        const healthFull     = ref(null);

        const newConn    = ref({ kind: '', name: '', apiKey: '', extra: {} });
        const connError  = ref('');
        const connSuccess = ref('');
        const connSaving  = ref(false);

        // Agent editor
        const agentData   = ref(null);
        const agentSaving = ref(false);
        const agentMsg    = ref('');

        // Memories
        const memories     = ref([]);
        const memoryQuery  = ref('');

        // Scheduler
        const tasks       = ref([]);
        const newTask     = ref({ name: '', cronExpr: '0 9 * * 1-5', action: 'agent_run' });
        const taskError   = ref('');
        const taskSuccess = ref('');
        const taskSaving  = ref(false);

        // Workstyle
        const workstyleContent = ref('');
        const workstyleSaving  = ref(false);
        const workstyleMsg     = ref('');

        // Usage
        const usageSummary = ref(null);
        const usageDaily   = ref([]);
        const budgetStatus = ref(null);
        const budgetLimit  = ref('');
        const budgetSaving = ref(false);
        const budgetMsg    = ref('');
        const dailyMax     = computed(() => {
          if (!usageDaily.value.length) return 1;
          return Math.max(...usageDaily.value.map(d => d.totalCost ?? 0)) || 1;
        });
        const budgetPct = computed(() => {
          if (!budgetStatus.value?.limit) return 0;
          return Math.min(100, Math.round(((budgetStatus.value.currentSpend ?? 0) / budgetStatus.value.limit) * 100));
        });

        // Admin
        const adminMsg     = ref('');
        const adminWorking = ref(false);
        const updateInfo   = ref(null);

        // Session rename
        const renamingSessionId = ref(null);
        const renameText        = ref('');

        // ─── Chat helpers ─────────────────────────────────────────────
        async function checkHealth() {
          try { await fetch('/health'); healthy.value = true; }
          catch { healthy.value = false; }
        }

        async function loadEdition() {
          try { edition.value = await api('GET', '/api/premium/edition'); }
          catch { /* ignore */ }
        }

        async function loadSessions() {
          try { sessions.value = await api('GET', '/api/sessions'); }
          catch { /* ignore */ }
        }

        async function selectSession(id) {
          if (streaming.value) stopStream();
          activeSessionId.value = id;
          try {
            const s = await api('GET', `/api/sessions/${id}`);
            messages.value = s.messages;
          } catch { messages.value = []; }
          await nextTick();
          scrollToBottom();
        }

        async function newSession() {
          try {
            const s = await api('POST', '/api/sessions', { title: 'New chat' });
            sessions.value.unshift(s);
            await selectSession(s.id);
          } catch (e) { alert('Error: ' + e.message); }
        }

        function stopStream() {
          if (abortController.value) {
            abortController.value.abort();
            abortController.value = null;
          }
        }

        async function startRename(s) {
          renamingSessionId.value = s.id;
          renameText.value = s.title;
          await nextTick();
          document.querySelector('.session-rename-input')?.focus();
        }

        async function confirmRename(id) {
          const text = renameText.value.trim();
          renamingSessionId.value = null;
          if (!text) return;
          try {
            await api('PATCH', `/api/sessions/${id}`, { title: text });
            const idx = sessions.value.findIndex(s => s.id === id);
            if (idx !== -1) sessions.value[idx] = { ...sessions.value[idx], title: text };
          } catch (e) { alert('Error: ' + e.message); }
        }

        function cancelRename() {
          renamingSessionId.value = null;
          renameText.value = '';
        }

        async function deleteSession(id) {
          if (!confirm('Delete this session and all its messages?')) return;
          try {
            await api('DELETE', `/api/sessions/${id}`);
            sessions.value = sessions.value.filter(s => s.id !== id);
            if (activeSessionId.value === id) {
              if (sessions.value.length > 0) await selectSession(sessions.value[0].id);
              else await newSession();
            }
          } catch (e) { alert('Error: ' + e.message); }
        }

        async function sendMessage() {
          if (streaming.value) { stopStream(); return; }
          const content = inputText.value.trim();
          if (!content) return;
          if (!activeSessionId.value) await newSession();

          streaming.value = true;
          streamingText.value = '';
          inputText.value = '';

          messages.value.push({ id: Date.now(), role: 'user', content, createdAt: new Date().toISOString() });
          await nextTick(); scrollToBottom();

          const ctrl = new AbortController();
          abortController.value = ctrl;

          try {
            const resp = await fetch(`/api/sessions/${activeSessionId.value}/messages/stream`, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ content }),
              signal: ctrl.signal,
            });

            if (!resp.ok) {
              const err = await resp.json().catch(() => ({ message: `HTTP ${resp.status}` }));
              throw new Error(err.message ?? `HTTP ${resp.status}`);
            }

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buf = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buf += decoder.decode(value, { stream: true });
              const lines = buf.split('\n');
              buf = lines.pop();

              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const raw = line.slice(6).trim();
                if (!raw || raw === '[DONE]') continue;
                try {
                  const evt = JSON.parse(raw);
                  if (evt.type === 'chunk') {
                    streamingText.value += evt.text;
                    await nextTick(); scrollToBottom();
                  } else if (evt.type === 'done') {
                    messages.value.push({
                      id: evt.messageId ?? Date.now() + 1,
                      role: 'assistant',
                      content: streamingText.value,
                      createdAt: new Date().toISOString(),
                    });
                    streamingText.value = '';
                    const s = sessions.value.find(s => s.id === activeSessionId.value);
                    if (s && s.title === 'New chat') {
                      try {
                        const fresh = await api('GET', `/api/sessions/${activeSessionId.value}`);
                        s.title = fresh.title;
                      } catch { /* non-critical */ }
                    }
                  } else if (evt.type === 'error') {
                    throw new Error(evt.message ?? 'Stream error');
                  }
                } catch { /* skip malformed SSE */ }
              }
            }
          } catch (e) {
            if (e.name === 'AbortError') {
              if (streamingText.value) {
                messages.value.push({ id: Date.now() + 1, role: 'assistant', content: streamingText.value, createdAt: new Date().toISOString() });
              }
              streamingText.value = '';
            } else {
              messages.value.push({ id: Date.now() + 1, role: 'system', content: 'Error: ' + e.message });
              streamingText.value = '';
            }
          } finally {
            streaming.value = false;
            abortController.value = null;
            await nextTick(); scrollToBottom();
          }
        }

        function scrollToBottom() {
          const el = document.getElementById('messages');
          if (el) el.scrollTop = el.scrollHeight;
        }

        function onKeydown(e) {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        // ─── Global keyboard shortcuts ────────────────────────────────
        function globalKeydown(e) {
          const mod = e.metaKey || e.ctrlKey;
          if (mod && e.key === 'n') { e.preventDefault(); newSession(); return; }
          if (mod && e.key === '/') { e.preventDefault(); showSettings.value ? (showSettings.value = false) : openSettings(); return; }
          if (e.key === 'Escape' && showSettings.value) { showSettings.value = false; }
        }

        // ─── Settings helpers ─────────────────────────────────────────
        async function openSettings() {
          showSettings.value = true;
          await loadSettingsData();
        }

        async function loadAgent() {
          try {
            const list = await api('GET', '/api/agents').catch(() => []);
            if (Array.isArray(list) && list.length > 0) {
              const a = list[0];
              agentData.value = { id: a.id, name: a.name, systemPrompt: a.systemPrompt, model: a.model };
            }
          } catch { /* ignore */ }
        }

        async function saveAgent() {
          if (!agentData.value) return;
          agentSaving.value = true;
          agentMsg.value = '';
          try {
            await api('PATCH', `/api/agents/${agentData.value.id}`, {
              name: agentData.value.name,
              systemPrompt: agentData.value.systemPrompt,
              model: agentData.value.model,
            });
            agentMsg.value = 'Saved!';
            setTimeout(() => { agentMsg.value = ''; }, 2500);
          } catch (e) {
            agentMsg.value = 'Error: ' + (e.message ?? 'failed');
          } finally {
            agentSaving.value = false;
          }
        }

        async function applyModel() {
          if (!modelPickProvider.value || !modelPickModel.value) return;
          modelSaving.value = true;
          modelMsg.value = '';
          try {
            const m = await api('PUT', '/api/models/active', {
              provider: modelPickProvider.value,
              model: modelPickModel.value,
            });
            modelInfo.value = m;
            modelMsg.value = 'Applied!';
            setTimeout(() => { modelMsg.value = ''; }, 2500);
          } catch (e) {
            modelMsg.value = 'Error: ' + (e instanceof Error ? e.message : 'failed');
          } finally {
            modelSaving.value = false;
          }
        }

        async function loadMemories() {
          try {
            const q = memoryQuery.value.trim();
            const path = q ? `/api/memories?q=${encodeURIComponent(q)}` : '/api/memories';
            const list = await api('GET', path).catch(() => []);
            memories.value = Array.isArray(list) ? list : [];
          } catch { /* ignore */ }
        }

        async function deleteMemoryItem(id) {
          if (!confirm('Delete this memory?')) return;
          try {
            await api('DELETE', `/api/memories/${id}`);
            await loadMemories();
          } catch (e) { alert('Error: ' + e.message); }
        }

        // ─── Scheduler helpers ────────────────────────────────────────
        async function loadTasks() {
          try {
            const list = await api('GET', '/api/tasks').catch(() => []);
            tasks.value = Array.isArray(list) ? list : [];
          } catch { /* ignore */ }
        }

        async function submitTask() {
          taskError.value = '';
          taskSuccess.value = '';
          if (!newTask.value.name.trim() || !newTask.value.cronExpr.trim() || !newTask.value.action.trim()) {
            taskError.value = 'Name, cron expression, and action are required.';
            return;
          }
          taskSaving.value = true;
          try {
            await api('POST', '/api/tasks', {
              name: newTask.value.name.trim(),
              cronExpr: newTask.value.cronExpr.trim(),
              action: newTask.value.action.trim(),
            });
            taskSuccess.value = 'Task created!';
            newTask.value = { name: '', cronExpr: '0 9 * * 1-5', action: 'agent_run' };
            await loadTasks();
            setTimeout(() => { taskSuccess.value = ''; }, 3000);
          } catch (e) {
            taskError.value = e.message ?? 'Failed to create task.';
          } finally {
            taskSaving.value = false;
          }
        }

        async function toggleTaskEnabled(task) {
          try {
            await api('PATCH', `/api/tasks/${task.id}`, { enabled: !task.enabled });
            await loadTasks();
          } catch (e) { alert('Error: ' + e.message); }
        }

        async function deleteTaskItem(id) {
          if (!confirm('Delete this task?')) return;
          try {
            await api('DELETE', `/api/tasks/${id}`);
            await loadTasks();
          } catch (e) { alert('Error: ' + e.message); }
        }

        // ─── Workstyle helpers ────────────────────────────────────────
        async function loadWorkstyle() {
          try {
            const list = await api('GET', '/api/context?layer=personal&docType=workstyle').catch(() => []);
            if (Array.isArray(list) && list.length > 0) {
              workstyleContent.value = list[0].content ?? '';
            }
          } catch { /* ignore */ }
        }

        async function saveWorkstyle() {
          if (!workstyleContent.value.trim()) return;
          workstyleSaving.value = true;
          workstyleMsg.value = '';
          try {
            await api('PUT', '/api/context/workstyle', { content: workstyleContent.value });
            workstyleMsg.value = 'Saved!';
            setTimeout(() => { workstyleMsg.value = ''; }, 2500);
          } catch (e) {
            workstyleMsg.value = 'Error: ' + (e.message ?? 'failed');
          } finally {
            workstyleSaving.value = false;
          }
        }

        // ─── Usage helpers ────────────────────────────────────────────
        async function loadUsage() {
          try {
            const [sum, daily, bgt] = await Promise.all([
              api('GET', '/api/usage/summary').catch(() => null),
              api('GET', '/api/usage/daily').catch(() => []),
              api('GET', '/api/usage/budget').catch(() => null),
            ]);
            usageSummary.value = sum;
            usageDaily.value = Array.isArray(daily) ? daily.slice(-7) : [];
            budgetStatus.value = bgt;
            if (bgt?.limit != null) budgetLimit.value = String(bgt.limit);
          } catch { /* ignore */ }
        }

        async function saveBudget() {
          budgetSaving.value = true;
          budgetMsg.value = '';
          try {
            await api('PUT', '/api/usage/budget', { limit: parseFloat(budgetLimit.value) });
            budgetMsg.value = 'Saved!';
            await loadUsage();
            setTimeout(() => { budgetMsg.value = ''; }, 2500);
          } catch (e) {
            budgetMsg.value = 'Error: ' + (e.message ?? 'failed');
          } finally {
            budgetSaving.value = false;
          }
        }

        // ─── Admin helpers ────────────────────────────────────────────
        function exportData(format) {
          const a = document.createElement('a');
          a.href = format === 'zip' ? '/api/admin/export' : `/api/admin/export/${format}`;
          a.download = format === 'zip' ? 'jowork-export.zip' : format === 'json' ? 'jowork-export.json' : 'jowork-export.md';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }

        async function triggerBackup() {
          adminMsg.value = '';
          adminWorking.value = true;
          try {
            await api('POST', '/api/admin/backup');
            adminMsg.value = 'Backup created successfully!';
            setTimeout(() => { adminMsg.value = ''; }, 3000);
          } catch (e) {
            adminMsg.value = 'Error: ' + (e.message ?? 'failed');
          } finally {
            adminWorking.value = false;
          }
        }

        async function checkUpdates() {
          adminWorking.value = true;
          adminMsg.value = 'Checking…';
          try {
            const info = await api('GET', '/api/admin/updates/check');
            updateInfo.value = info;
            adminMsg.value = info.updateAvailable ? `Update available: v${info.latest}` : 'Already up to date.';
            setTimeout(() => { adminMsg.value = ''; }, 5000);
          } catch {
            adminMsg.value = 'Could not check for updates.';
            setTimeout(() => { adminMsg.value = ''; }, 3000);
          } finally {
            adminWorking.value = false;
          }
        }

        async function handleImport(e) {
          const file = e.target.files?.[0];
          if (!file) return;
          if (!confirm('Restore from this backup? Existing data will be overwritten.')) {
            e.target.value = '';
            return;
          }
          adminMsg.value = 'Restoring…';
          adminWorking.value = true;
          try {
            const buf = await file.arrayBuffer();
            const r = await fetch('/api/admin/import', {
              method: 'POST',
              headers: { 'content-type': 'application/zip' },
              body: buf,
            });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            adminMsg.value = 'Restore complete! Refresh the page to see changes.';
          } catch (e) {
            adminMsg.value = 'Error: ' + (e.message ?? 'failed');
          } finally {
            adminWorking.value = false;
            e.target.value = '';
          }
        }

        async function loadSettingsData() {
          try {
            const [m, p] = await Promise.all([
              api('GET', '/api/models/active').catch(() => null),
              api('GET', '/api/models/providers').catch(() => ({ providers: [] })),

            providers.value = p?.providers ?? [];
            if (m) { modelPickProvider.value = m.provider; modelPickModel.value = m.model; }
          } catch { /* ignore */ }

          await Promise.all([loadConnectors(), loadAgent(), loadMemories(), loadTasks(), loadWorkstyle(), loadUsage()]);

          try {
            healthFull.value = await api('GET', '/health/full').catch(() => null);
          } catch { /* ignore */ }

          try {
            stats.value = await api('GET', '/api/stats').catch(() => null);
          } catch { /* ignore */ }
        }

        async function loadConnectors() {
          try {
            const [list, types] = await Promise.all([
              api('GET', '/api/connectors').catch(() => []),
              api('GET', '/api/connector-types').catch(() => []),
            ]);
            connectors.value = Array.isArray(list) ? list : [];
            connectorTypes.value = Array.isArray(types) ? types : [];
            if (connectorTypes.value.length > 0 && !newConn.value.kind) {
              newConn.value.kind = connectorTypes.value[0].id;
            }
          } catch { /* ignore */ }
        }

        async function addConnector() {
          connError.value = '';
          connSuccess.value = '';
          if (!newConn.value.kind || !newConn.value.name.trim() || !newConn.value.apiKey.trim()) {
            connError.value = 'Kind, name, and API key are required.';
            return;
          }
          connSaving.value = true;
          try {
            const settings = { apiKey: newConn.value.apiKey.trim(), ...newConn.value.extra };
            await api('POST', '/api/connectors', {
              kind: newConn.value.kind,
              name: newConn.value.name.trim(),
              settings,
            });
            connSuccess.value = 'Connector added!';
            newConn.value = { kind: newConn.value.kind, name: '', apiKey: '', extra: {} };
            await loadConnectors();
            setTimeout(() => { connSuccess.value = ''; }, 3000);
          } catch (e) {
            connError.value = e.message ?? 'Failed to add connector.';
          } finally {
            connSaving.value = false;
          }
        }

        async function removeConnector(id) {
          if (!confirm('Remove this connector?')) return;
          try {
            await api('DELETE', `/api/connectors/${id}`);
            await loadConnectors();
          } catch (e) {
            alert('Error: ' + e.message);
          }
        }

        function extraFields(kind) {
          return CONNECTOR_EXTRA_FIELDS[kind] ?? [];
        }

        function connIcon(kind) {
          return CONNECTOR_ICONS[kind] ?? '🔌';
        }

        // ─── Lifecycle ────────────────────────────────────────────────
        onMounted(async () => {
          document.addEventListener('keydown', globalKeydown);
          await Promise.all([checkHealth(), loadEdition()]);
          await loadSessions();
          if (sessions.value.length === 0) await newSession();
          else await selectSession(sessions.value[0].id);
          setInterval(checkHealth, 15_000);
        });

        onUnmounted(() => {
          document.removeEventListener('keydown', globalKeydown);
        });

        return {
          sessions, activeSessionId, messages, inputText, streaming, streamingText, healthy, activeSession, edition, engineName,
          selectSession, newSession, sendMessage, onKeydown,
          renamingSessionId, renameText, startRename, confirmRename, cancelRename, deleteSession,
          showSettings, settingsTab, modelInfo, providers, modelPickProvider, modelPickModel, modelSaving, modelMsg,
          connectors, connectorTypes, stats, healthFull,
          newConn, connError, connSuccess, connSaving,
          agentData, agentSaving, agentMsg,
          memories, memoryQuery,
          tasks, newTask, taskError, taskSuccess, taskSaving,
          workstyleContent, workstyleSaving, workstyleMsg,
          usageSummary, usageDaily, budgetStatus, budgetLimit, budgetSaving, budgetMsg, dailyMax, budgetPct,
          adminMsg, adminWorking, updateInfo,
          openSettings, applyModel, addConnector, removeConnector, extraFields, connIcon, renderMd,
          saveAgent, loadMemories, deleteMemoryItem,
          submitTask, toggleTaskEnabled, deleteTaskItem,
          saveWorkstyle, saveBudget, exportData, triggerBackup, checkUpdates, handleImport,
        };
      },

      template: `

            <div class="modal-body">

                      <span v-if="modelMsg" style="font-size:12px;color:#22c55e">{{ modelMsg }}</span>
                    </div>
                    <p style="font-size:11px;color:#6b7a99;margin-top:2px">Changes apply immediately but reset on restart. Set MODEL_PROVIDER / MODEL_NAME env vars for permanent config.</p>
                  </div>
                </div>
                <div class="setting-section">
                  <h3>API Keys</h3>
                  <div class="info-row">
                    <span class="info-label">Anthropic</span>
                    <span class="info-value" style="color:#6b7a99;font-size:12px">ANTHROPIC_API_KEY env var</span>
                  </div>
                  <div class="info-row" style="margin-top:4px">
                    <span class="info-label">OpenAI</span>
                    <span class="info-value" style="color:#6b7a99;font-size:12px">OPENAI_API_KEY env var</span>
                  </div>
                </div>
              </div>

              <!-- Connectors tab -->
              <div v-if="settingsTab === 'connectors'">
                <div class="setting-section">
                  <h3>Connected ({{ connectors.length }})</h3>
                  <div v-if="connectors.length === 0" class="empty-msg">No connectors configured yet.</div>
                  <div v-for="c in connectors" :key="c.id" class="connector-item">
                    <div class="connector-icon" style="background:#1f2a3c">{{ connIcon(c.kind) }}</div>
                    <div class="connector-info">
                      <div class="connector-name">{{ c.name }}</div>
                      <div class="connector-kind">{{ c.kind }}</div>
                    </div>
                    <button class="connector-delete" @click="removeConnector(c.id)">Remove</button>
                  </div>
                </div>
                <div class="add-connector-form">
                  <h4>Add Connector</h4>
                  <div class="form-row">
                    <label>Type</label>
                    <select v-model="newConn.kind">
                      <option v-for="t in connectorTypes" :key="t.id" :value="t.id">{{ t.name || t.id }}</option>
                    </select>
                  </div>
                  <div class="form-row">
                    <label>Name</label>
                    <input v-model="newConn.name" placeholder="My GitHub" type="text" />
                  </div>
                  <div class="form-row">
                    <label>API Key / Token</label>
                    <input v-model="newConn.apiKey" placeholder="Paste your token here" type="password" />
                  </div>
                  <template v-for="f in extraFields(newConn.kind)" :key="f.key">
                    <div class="form-row">
                      <label>{{ f.label }}</label>
                      <input v-model="newConn.extra[f.key]" :placeholder="f.placeholder" type="text" />
                    </div>
                  </template>
                  <button class="btn-primary" :disabled="connSaving" @click="addConnector">
                    {{ connSaving ? 'Adding…' : 'Add Connector' }}
                  </button>
                  <div v-if="connError" class="form-error">{{ connError }}</div>
                  <div v-if="connSuccess" class="form-success">{{ connSuccess }}</div>
                </div>
              </div>

              <!-- Memories tab -->
              <div v-if="settingsTab === 'memories'">
                <div class="setting-section">
                  <h3>Memories ({{ memories.length }})</h3>
                  <input
                    class="memory-search"
                    v-model="memoryQuery"
                    placeholder="Search memories…"
                    @input="loadMemories"
                    type="text"
                  />
                  <div v-if="memories.length === 0" class="empty-msg">No memories yet. The agent saves memories during conversations.</div>
                  <div v-for="m in memories" :key="m.id" class="memory-item">
                    <div style="flex:1">
                      <div class="memory-content">{{ m.content }}</div>
                      <div class="memory-meta">{{ m.source ?? 'agent' }} · {{ m.createdAt ? new Date(m.createdAt).toLocaleDateString() : '' }}</div>
                    </div>
                    <button class="memory-delete" @click="deleteMemoryItem(m.id)">✕</button>
                  </div>
                </div>
              </div>

              <!-- Scheduler tab -->
              <div v-if="settingsTab === 'scheduler'">
                <div class="setting-section">
                  <h3>Scheduled Tasks ({{ tasks.length }})</h3>
                  <div v-if="tasks.length === 0" class="empty-msg">No scheduled tasks yet.</div>
                  <div v-for="t in tasks" :key="t.id" class="task-item">
                    <div class="task-info">
                      <div class="task-name">{{ t.name }}</div>
                      <div class="task-meta">{{ t.cronExpr }} · {{ t.action }}</div>
                    </div>
                    <button :class="['task-toggle', t.enabled ? 'on' : '']" @click="toggleTaskEnabled(t)">
                      {{ t.enabled ? 'On' : 'Off' }}
                    </button>
                    <button class="task-delete" @click="deleteTaskItem(t.id)">✕</button>
                  </div>
                </div>
                <div class="add-connector-form">
                  <h4>New Scheduled Task</h4>
                  <div class="form-row">
                    <label>Task Name</label>
                    <input v-model="newTask.name" type="text" placeholder="Daily standup summary" />
                  </div>
                  <div class="form-row">
                    <label>Cron Expression</label>
                    <input v-model="newTask.cronExpr" type="text" placeholder="0 9 * * 1-5" />
                  </div>
                  <div class="form-row">
                    <label>Action</label>
                    <input v-model="newTask.action" type="text" placeholder="agent_run" />
                  </div>
                  <button class="btn-primary" :disabled="taskSaving" @click="submitTask">
                    {{ taskSaving ? 'Creating…' : 'Create Task' }}
                  </button>
                  <div v-if="taskError" class="form-error">{{ taskError }}</div>
                  <div v-if="taskSuccess" class="form-success">{{ taskSuccess }}</div>
                </div>
              </div>

              <!-- Usage tab -->
              <div v-if="settingsTab === 'usage'">
                <div class="setting-section" v-if="usageSummary">
                  <h3>Summary</h3>
                  <div class="info-row">
                    <span class="info-label">Total Tokens</span>
                    <span class="info-value">{{ (usageSummary.totalTokens ?? 0).toLocaleString() }}</span>
                  </div>
                  <div class="info-row">
                    <span class="info-label">Total Cost</span>
                    <span class="info-value">\${{ (usageSummary.totalCost ?? 0).toFixed(4) }}</span>
                  </div>
                  <template v-if="usageSummary.byModel && Object.keys(usageSummary.byModel).length > 0">
                    <div style="margin-top:12px">
                      <div class="setting-section">
                        <h3>By Model</h3>
                        <div v-for="(v, k) in usageSummary.byModel" :key="k" class="info-row">
                          <span class="info-label" style="font-family:monospace;font-size:12px">{{ k }}</span>
                          <span class="info-value" style="font-size:12px">\${{ (v.cost ?? 0).toFixed(4) }} · {{ (v.tokens ?? 0).toLocaleString() }} tok</span>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
                <div class="setting-section">
                  <h3>Monthly Budget</h3>
                  <template v-if="budgetStatus">
                    <div class="info-row">
                      <span class="info-label">Current Spend</span>
                      <span :class="['badge', budgetStatus.level === 'ok' ? 'green' : budgetStatus.level === 'warn' ? 'blue' : 'red']">
                        \${{ (budgetStatus.currentSpend ?? 0).toFixed(4) }}
                      </span>
                    </div>
                    <div v-if="budgetStatus.limit" class="info-row">
                      <span class="info-label">Budget Limit</span>
                      <span class="info-value">\${{ budgetStatus.limit }}</span>
                    </div>
                    <div v-if="budgetStatus.limit" style="margin:8px 12px 12px">
                      <div class="usage-bar-wrap">
                        <div :class="['usage-bar', budgetStatus.level && budgetStatus.level !== 'ok' ? budgetStatus.level : '']"
                             :style="{ width: budgetPct + '%' }"></div>
                      </div>
                      <div style="font-size:11px;color:#6b7a99;margin-top:4px;text-align:right">{{ budgetPct }}% used</div>
                    </div>
                  </template>
                  <div class="form-row" style="margin-top:8px">
                    <label>Set Monthly Budget ($)</label>
                    <input v-model="budgetLimit" type="number" min="0" step="1" placeholder="e.g. 20" />
                  </div>
                  <button class="btn-primary" :disabled="budgetSaving || !budgetLimit" @click="saveBudget">
                    {{ budgetSaving ? 'Saving…' : 'Save Budget' }}
                  </button>
                  <span v-if="budgetMsg" :style="{ color: budgetMsg.startsWith('Error') ? '#f87171' : '#22c55e', marginLeft: '10px', fontSize: '12px' }">{{ budgetMsg }}</span>
                </div>
                <div class="setting-section" v-if="usageDaily.length > 0">
                  <h3>Last 7 Days</h3>
                  <div v-for="d in usageDaily" :key="d.date" class="daily-row">
                    <span class="daily-date">{{ d.date }}</span>
                    <div class="daily-bar-wrap">
                      <div class="daily-bar" :style="{ width: Math.round(((d.totalCost ?? 0) / dailyMax) * 100) + '%' }"></div>
                    </div>
                    <span class="daily-cost">\${{ (d.totalCost ?? 0).toFixed(4) }}</span>
                  </div>
                </div>
                <div v-if="!usageSummary && !budgetStatus" class="empty-msg">No usage data yet. Start chatting to track token usage.</div>
              </div>

              <!-- Admin tab -->
              <div v-if="settingsTab === 'admin'">
                <div class="setting-section">
                  <h3>Maintenance</h3>
                  <div class="admin-btn-row">
                    <button class="btn-secondary" :disabled="adminWorking" @click="triggerBackup">Manual Backup</button>
                    <button class="btn-secondary" :disabled="adminWorking" @click="checkUpdates">Check for Updates</button>
                  </div>
                  <div v-if="updateInfo" class="info-row" style="margin-top:10px">
                    <span class="info-label">Latest version</span>
                    <span :class="['badge', updateInfo.updateAvailable ? 'blue' : 'green']">
                      {{ updateInfo.latest ?? 'unknown' }}{{ updateInfo.updateAvailable ? ' (available)' : ' (current)' }}
                    </span>
                  </div>
                  <div v-if="adminMsg" :style="{ color: adminMsg.startsWith('Error') ? '#f87171' : '#22c55e', fontSize: '12px', marginTop: '8px' }">{{ adminMsg }}</div>
                </div>
                <div class="setting-section">
                  <h3>Export Data</h3>
                  <div class="admin-btn-row">
                    <button class="btn-secondary" @click="exportData('zip')">⬇ Download ZIP</button>
                    <button class="btn-secondary" @click="exportData('json')">⬇ Export JSON</button>
                    <button class="btn-secondary" @click="exportData('markdown')">⬇ Export Markdown</button>
                  </div>
                  <p style="font-size:12px;color:#6b7a99;margin-top:6px">ZIP contains all sessions, memories, context docs, and config.</p>
                </div>
                <div class="setting-section">
                  <h3>Restore from Backup</h3>
                  <p style="font-size:12px;color:#f87171;margin-bottom:10px">⚠ This will overwrite your existing data.</p>
                  <label style="cursor:pointer">
                    <span class="btn-danger-outline">⬆ Upload backup ZIP…</span>
                    <input type="file" accept=".zip" style="display:none" @change="handleImport" :disabled="adminWorking" />
                  </label>
                </div>
              </div>

              <!-- System tab -->
              <div v-if="settingsTab === 'system'">
                <div class="setting-section" v-if="stats">
                  <h3>Usage Stats</h3>
                  <div class="stats-grid">
                    <div class="stat-card">
                      <div class="stat-value">{{ stats.sessions ?? 0 }}</div>
                      <div class="stat-label">Sessions</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">{{ stats.messages ?? 0 }}</div>
                      <div class="stat-label">Messages</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">{{ stats.memories ?? 0 }}</div>
                      <div class="stat-label">Memories</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">{{ stats.connectors ?? 0 }}</div>
                      <div class="stat-label">Connectors</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">{{ stats.agents ?? 0 }}</div>
                      <div class="stat-label">Agents</div>
                    </div>
                  </div>
                </div>
                <div class="setting-section">
                  <h3>Health</h3>
                  <div class="info-row">
                    <span class="info-label">Status</span>
                    <span :class="['badge', healthy ? 'green' : 'red']">{{ healthy ? 'Online' : 'Offline' }}</span>
                  </div>
                  <template v-if="healthFull">
                    <div v-if="healthFull.db" class="info-row">
                      <span class="info-label">Database</span>
                      <span :class="['badge', healthFull.db.status === 'ok' ? 'green' : 'red']">{{ healthFull.db.status }}</span>
                    </div>
                    <div v-if="healthFull.disk && healthFull.disk.freeGb != null" class="info-row">
                      <span class="info-label">Disk free</span>
                      <span class="info-value">{{ healthFull.disk.freeGb }} GB</span>
                    </div>
                    <div v-if="healthFull.uptime != null" class="info-row">
                      <span class="info-label">Uptime</span>
                      <span class="info-value">{{ Math.floor(healthFull.uptime / 60) }}m {{ healthFull.uptime % 60 }}s</span>
                    </div>
                    <div v-if="healthFull.version" class="info-row">
                      <span class="info-label">Version</span>
                      <span class="info-value">{{ healthFull.version }}</span>
                    </div>
                  </template>
                </div>
              </div>

            </div>
          </div>
        </div>
      `,
    };

    createApp(App).mount('#app');
  </script>
</body>
</html>
