<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
(function(){
  const t = localStorage.getItem('jowork_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<link rel="stylesheet" href="/styles/tokens.css">
<script src="/tauri-bridge.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg, #1c1c1e);
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  width: 100vw;
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

.wrap { text-align: center; }

img {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-lg, 16px);
  margin-bottom: 20px;
  opacity: 0.9;
}

.dot { display: inline-block; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* Error banner */
.error-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--red, #ff4d6a);
  color: #fff;
  padding: 10px 20px;
  font-size: 13px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 100;
}
.error-bar.show { display: flex; }
.error-bar button {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: background 0.15s;
}
.error-bar button:hover { background: rgba(255,255,255,0.3); }

.status-text {
  color: var(--text3);
  margin-top: 12px;
  font-size: 12px;
}

/* Settings FAB */
.settings-fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md, 10px);
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: color 0.15s, background 0.15s;
}
.settings-fab:hover {
  color: var(--text2);
  background: var(--surface-hover);
}
</style>
</head>
<body>

<!-- Error banner -->
<div class="error-bar" id="errorBar">
  <span id="errorMsg">Unable to connect</span>
  <button onclick="retry()">Retry</button>
</div>

<div class="wrap" id="loadingWrap" style="display:none">
  <img src="/app-icon.png" onerror="this.style.display='none'">
  <div>Starting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="status-text" id="status"></div>
</div>

<!-- Settings 入口：始终可访问 -->
<a class="settings-fab" href="tauri://localhost/app-settings.html" title="App Settings">
  <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
    <circle cx="8" cy="8" r="2.5"/>
    <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1 1M11.8 11.8l1 1M3.2 12.8l1-1M11.8 4.2l1-1"/>
  </svg>
</a>

<script>
(async function boot() {
  if (!window.__TAURI__?.core) {
    // Not running inside Tauri — redirect to SaaS default
    location.href = 'https://jowork.work';
    return;
  }
  const { invoke } = window.__TAURI__.core;
  const statusEl = document.getElementById('status');
  const errorBar = document.getElementById('errorBar');
  const errorMsg = document.getElementById('errorMsg');
  const wrap = document.getElementById('loadingWrap');

  let mode, gatewayUrl;
  try {
    mode = await invoke('get_app_mode');
    gatewayUrl = await invoke('get_default_gateway_url');
  } catch {
    mode = 'saas';
    gatewayUrl = 'https://jowork.work';
  }

  if (mode === 'local') {
    location.href = '/shell.html';
    return;
  }

  if (mode === 'saas') {
    // SaaS: 立即跳转，不显示任何中间 UI
    location.href = gatewayUrl;
    return;
  }

  // self_hosted 模式才显示加载 UI（需要等待本地 gateway 启动）
  wrap.style.display = '';

  {
    // Self-hosted: poll local gateway health
    const healthUrl = 'http://127.0.0.1:18800/health';
    const setupUrl  = 'http://127.0.0.1:18800/setup.html';
    let attempts = 0;
    const maxAttempts = 40; // 20 seconds max

    async function poll() {
      attempts++;
      if (attempts > 3) statusEl.textContent = 'Waiting for gateway...';
      try {
        const r = await fetch(healthUrl, { mode: 'no-cors' });
        // no-cors gives opaque response (status 0), but if it doesn't throw, server is reachable
        location.href = setupUrl;
      } catch {
        if (attempts >= maxAttempts) {
          errorMsg.textContent = 'Cannot connect to local gateway';
          errorBar.classList.add('show');
          statusEl.textContent = '';
          return;
        }
        setTimeout(poll, 500);
      }
    }
    poll();
  }

  // Global retry (for error banner)
  window.retry = function() {
    errorBar.classList.remove('show');
    if (mode === 'saas') {
      location.href = gatewayUrl;
    } else {
      statusEl.textContent = 'Retrying...';
      // Reset poll
      let retryAttempts = 0;
      async function retryPoll() {
        retryAttempts++;
        try {
          await fetch('http://127.0.0.1:18800/health', { mode: 'no-cors' });
          location.href = 'http://127.0.0.1:18800/setup.html';
        } catch {
          if (retryAttempts >= 20) {
            errorMsg.textContent = 'Cannot connect to local gateway';
            errorBar.classList.add('show');
            statusEl.textContent = '';
            return;
          }
          setTimeout(retryPoll, 500);
        }
      }
      retryPoll();
    }
  };
})();
</script>
</body>
</html>
