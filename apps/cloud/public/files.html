<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件管理器</title>
<link rel="stylesheet" href="/styles/tokens.css">
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="/vendor/marked.min.js"></script>
<script src="/friendly-error.js"></script>
<script src="/tauri-bridge.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  font-size: var(--font-sm, 13px);
  background: var(--bg);
  color: var(--text);
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ═══ Root layout — full-bleed, no body padding ═══ */
#root {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* ═══ Left tree panel ═══ */
#tree-panel {
  width: 260px;
  min-width: 200px;
  max-width: 360px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 0.5px solid var(--border);
  overflow: hidden;
}

/* Toolbar */
#tree-toolbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-bottom: 0.5px solid var(--border);
}

.toolbar-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm, 8px);
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.toolbar-btn:hover {
  background: var(--surface-hover);
  color: var(--text);
}

#tree-path {
  flex: 1;
  padding: 0 4px;
  font-size: 12px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Add workspace input */
#add-input-wrap {
  display: none;
  padding: 8px 12px;
  border-bottom: 0.5px solid var(--border);
}
#add-input-wrap.show { display: block; }
#add-input {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm, 8px);
  border: 1px solid var(--accent-border);
  background: var(--surface-glass);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}
#add-input:focus { border-color: var(--accent); }
#add-input::placeholder { color: var(--text3); }

/* Tree scroll area */
#tree-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 0;
}

/* Tree empty state */
#tree-empty {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 48px 20px;
  color: var(--text3);
  text-align: center;
}
#tree-empty.show { display: flex; }
.tree-empty-icon { font-size: 36px; opacity: 0.5; }
.tree-empty-text { font-size: 14px; line-height: 1.5; color: var(--text2); }
.tree-empty-btn {
  margin-top: 4px;
  padding: 8px 16px;
  border-radius: var(--radius-sm, 8px);
  border: 1px solid var(--accent-border);
  background: var(--accent-bg);
  color: var(--accent-text);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.tree-empty-btn:hover {
  background: rgba(157,216,74,0.15);
  border-color: rgba(157,216,74,0.35);
}

/* Tree node */
.tree-node { outline: none; }

.tree-row {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 32px;
  padding: 8px 12px;
  padding-right: 12px;
  cursor: pointer;
  border-radius: var(--radius-sm, 8px);
  margin: 0 4px;
  transition: background 0.15s;
  position: relative;
}
.tree-row:hover { background: var(--surface-hover); }
.tree-node.selected > .tree-row { background: var(--accent-bg); }
.tree-node:focus > .tree-row {
  outline: 2px solid var(--focus-ring);
  outline-offset: -2px;
}

.tree-toggle {
  width: 10px;
  flex-shrink: 0;
  font-size: 10px;
  color: var(--text3);
  text-align: center;
  transition: transform 0.15s;
  line-height: 1;
}
.tree-toggle.open { transform: rotate(90deg); }

.tree-icon {
  font-size: 13px;
  flex-shrink: 0;
  line-height: 1;
}

.tree-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: var(--text2);
  line-height: 1;
}
.tree-node.is-dir > .tree-row .tree-name { color: var(--text); }

.tree-children { }

/* Workspace root node */
.workspace-root > .tree-row { font-weight: 500; }
.workspace-root > .tree-row .workspace-remove {
  width: 20px;
  height: 20px;
  border-radius: var(--radius-xs, 4px);
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  padding: 0;
  margin-left: auto;
  transition: background 0.15s, color 0.15s;
}
.workspace-root > .tree-row:hover .workspace-remove { display: flex; }
.workspace-remove:hover {
  background: var(--red-bg) !important;
  color: var(--red) !important;
}

/* Loading node */
.tree-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  color: var(--text3);
  font-size: 12px;
}

/* Error node */
.tree-error {
  padding: 8px 16px;
  color: var(--red);
  font-size: 12px;
}

/* ═══ Right content panel (hidden in sidebar mode) ═══ */
#content-panel {
  display: none;
}

/* Tab bar */
#tab-bar {
  flex-shrink: 0;
  height: 40px;
  display: flex;
  align-items: flex-end;
  padding: 0 12px;
  gap: 2px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
#tab-bar.hidden { display: none; }

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  height: 32px;
  border-radius: var(--radius-sm, 8px) var(--radius-sm, 8px) 0 0;
  background: transparent;
  border: 0.5px solid transparent;
  border-bottom: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s;
  max-width: 200px;
}
.tab:hover { background: var(--surface-hover); }
.tab.active {
  background: var(--bg);
  border-color: var(--border);
  border-bottom-color: var(--bg);
}

.tab-icon { font-size: 12px; line-height: 1; flex-shrink: 0; }
.tab-name {
  font-size: 12px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.tab.active .tab-name { color: var(--text); }

.tab-close {
  width: 18px;
  height: 18px;
  border-radius: var(--radius-xs, 4px);
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  line-height: 1;
  transition: background 0.15s, color 0.15s;
  padding: 0;
}
.tab-close:hover {
  background: var(--surface-hover);
  color: var(--text);
}

/* Tab content area */
#tab-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#tab-content.hidden { display: none; }

.tab-panel {
  position: absolute;
  inset: 0;
  display: none;
  overflow: auto;
}
.tab-panel.active { display: block; }

/* Markdown rendering */
.md-body {
  padding: 24px;
  max-width: 800px;
  margin: 0 auto;
  color: var(--text);
  font-size: 14px;
  line-height: 1.7;
  user-select: text;
}
.md-body h1, .md-body h2, .md-body h3,
.md-body h4, .md-body h5, .md-body h6 {
  color: var(--text);
  margin: 1.5em 0 0.6em;
  line-height: 1.3;
  font-weight: 600;
}
.md-body h1 {
  font-size: 22px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.4em;
}
.md-body h2 {
  font-size: 18px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}
.md-body h3 { font-size: 16px; }
.md-body p { margin: 0.8em 0; }
.md-body a { color: var(--accent-text); text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body code {
  background: var(--surface-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs, 4px);
  padding: 2px 6px;
  font-family: var(--font-mono, 'JetBrains Mono', 'Menlo', monospace);
  font-size: 13px;
  color: var(--accent-text);
}
.md-body pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md, 10px);
  padding: 16px;
  overflow-x: auto;
  margin: 1em 0;
}
.md-body pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--text);
  font-size: 13px;
}
.md-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 0 4px 16px;
  margin: 1em 0;
  color: var(--text2);
}
.md-body ul, .md-body ol { padding-left: 1.5em; margin: 0.6em 0; }
.md-body li { margin: 0.25em 0; }
.md-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.md-body th, .md-body td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.md-body th { background: var(--surface-glass); font-weight: 600; }
.md-body img { max-width: 100%; border-radius: var(--radius-sm, 8px); }
.md-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

/* HTML iframe */
.html-frame {
  width: 100%;
  height: 100%;
  border: none;
  background: #fff;
}

/* Loading state */
.panel-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  font-size: 14px;
  gap: 8px;
}

/* Empty state */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text3);
  background: var(--bg);
}
#empty-state.hidden { display: none; }
.empty-icon { font-size: 36px; opacity: 0.5; }
.empty-text { font-size: 14px; color: var(--text2); }
.empty-sub { font-size: 12px; color: var(--text3); }

/* Init error */
#init-error {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--red);
  font-size: 14px;
}
</style>
</head>
<body>

<div id="root">
  <!-- 左侧文件树 -->
  <div id="tree-panel">
    <div id="tree-toolbar">
      <button class="toolbar-btn" id="add-btn" title="添加工作目录">+</button>
      <span id="tree-path">工作目录</span>
    </div>
    <div id="add-input-wrap">
      <input id="add-input" type="text" placeholder="输入目录路径，回车确认" spellcheck="false" />
    </div>
    <div id="tree-scroll">
      <div id="tree-empty">
        <div class="tree-empty-icon">📂</div>
        <div class="tree-empty-text">尚未添加工作目录</div>
        <button class="tree-empty-btn" id="empty-add-btn">添加目录</button>
      </div>
      <div id="tree-root"></div>
    </div>
  </div>

  <!-- 右侧内容区 -->
  <div id="content-panel">
    <div id="tab-bar" class="hidden"></div>
    <div id="tab-content" class="hidden"></div>
    <div id="empty-state">
      <div class="empty-icon">📂</div>
      <div class="empty-text" data-i18n="files.empty_text">点击 .html 或 .md 文件在此预览</div>
      <div class="empty-sub" data-i18n="files.empty_sub">选中文件后按空格触发 Quick Look</div>
    </div>
  </div>
</div>

<script>
// ═══ 状态 ═══
let token = null;
let selectedNode = null;

// ═══ 工作目录持久化 ═══
const WORKSPACES_KEY = 'jowork_files_workspaces';

function loadWorkspaces() {
  try { return JSON.parse(localStorage.getItem(WORKSPACES_KEY) || '[]'); }
  catch { return []; }
}
function saveWorkspacesData(roots) {
  localStorage.setItem(WORKSPACES_KEY, JSON.stringify(roots));
}

// ═══ 树状态持久化 ═══
const TREE_STATE_KEY = 'jowork_files_tree_state';

function loadTreeState() {
  try { return JSON.parse(localStorage.getItem(TREE_STATE_KEY) || '{}'); }
  catch { return {}; }
}
function saveTreeState(update) {
  const s = loadTreeState();
  localStorage.setItem(TREE_STATE_KEY, JSON.stringify({ ...s, ...update }));
}

// 展开目录集合（从持久化状态初始化）
const expandedDirs = new Set(loadTreeState().expandedDirs || []);

// ═══ Token 获取（从 shell iframe 消息接收） ═══
window.addEventListener('message', (e) => {
  if (e.data?.type === 'SHELL_TOKEN') {
    if (e.data.appMode === 'local') {
      document.getElementById('tree-root').innerHTML = '<div style="text-align:center;padding:48px 16px;color:var(--text2);font-size:var(--font-h3, 15px)">本地模式 — 文件管理仅在服务器模式下可用</div>';
      return;
    }
    if (!e.data.token) return;
    token = e.data.token;
    if (document.getElementById('tree-root').children.length === 0) initWorkspaces();
  }
});
window.parent.postMessage({ type: 'REQUEST_TOKEN' }, '*');

// 降级：直接从 localStorage 读
setTimeout(() => {
  if (!token) {
    const stored = localStorage.getItem('jowork_token');
    if (stored) { token = stored; initWorkspaces(); }
  }
}, 600);

// ═══ API 工具 ═══
async function apiFetch(path, opts = {}) {
  const resp = await fetch(path, {
    signal: AbortSignal.timeout(8000),
    ...opts,
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(text || friendlyHttpStatus(resp.status));
  }
  return resp.json();
}

// ═══ 文件图标 ═══
function fileIcon(entry) {
  if (entry.is_dir) return '📁';
  const icons = {
    html: '🌐', htm: '🌐',
    md: '📝', markdown: '📝',
    ts: '⚡', tsx: '⚡', js: '⚡', jsx: '⚡',
    css: '🎨', scss: '🎨', less: '🎨',
    json: '📋', yaml: '📋', yml: '📋', toml: '📋',
    png: '🖼', jpg: '🖼', jpeg: '🖼', gif: '🖼', svg: '🖼', webp: '🖼',
    pdf: '📕',
    zip: '📦', gz: '📦', tar: '📦',
    sh: '⚙️', bash: '⚙️',
    rs: '🦀', go: '🐹', py: '🐍', rb: '💎',
    txt: '📄', log: '📄', csv: '📄',
  };
  return icons[entry.ext] || '📄';
}

// ═══ 工作目录初始化 ═══
async function initWorkspaces() {
  const roots = loadWorkspaces();
  const treeRoot = document.getElementById('tree-root');
  const treeEmpty = document.getElementById('tree-empty');

  if (roots.length === 0) {
    treeRoot.innerHTML = '';
    treeEmpty.classList.add('show');
    document.getElementById('tree-path').textContent = '工作目录';
    return;
  }

  treeEmpty.classList.remove('show');
  treeRoot.innerHTML = '';

  for (const rootPath of roots) {
    const name = rootPath.split('/').filter(Boolean).pop() || rootPath;
    const entry = { name, path: rootPath, is_dir: true, ext: '' };
    const node = createTreeNode(entry, 0);
    node.classList.add('workspace-root');

    // 移除按钮
    const removeBtn = document.createElement('button');
    removeBtn.className = 'workspace-remove';
    removeBtn.textContent = '×';
    removeBtn.title = '移除工作目录';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeWorkspace(rootPath);
    });
    node.querySelector('.tree-row').appendChild(removeBtn);

    treeRoot.appendChild(node);
  }

  document.getElementById('tree-path').textContent =
    roots.length === 1 ? roots[0].split('/').filter(Boolean).pop() : `${roots.length} 个工作目录`;

  // 恢复展开状态
  await restoreExpandedDirs(treeRoot);
  // 恢复滚动位置
  const state = loadTreeState();
  if (state.scrollTop) {
    document.getElementById('tree-scroll').scrollTop = state.scrollTop;
  }
  // 恢复选中高亮
  if (state.selectedPath) {
    const node = document.querySelector(`.tree-node[data-path="${CSS.escape(state.selectedPath)}"]`);
    if (node) selectNode(node);
  }
}

// ═══ 工作目录管理 ═══
function addWorkspace(path) {
  const roots = loadWorkspaces();
  const normalized = path.replace(/\/+$/, '');
  if (roots.includes(normalized)) return;
  roots.push(normalized);
  saveWorkspacesData(roots);
  initWorkspaces();
}

function removeWorkspace(path) {
  const roots = loadWorkspaces().filter(r => r !== path);
  saveWorkspacesData(roots);
  // 清理该目录下的展开记录
  for (const p of [...expandedDirs]) {
    if (p === path || p.startsWith(path + '/')) expandedDirs.delete(p);
  }
  saveTreeState({ expandedDirs: [...expandedDirs] });
  initWorkspaces();
}

// 递归按 expandedDirs 集合恢复展开状态
async function restoreExpandedDirs(container) {
  const nodes = container.querySelectorAll(':scope > .tree-node.is-dir');
  for (const node of nodes) {
    const path = node.dataset.path;
    if (!expandedDirs.has(path)) continue;
    const toggle = node.querySelector(':scope > .tree-row .tree-toggle');
    const children = node.querySelector(':scope > .tree-children');
    if (!toggle || !children || !children.hidden) continue;
    children.hidden = false;
    toggle.classList.add('open');
    node.querySelector(':scope > .tree-row .tree-icon').textContent = '📂';
    if (!children._loaded) {
      children._loaded = true;
      await loadDirInto(children, path, parseInt(node.dataset.depth || '0') + 1);
    }
    await restoreExpandedDirs(children);
  }
}

// ═══ 添加工作目录 ═══
document.getElementById('add-btn').addEventListener('click', pickWorkspaceDir);
document.getElementById('empty-add-btn').addEventListener('click', pickWorkspaceDir);

async function pickWorkspaceDir() {
  // Tauri 环境：原生文件夹选择器
  if (window.__TAURI__) {
    try {
      const { open } = window.__TAURI__.dialog || await import('@tauri-apps/plugin-dialog');
      const selected = await open({ directory: true, multiple: false, title: '选择工作目录' });
      if (selected) addWorkspace(selected);
    } catch (err) {
      console.error('[files] native dialog failed:', err);
      showAddInput(); // fallback 到文本输入
    }
    return;
  }
  // Web 环境：文本输入 fallback
  showAddInput();
}

function showAddInput() {
  const wrap = document.getElementById('add-input-wrap');
  const input = document.getElementById('add-input');
  wrap.classList.add('show');
  input.value = '';
  input.focus();
}

function hideAddInput() {
  document.getElementById('add-input-wrap').classList.remove('show');
}

document.getElementById('add-input').addEventListener('keydown', async (e) => {
  if (e.key === 'Escape') { hideAddInput(); return; }
  if (e.key === 'Enter') {
    const path = e.target.value.trim();
    if (!path) return;
    try {
      await apiFetch(`/api/files/dir?path=${encodeURIComponent(path)}`);
      addWorkspace(path);
      hideAddInput();
    } catch (err) {
      console.error('[files] addWorkspace validation failed:', err);
      e.target.style.borderColor = 'rgba(255,100,100,0.6)';
      e.target.placeholder = err.name === 'AbortError' ? '请求超时，请检查网络' : '路径无效或无权限';
      setTimeout(() => { e.target.style.borderColor = ''; e.target.placeholder = '输入目录路径，回车确认'; }, 2000);
    }
  }
});

document.getElementById('add-input').addEventListener('blur', () => {
  setTimeout(hideAddInput, 150);
});

// 滚动位置（debounce 300ms）
let _scrollTimer = null;
document.getElementById('tree-scroll').addEventListener('scroll', () => {
  clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(() => {
    saveTreeState({ scrollTop: document.getElementById('tree-scroll').scrollTop });
  }, 300);
});

// ═══ 加载目录 ═══
async function loadDirInto(container, dirPath, depth) {
  container.innerHTML = '<div class="tree-loading">加载中...</div>';
  try {
    const { entries } = await apiFetch(`/api/files/dir?path=${encodeURIComponent(dirPath)}`);
    container.innerHTML = '';
    if (entries.length === 0) {
      container.innerHTML = '<div class="tree-loading" style="color:rgba(255,255,255,0.15)">空目录</div>';
      return;
    }
    entries.forEach(entry => {
      container.appendChild(createTreeNode(entry, depth));
    });
  } catch (e) {
    container.innerHTML = `<div class="tree-error">${friendlyError(e, '读取失败')}</div>`;
  }
}

// ═══ 创建树节点 ═══
function createTreeNode(entry, depth) {
  const node = document.createElement('div');
  node.className = 'tree-node' + (entry.is_dir ? ' is-dir' : '');
  node.dataset.path = entry.path;
  node.dataset.ext = entry.ext;
  node.dataset.depth = depth;
  node.tabIndex = 0;

  const row = document.createElement('div');
  row.className = 'tree-row';
  row.style.paddingLeft = (depth * 16 + 6) + 'px';

  const toggle = document.createElement('span');
  toggle.className = 'tree-toggle';
  toggle.textContent = entry.is_dir ? '▶' : '';
  toggle.style.visibility = entry.is_dir ? 'visible' : 'hidden';

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.textContent = fileIcon(entry);

  const name = document.createElement('span');
  name.className = 'tree-name';
  name.textContent = entry.name;
  name.title = entry.name;

  row.append(toggle, icon, name);
  node.appendChild(row);

  if (entry.is_dir) {
    const children = document.createElement('div');
    children.className = 'tree-children';
    children.hidden = true;
    node.appendChild(children);

    row.addEventListener('click', () => toggleDir(node, toggle, children, entry.path, depth + 1));
  } else {
    row.addEventListener('click', () => selectNode(node));
    row.addEventListener('dblclick', () => openFile(entry));
  }

  // 键盘操作
  node.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      quickLook(entry.path);
    }
    if (e.code === 'Enter') {
      e.preventDefault();
      if (entry.is_dir) {
        const toggle = node.querySelector('.tree-toggle');
        const children = node.querySelector('.tree-children');
        if (toggle && children) toggleDir(node, toggle, children, entry.path, depth + 1);
      } else {
        openFile(entry);
      }
    }
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      focusNextNode(node, 1);
    }
    if (e.code === 'ArrowUp') {
      e.preventDefault();
      focusNextNode(node, -1);
    }
  });

  return node;
}

// ═══ 目录展开/折叠 ═══
async function toggleDir(node, toggle, children, dirPath, depth) {
  selectNode(node);
  const isOpen = !children.hidden;
  if (isOpen) {
    children.hidden = true;
    toggle.classList.remove('open');
    node.querySelector('.tree-icon').textContent = '📁';
    // 折叠：移除该目录及其所有子目录的展开记录
    for (const p of [...expandedDirs]) {
      if (p === dirPath || p.startsWith(dirPath + '/')) expandedDirs.delete(p);
    }
  } else {
    children.hidden = false;
    toggle.classList.add('open');
    node.querySelector('.tree-icon').textContent = '📂';
    if (!children._loaded) {
      children._loaded = true;
      await loadDirInto(children, dirPath, depth);
    }
    expandedDirs.add(dirPath);
  }
  saveTreeState({ expandedDirs: [...expandedDirs] });
}

// ═══ 选中节点 ═══
function selectNode(node) {
  if (selectedNode) selectedNode.classList.remove('selected');
  selectedNode = node;
  node.classList.add('selected');
  node.focus();
  saveTreeState({ selectedPath: node.dataset.path });
}

// ═══ 键盘上下导航 ═══
function focusNextNode(current, dir) {
  const allNodes = [...document.querySelectorAll('.tree-node[tabindex]')].filter(n => {
    let el = n.parentElement;
    while (el && el.id !== 'tree-root') {
      if (el.classList.contains('tree-children') && el.hidden) return false;
      el = el.parentElement;
    }
    return true;
  });
  const idx = allNodes.indexOf(current);
  const next = allNodes[idx + dir];
  if (next) { next.focus(); selectNode(next); }
}

// ═══ 打开文件（双击或 Enter） ═══
function openFile(entry) {
  if (entry.ext === 'html' || entry.ext === 'htm' || entry.ext === 'md' || entry.ext === 'markdown') {
    openInTab(entry);
  } else {
    quickLook(entry.path);
  }
}

// ═══ Quick Look ═══
async function quickLook(path) {
  try {
    await apiFetch('/api/files/quicklook', {
      method: 'POST',
      body: JSON.stringify({ path }),
    });
  } catch (e) {
    console.warn('[QuickLook] failed:', e.message);
  }
}

// ═══ 通知 shell 在主工作区打开文件 tab ═══
function openInTab(entry) {
  window.parent.postMessage({ type: 'OPEN_FILE', path: entry.path, name: entry.name, ext: entry.ext }, '*');
}

<script>
// ── 右键菜单：files 文件树 ──
(function() {
  if (!window.__TAURI__) return;
  const invoke = window.__TAURI__.core.invoke;
  const listen = window.__TAURI__.event.listen;

  document.addEventListener('contextmenu', e => {
    e.preventDefault();

    const node = e.target.closest('.tree-node');
    if (!node) return;

    const path = node.dataset.path;
    if (!path) return;

    const isDir = node.classList.contains('is-dir');
    const name = path.split('/').pop();
    const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';

    invoke('show_context_menu', {
      contextType: isDir ? 'file_dir' : 'file_item',
      data: { path, name, ext, isDir },
    });
  });

  listen('context-menu-action', ({ payload }) => {
    const { action, data } = payload;
    if (!data) return;
    switch (action) {
      case 'file_open':
        openFile({ path: data.path, name: data.name, ext: data.ext });
        break;
      case 'reveal_finder':
        invoke('reveal_in_finder', { path: data.path });
        break;
      case 'copy_path':
        navigator.clipboard.writeText(data.path);
        break;
    }
  });
})();
</script>
