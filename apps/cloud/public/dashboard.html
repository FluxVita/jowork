<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jowork Dashboard</title>
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="/friendly-error.js"></script>
<script src="/tauri-bridge.js"></script>
<style>
/* ─── Page ─── */
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 48px;
}

/* ─── Sub-tab bar ─── */
.subtabs {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 32px;
}
.subtabs-left {
  display: flex;
  gap: 6px;
}
.subtab {
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  border: none;
  background: transparent;
  font-weight: 400;
  transition: color .2s var(--ease-spring), background .2s var(--ease-spring);
}
.subtab:hover {
  color: var(--text);
  background: var(--surface2);
}
.subtab.active {
  color: var(--accent-text);
  background: var(--surface2);
  font-weight: 500;
}
.meta-info {
  font-size: 11px;
  color: var(--text2);
  font-family: var(--font-mono);
}

/* ─── Content area ─── */
.content {
  padding: 0;
}

/* ─── Stat cards grid ─── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  transition: border-color .2s var(--ease-spring);
}
.card:hover {
  border-color: var(--border-hover);
}
.card h3 {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.card .value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.card .sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

/* ─── Data tables ─── */
.table-wrap {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 48px;
}
.table-wrap h3 {
  padding: 20px 20px 4px;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 0;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 14px 20px;
  color: var(--text2);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border-bottom: 0.5px solid var(--border);
}
td {
  padding: 14px 20px;
  border-bottom: 0.5px solid var(--border);
  color: var(--text);
  font-size: 14px;
}
tr:last-child td {
  border-bottom: none;
}
tr:hover td {
  background: var(--surface2);
}

/* ─── Badges ─── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
}
.badge-green {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid var(--green-bg);
}
.badge-orange {
  background: var(--orange-bg);
  color: var(--orange);
  border: 1px solid var(--orange-bg);
}
.badge-red {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid var(--red-bg);
}
.badge-blue {
  background: var(--blue-bg);
  color: var(--blue);
  border: 1px solid var(--blue-bg);
}
.badge-purple {
  background: var(--purple-bg);
  color: var(--purple);
  border: 1px solid var(--purple-border);
}
.badge-gray {
  background: var(--surface2);
  color: var(--text2);
  border: 0.5px solid var(--border);
}

/* ─── Links ─── */
a {
  color: var(--blue);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* ─── Loading & error states ─── */
.loading {
  text-align: center;
  padding: 48px;
  color: var(--text2);
}
.error-msg {
  color: var(--red);
  padding: 48px;
  text-align: center;
}

/* ─── Onboarding empty state ─── */
.onboarding {
  padding: 48px 0;
  max-width: 700px;
  margin: 0 auto;
}
.onboarding-header {
  text-align: center;
  margin-bottom: 40px;
}
.onboarding-header h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}
.onboarding-header p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.5;
}
.onboarding-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.connector-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: border-color .2s var(--ease-spring);
}
.connector-card:hover {
  border-color: var(--border-hover);
}
.connector-card-head {
  display: flex;
  align-items: center;
  gap: 12px;
}
.connector-icon {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
  width: 36px;
  text-align: center;
}
.connector-card-head .connector-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.connector-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  flex: 1;
}
.connector-card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.connector-status {
  font-size: 11px;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: 4px;
}
.connector-status.connected {
  color: var(--green);
}
.connector-status.disconnected {
  color: var(--text3);
}
.btn-connect {
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 0.5px solid var(--accent-border);
  background: var(--accent-bg);
  color: var(--accent-text);
  transition: background .2s var(--ease-spring), color .2s var(--ease-spring), border-color .2s var(--ease-spring);
  white-space: nowrap;
}
.btn-connect:hover {
  background: var(--accent);
  color: var(--text-inverse);
}
.btn-connect.connected-btn {
  border-color: var(--border);
  background: transparent;
  color: var(--text2);
  cursor: default;
}
.btn-connect.connected-btn:hover {
  background: transparent;
  color: var(--text2);
}
</style>
</head>
<body>

<div class="subtabs">
  <div class="subtabs-left">
    <button class="subtab active" data-tab="posthog" data-i18n="dashboard.tab.posthog">产品数据</button>
    <button class="subtab" data-tab="gitlab" data-i18n="dashboard.tab.gitlab">代码仓库</button>
    <button class="subtab" data-tab="personal" data-i18n="dashboard.tab.personal">我的数据</button>
  </div>
</div>
<div class="content" id="content">
  <div class="loading" data-i18n="ui.loading">加载中...</div>
</div>
<!-- 我的数据 iframe（懒加载，切 tab 时挂载） -->
<iframe id="personal-frame" src="about:blank"
  style="display:none;width:100%;height:calc(100vh - 45px);border:none;background:var(--bg)"></iframe>

<script>
const API = '';
let authToken = localStorage.getItem('jowork_token') || '';
let currentTab = 'posthog';
let currentUserObj = null;
let onboardingActive = false; // tracks whether onboarding view is showing

function _isGatewayOnline() {
  try { return window.parent?.shellState?.gatewayOnline ?? true; } catch { return true; }
}

// ─── Connector metadata for onboarding cards ───
const CONNECTOR_CATALOG = [
  { id: 'gitlab_v1',          icon: '\uD83E\uDD8A', name: 'GitLab',       desc: 'Code repos, merge requests, issues',         nav: 'data-config' },
  { id: 'github_v1',          icon: '\uD83D\uDC19', name: 'GitHub',       desc: 'Code repos, pull requests, issues',           nav: 'data-config' },
  { id: 'linear_v1',          icon: '\uD83D\uDCD0', name: 'Linear',       desc: 'Project management, issues, cycles',          nav: 'data-config' },
  { id: 'jira_v1',            icon: '\uD83D\uDCCB', name: 'Jira',         desc: 'Project management, issues, sprints',         nav: 'data-config' },
  { id: 'figma_v1',           icon: '\uD83C\uDFA8', name: 'Figma',        desc: 'Design files, components, comments',          nav: 'data-config', hash: '#personal' },
  { id: 'posthog_v1',         icon: '\uD83E\uDD94', name: 'PostHog',      desc: 'Product analytics, events, funnels',          nav: 'data-config' },
  { id: 'notion_v1',          icon: '\uD83D\uDCDD', name: 'Notion',       desc: 'Documents, wikis, databases',                 nav: 'data-config' },
  { id: 'slack_v1',           icon: '\uD83D\uDCAC', name: 'Slack',        desc: 'Team messages, channels, threads',            nav: 'data-config' },
  { id: 'google_drive_v1',    icon: '\uD83D\uDCC1', name: 'Google Drive', desc: 'Documents, spreadsheets, presentations',      nav: 'data-config' },
  { id: 'gmail_v1',           icon: '\uD83D\uDCEC', name: 'Gmail',        desc: 'Email inbox, threads, labels',                nav: 'data-config', hash: '#personal' },
  { id: 'outlook_v1',         icon: '\uD83D\uDCEE', name: 'Outlook',      desc: 'Email inbox, calendar, contacts',             nav: 'data-config', hash: '#personal' },
];

// ─── 接收 shell 注入的 token ───
window.addEventListener('message', (e) => {
  if (e.data?.type === 'SHELL_TOKEN') {
    if (e.data.appMode === 'local') {
      document.getElementById('content').innerHTML = '<div style="text-align:center;padding:48px 16px;color:var(--text2);font-size:var(--font-body, 14px)">本地模式 — 数据看板仅在服务器模式下可用</div>';
      return;
    }
    if (e.data.token) {
      authToken = e.data.token;
      currentUserObj = e.data.user || null;
      checkAndShowOnboarding();
    }
  }
});

// ─── 如果直接访问（非 iframe），请求 shell 发 token ───
if (window.parent !== window) {
  window.parent.postMessage({ type: 'REQUEST_TOKEN' }, '*');
  // 兜底：如果 SHELL_TOKEN 消息 1.5s 内未到达，用 localStorage token 加载
  setTimeout(() => {
    const el = document.getElementById('content');
    if (el && el.querySelector('.loading') && authToken) checkAndShowOnboarding();
  }, 1500);
} else {
  // 直接访问模式，用 localStorage token
  if (authToken) checkAndShowOnboarding();
}

// ─── 子 Tab 切换 ───
document.querySelectorAll('.subtab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (onboardingActive) return; // tabs disabled during onboarding
    document.querySelectorAll('.subtab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;

    const contentEl = document.getElementById('content');
    const personalFrame = document.getElementById('personal-frame');

    if (currentTab === 'personal') {
      contentEl.style.display = 'none';
      personalFrame.style.display = '';
      // 首次切入时加载，并注入 token
      if (personalFrame.src === 'about:blank') {
        personalFrame.src = '/data-config.html#personal';
        personalFrame.onload = () => {
          personalFrame.contentWindow?.postMessage({ type: 'SHELL_TOKEN', token: authToken, user: currentUserObj }, '*');
        };
      }
    } else {
      contentEl.style.display = '';
      personalFrame.style.display = 'none';
      loadTab(currentTab);
    }
  });
});

async function fetchJSON(path) {
  const resp = await fetch(API + path, {
    signal: AbortSignal.timeout(8000),
    headers: authToken ? { Authorization: 'Bearer ' + authToken } : {}
  });
  if (!resp.ok) throw new Error(friendlyHttpStatus(resp.status));
  return resp.json();
}

function timeAgo(dateStr) {
  if (!dateStr) return '-';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return `${mins}分钟前`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}小时前`;
  return `${Math.floor(hours / 24)}天前`;
}

// ─── Check connector status and decide: onboarding vs normal dashboard ───
async function checkAndShowOnboarding() {
  const el = document.getElementById('content');
  const subtabsEl = document.querySelector('.subtabs');
  try {
    const data = await fetchJSON('/api/connectors');
    const connectors = data.connectors || [];

    // Build a map of server-registered connector statuses
    const statusMap = {};
    for (const c of connectors) {
      statusMap[c.id] = { authorized: !!c.oauth_authorized };
    }

    const hasAnyConnected = connectors.some(c => c.oauth_authorized);

    if (hasAnyConnected) {
      // At least one connector is authorized — show normal dashboard
      onboardingActive = false;
      subtabsEl.style.display = '';
      el.style.display = '';
      document.getElementById('personal-frame').style.display = 'none';
      loadTab(currentTab);
    } else {
      // No connectors authorized — show onboarding
      onboardingActive = true;
      subtabsEl.style.display = 'none';
      el.style.display = '';
      document.getElementById('personal-frame').style.display = 'none';
      renderOnboarding(el, statusMap);
    }
  } catch (err) {
    // If connector API fails (e.g. network error, 403), fall back to normal dashboard
    console.warn('[dashboard] checkAndShowOnboarding failed, falling back to tabs:', err);
    onboardingActive = false;
    subtabsEl.style.display = '';
    loadTab(currentTab);
  }
}

function renderOnboarding(el, statusMap) {
  const cards = CONNECTOR_CATALOG.map(c => {
    const isConnected = statusMap[c.id]?.authorized || false;
    const statusClass = isConnected ? 'connected' : 'disconnected';
    const statusLabel = isConnected ? '\u2713 Connected' : 'Not connected';
    const btnClass = isConnected ? 'btn-connect connected-btn' : 'btn-connect';
    const btnLabel = isConnected ? 'Connected' : 'Connect';
    return `<div class="connector-card" data-connector-id="${c.id}">
      <div class="connector-card-head">
        <span class="connector-icon">${c.icon}</span>
        <span class="connector-name">${c.name}</span>
      </div>
      <div class="connector-desc">${c.desc}</div>
      <div class="connector-card-foot">
        <span class="connector-status ${statusClass}">${statusLabel}</span>
        <button class="${btnClass}" data-nav="${c.nav}" data-hash="${c.hash || ''}"${isConnected ? ' disabled' : ''}>${btnLabel}</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="onboarding">
    <div class="onboarding-header">
      <h2>Connect your data sources</h2>
      <p>JoWork can search and analyze data from these services.<br>Connect at least one to get started.</p>
    </div>
    <div class="onboarding-grid">${cards}</div>
  </div>`;

  // Bind connect buttons via addEventListener (no onclick — Tauri WKWebView compatible)
  el.querySelectorAll('.btn-connect:not(.connected-btn)').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = btn.dataset.nav;
      const hash = btn.dataset.hash || '';
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'NAVIGATE', panel: panel + hash }, '*');
      } else {
        window.location.href = '/' + panel + '.html' + hash;
      }
    });
  });
}

async function loadTab(tab) {
  if (tab === 'personal') return; // iframe 模式，不走这里
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    switch(tab) {
      case 'posthog':  await renderPostHog(el); break;
      case 'gitlab':   await renderGitLab(el); break;
    }
  } catch(e) {
    console.error('[dashboard] loadTab failed:', e);
    el.innerHTML = `<div class="error-msg">${friendlyError(e, '加载失败')}</div>`;
  }
}

async function renderPostHog(el) {
  const data = await fetchJSON('/api/dashboard/posthog');
  if (!data.insights.total && !data.dashboards.length) {
    el.innerHTML = `<div class="loading" style="padding:60px">
      <div style="font-size:32px;margin-bottom:12px">📊</div>
      <div style="font-size:var(--font-body, 14px);font-weight:500;color:var(--text1);margin-bottom:6px" data-i18n="dashboard.empty.posthog_title">尚未连接 PostHog</div>
      <div style="font-size:var(--font-sm, 13px)" data-i18n="dashboard.empty.posthog_desc">在 AI 服务页面配置 PostHog 后，产品数据将自动同步到这里</div>
    </div>`;
    return;
  }
  el.innerHTML = `
    <div class="grid">
      <div class="card"><h3>数据分析总数</h3><div class="value">${data.insights.total}</div></div>
      <div class="card"><h3>数据看板</h3><div class="value">${data.dashboards.length}</div></div>
      ${data.insights.by_type.slice(0,3).map(t => `<div class="card"><h3>${t.insight_type||'其他'}</h3><div class="value">${t.n}</div><div class="sub">条分析</div></div>`).join('')}
    </div>
    <div class="table-wrap">
      <h3>数据看板</h3>
      <table>
        <tr><th>名称</th><th>置顶</th><th>链接</th></tr>
        ${data.dashboards.map(d => `<tr><td>${d.title}</td><td>${d.pinned?'<span class="badge badge-green">已置顶</span>':''}</td><td>${d.external_url?`<a href="${d.external_url}" target="_blank">打开</a>`:'-'}</td></tr>`).join('')}
      </table>
    </div>
    <div class="table-wrap">
      <h3>最近数据分析</h3>
      <table>
        <tr><th>名称</th><th>类型</th><th>链接</th><th>更新时间</th></tr>
        ${data.insights.recent.map(i => `<tr><td>${i.title}</td><td><span class="badge badge-purple">${i.insight_type||'-'}</span></td><td>${i.external_url?`<a href="${i.external_url}" target="_blank">打开</a>`:'-'}</td><td>${timeAgo(i.updated_at)}</td></tr>`).join('')}
      </table>
    </div>`;
}

async function renderGitLab(el) {
  const data = await fetchJSON('/api/dashboard/gitlab');
  el.innerHTML = `
    <div class="grid">
      <div class="card"><h3>代码仓库</h3><div class="value">${data.repositories.length}</div></div>
      ${data.merge_requests.by_state.map(s => `<div class="card"><h3>MR · ${s.state==='opened'?'进行中':s.state==='merged'?'已合并':s.state==='closed'?'已关闭':s.state||'未知'}</h3><div class="value">${s.n}</div></div>`).join('')}
    </div>
    <div class="table-wrap">
      <h3>代码仓库</h3>
      <table>
        <tr><th>名称</th><th>链接</th><th>更新时间</th></tr>
        ${data.repositories.map(r => `<tr><td>${r.title}</td><td>${r.external_url?`<a href="${r.external_url}" target="_blank">打开</a>`:'-'}</td><td>${timeAgo(r.updated_at)}</td></tr>`).join('')}
      </table>
    </div>
    <div class="table-wrap">
      <h3>最近合并请求</h3>
      <table>
        <tr><th>标题</th><th>状态</th><th>提交人</th><th>链接</th><th>更新时间</th></tr>
        ${data.merge_requests.recent.map(m => {
          const s = (m.state||'').toLowerCase();
          const cls = ['merged','closed'].some(k=>s.includes(k))?'badge-green':['opened','open'].some(k=>s.includes(k))?'badge-blue':'badge-gray';
          const label = {opened:'进行中',merged:'已合并',closed:'已关闭'}[m.state]||m.state||'-';
          return `<tr><td>${m.title}</td><td><span class="badge ${cls}">${label}</span></td><td>${m.owner||'-'}</td><td>${m.external_url?`<a href="${m.external_url}" target="_blank">打开</a>`:'-'}</td><td>${timeAgo(m.updated_at)}</td></tr>`;
        }).join('')}
      </table>
    </div>`;
}

// 每 60 秒自动刷新 — 如果 onboarding 活跃则重新检查 connector 状态
setInterval(() => {
  if (!_isGatewayOnline() || !authToken) return;
  if (onboardingActive) {
    checkAndShowOnboarding();
  } else {
    loadTab(currentTab);
  }
}, 60000);
</script>
</body>
</html>
