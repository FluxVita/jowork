<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jowork 数据配置</title>
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="/tauri-bridge.js"></script>
<script src="/friendly-error.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  background: var(--bg); color: var(--text);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top navigation bar ── */
.topbar {
  display: flex;
  gap: 4px;
  padding: 12px 48px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
  align-items: center;
  justify-content: space-between;
}
.topbar-left { display: flex; gap: 4px; }
.nav-btn {
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  border: none;
  background: transparent;
  font-family: inherit;
  transition: all .2s ease;
  text-decoration: none;
}
.nav-btn:hover { color: var(--text); background: var(--surface2); }
.nav-btn.active { color: var(--accent-text); background: var(--surface2); font-weight: 500; }

/* ── Content area ── */
.content {
  padding: 40px 48px;
  max-width: 1060px;
}

/* ── Stat cards ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  transition: border-color .2s ease;
}
.stat-card:hover { border-color: var(--accent-border); }
.stat-card .value {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--font-mono, monospace);
  letter-spacing: -0.02em;
}
.stat-card .label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── Section titles ── */
.section {
  margin-top: 56px;
  scroll-margin-top: 60px;
}
.section:first-child { margin-top: 20px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.section-icon { font-size: 20px; }
.section-title-text { font-size: 18px; font-weight: 700; color: var(--text); }
.section-subtitle { font-size: 13px; color: var(--text2); margin-left: 8px; }

/* ── Cards / tables ── */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 24px 28px;
  margin-bottom: 20px;
}
.card h3 { font-size: 15px; color: var(--accent); margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left;
  padding: 14px 20px;
  color: var(--text2);
  border-bottom: 0.5px solid var(--border);
  font-weight: 500;
  font-size: 12px;
}
td {
  padding: 14px 20px;
  border-bottom: 0.5px solid var(--border);
  vertical-align: middle;
  font-size: 14px;
}
tr:hover td { background: var(--surface2); }

.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-green { background: rgba(102,187,106,.15); color: var(--green); }
.badge-red   { background: rgba(255,77,106,.15);  color: var(--red); }
.badge-orange{ background: rgba(255,167,38,.15);  color: var(--orange); }
.badge-blue  { background: rgba(66,165,245,.15);  color: var(--blue); }
.badge-gray  { background: rgba(136,136,160,.15); color: var(--text2); }
.badge-purple{ background: rgba(171,71,188,.15);  color: var(--purple); }
.badge-cyan  { background: rgba(0,188,212,.15);   color: #0097a7; }
.badge-amber { background: rgba(255,193,7,.15);   color: #f9a825; }

/* ── Buttons ── */
.btn {
  padding: 10px 18px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-primary { background: var(--accent); color: var(--text-inverse); border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { opacity: .9; color: var(--text-inverse); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(255,77,106,.1); }
.actions { display: flex; gap: 8px; }

/* ── Detail expand row ── */
.detail-row td { background: var(--surface2); padding: 16px 28px; }
.detail-box { font-size: 13px; line-height: 1.7; color: var(--text2); }
.detail-box strong { color: var(--text); }
.detail-meta { display: flex; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
.detail-meta span { font-size: 13px; color: var(--text2); }
.detail-meta span b { color: var(--text); }

/* ── Personal config forms ── */
.personal-form { margin-top: 16px; }
.form-row { display: flex; gap: 16px; margin-bottom: 18px; }
.form-group { flex: 1; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.form-input:focus { outline: none; border-color: var(--accent); }
.form-input::placeholder { color: var(--text2); }
.form-hint { font-size: 13px; color: var(--text2); margin-top: 6px; line-height: 1.5; }
.form-hint a { color: var(--blue); text-decoration: none; }
.save-status { font-size: 11px; color: var(--green); margin-left: 8px; display: none; }

/* ── Connector cards (ds-card) ── */
.ds-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
}
.ds-card.expanded { border-color: var(--accent); }
.ds-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 24px;
  user-select: none;
}
.ds-icon { font-size: 24px; flex-shrink: 0; }
.ds-info { flex: 1; min-width: 0; }
.ds-name { font-size: 15px; font-weight: 600; color: var(--text); }
.ds-desc { font-size: 13px; color: var(--text2); margin-top: 4px; }
.ds-body { padding: 0 24px 24px; border-top: 1px solid var(--border); }
.ds-actions { display: flex; gap: 8px; margin-top: 8px; }

/* ── Strategy info box ── */
.strategy-box {
  background: var(--surface2);
  border-radius: 8px;
  padding: 16px 20px;
  margin: 8px 0 16px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}
.strategy-box strong { color: var(--text); }

/* ── Privacy notice ── */
.privacy-notice {
  background: rgba(171,71,188,.08);
  border: 1px solid rgba(171,71,188,.25);
  border-radius: 14px;
  padding: 20px 24px;
  margin-top: 24px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}
.privacy-notice strong { color: var(--purple); }

/* ── Group binding management ── */
.binding-list { margin: 12px 0; }
.binding-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface2);
  border-radius: 8px;
  border: 0.5px solid var(--border);
  margin-bottom: 8px;
  font-size: 14px;
}
.binding-item .bi-group { font-weight: 600; color: var(--text); min-width: 120px; }
.binding-item .bi-connectors { flex: 1; font-size: 13px; color: var(--text2); }
.binding-add {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.binding-add select, .binding-add input {
  padding: 10px 14px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}

/* ── Personal email list ── */
.email-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
.email-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface2);
  border-radius: 8px;
  border: 0.5px solid var(--border);
}
.email-item .ei-addr { flex: 1; font-size: 14px; }
.email-item .ei-type { font-size: 13px; color: var(--text2); }

/* ── Empty / loading states ── */
.empty { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }
.loading { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }
.storage-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text2);
}
.storage-bar-track {
  flex: 1;
  height: 6px;
  border-radius: 4px;
  background: var(--surface2);
  overflow: hidden;
}
.storage-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--green);
  transition: width .3s;
}

/* ── Sync progress bar ── */
.sync-progress {
  display: none;
  margin-top: 8px;
  padding: 12px 16px;
  background: var(--surface2);
  border-radius: 8px;
  border: 0.5px solid var(--border);
}
.sync-progress.show { display: block; }
.sync-progress-bar-track {
  height: 4px;
  border-radius: 4px;
  background: var(--border);
  margin-bottom: 8px;
  overflow: hidden;
}
.sync-progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--accent);
  transition: width .3s;
}
.sync-progress-bar-fill.indeterminate {
  width: 40% !important;
  animation: bar-slide 1.2s ease-in-out infinite;
}
@keyframes bar-slide {
  0%   { transform: translateX(-100%); }
  50%  { transform: translateX(150%); }
  100% { transform: translateX(150%); }
}
.sync-progress-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
.sync-progress-text.done { color: var(--green); }
.sync-progress-text.error { color: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="nav-btn active" href="#section-public" data-scope="public" data-i18n="dataconfig.public">公共数据</a>
    <a class="nav-btn" href="#section-dev" data-scope="dev" data-i18n="dataconfig.dev">研发数据</a>
    <a class="nav-btn" href="#section-group" data-scope="group" data-i18n="dataconfig.group">群组数据</a>
    <a class="nav-btn" href="#section-personal" data-scope="personal" data-i18n="dataconfig.personal">个人数据</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <select id="plan-select" class="btn btn-sm" style="display:none;padding-right:22px">
      <option value="free">FREE</option>
      <option value="pro">PRO</option>
      <option value="team">TEAM</option>
      <option value="business">BUSINESS</option>
    </select>
    <button id="plan-save-btn" class="btn btn-sm" style="display:none" onclick="savePlanSetting()" data-i18n="dataconfig.save_plan">保存套餐</button>
    <span id="plan-info" style="font-size:var(--font-xs, 11px);color:var(--text2)"></span>
    <span id="meta-info" style="font-size:var(--font-xs, 11px);color:var(--text2)"></span>
    <button class="btn btn-sm" onclick="init()" data-i18n="ui.refresh">刷新</button>
    <button class="btn btn-sm btn-primary" onclick="healthCheckAll()" data-i18n="ui.health_check">健康检查</button>
  </div>
</div>

<div class="content" id="main-content">
  <div class="loading" data-i18n="ui.loading">加载中...</div>
</div>

<script>
const API = '';
let authToken = localStorage.getItem('jowork_token') || '';
let currentUser = null;
function escHtml(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

function _isGatewayOnline() {
  try { return window.parent?.shellState?.gatewayOnline ?? true; } catch { return true; }
}

// #personal = 只渲染个人数据（嵌入 dashboard）
// #admin    = 只渲染公共/研发/群组（嵌入管理后台）
// 空         = 完整页面（独立访问）
const VIEW_MODE = location.hash === '#personal' ? 'personal'
  : location.hash === '#admin' ? 'admin'
  : 'full';
let healthData = {};
let statsData = {};
let groupBindings = [];
let groupSources = { feishu_chats: [], email_accounts: [] };
let connectorEntitlements = null;

// ── iframe token 注入 ──
window.addEventListener('message', (e) => {
  if (e.data?.type === 'SHELL_TOKEN' && e.data.token) {
    authToken = e.data.token;
    currentUser = e.data.user;
    init();
  }
});
if (window.parent !== window) {
  window.parent.postMessage({ type: 'REQUEST_TOKEN' }, '*');
} else if (authToken) {
  init();
}

// ── 导航锚点高亮 ──
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// 滚动时自动高亮
const observer = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    if (entry.isIntersecting) {
      const scope = entry.target.dataset.scope;
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.scope === scope);
      });
    }
  }
}, { threshold: 0.3, rootMargin: '-60px 0px 0px 0px' });

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    signal: AbortSignal.timeout(8000),
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + authToken, ...(opts.headers || {}) }
  });
  const raw = await res.text();
  let data = null;
  try { data = raw ? JSON.parse(raw) : null; } catch { data = null; }
  if (!res.ok) {
    const err = new Error(data?.error || friendlyHttpStatus(res.status));
    err.status = res.status;
    err.code = data?.code;
    err.data = data;
    throw err;
  }
  return data ?? {};
}

function formatApiError(err) {
  if (err?.code === 'CONNECTOR_LIMIT_REACHED') {
    const plan = String(err?.data?.plan || 'free').toUpperCase();
    const limit = err?.data?.connector_limit ?? 0;
    const connected = err?.data?.connected ?? limit;
    const upgrade = err?.data?.upgrade_to ? `，升级到 ${String(err.data.upgrade_to).toUpperCase()} 可继续添加` : '';
    return `连接器额度已满（${plan}：${connected}/${limit}）${upgrade}`;
  }
  return friendlyError(err, '请求失败');
}

function renderPlanInfo() {
  const el = document.getElementById('plan-info');
  if (!el) return;
  if (!connectorEntitlements) {
    el.textContent = '';
    return;
  }
  const plan = String(connectorEntitlements.plan || 'free').toUpperCase();
  const limit = connectorEntitlements.connector_limit;
  const connected = connectorEntitlements.connected ?? 0;
  if (limit === null) {
    el.textContent = `套餐 ${plan} · 连接器不限量`;
    return;
  }
  const remaining = Math.max((connectorEntitlements.remaining ?? (limit - connected)), 0);
  el.textContent = `套餐 ${plan} · 连接器 ${connected}/${limit}（剩余 ${remaining}）`;
}

function applyPlanControls(isAdmin) {
  const sel = document.getElementById('plan-select');
  const btn = document.getElementById('plan-save-btn');
  if (!sel || !btn) return;
  if (!isAdmin || !connectorEntitlements) {
    sel.style.display = 'none';
    btn.style.display = 'none';
    return;
  }
  sel.style.display = '';
  btn.style.display = '';
  sel.value = String(connectorEntitlements.plan || 'free');
}

async function savePlanSetting() {
  const sel = document.getElementById('plan-select');
  const btn = document.getElementById('plan-save-btn');
  if (!sel || !btn) return;
  const plan = String(sel.value || '').toLowerCase();
  if (!plan) return;
  btn.disabled = true;
  const oldText = btn.textContent;
  btn.textContent = '保存中...';
  try {
    await apiFetch('/api/connectors/entitlements', {
      method: 'PUT',
      body: JSON.stringify({ plan }),
    });
    await init();
    btn.textContent = '已保存';
    setTimeout(() => { btn.textContent = oldText; }, 1500);
  } catch (e) {
    alert(friendlyError(e, '保存失败'));
    btn.textContent = oldText;
  } finally {
    btn.disabled = false;
  }
}

// ── 数据源元信息 ──
const DS_META = {
  feishu_v1: {
    name: '飞书群数据源', icon: '📨', data_scope: 'group',
    pullType: '增量', pullTarget: '索引元数据',
    interval: '每 4 小时',
    description: '拉取飞书文档、Wiki 知识库页面的标题、URL、最后更新时间。不下载正文，正文在 AI 对话引用时按需实时获取。',
    dataTypes: '文档 · 知识库页面',
    supportsFulltext: true,
  },
  gitlab_v1: {
    name: 'GitLab', icon: '🦊', data_scope: 'dev',
    pullType: '增量（近30天）', pullTarget: '索引元数据',
    interval: '每 3 小时',
    description: '拉取所有你有 membership 的仓库元数据，以及近30天内更新的 MR 和 Issue 的标题、状态、负责人。代码内容（diff、README）在引用时按需获取。',
    dataTypes: '代码仓库 · MR · Issue',
    supportsFulltext: true,
  },
  linear_v1: {
    name: 'Linear', icon: '📐', data_scope: 'public',
    pullType: '全量', pullTarget: '索引元数据',
    interval: '每 3 小时',
    description: '拉取所有项目列表及 Issue 的标题、状态、负责人、优先级、更新时间。不含 Issue 正文评论，引用时按需获取。',
    dataTypes: '项目 · Issue',
    supportsFulltext: true,
  },
  posthog_v1: {
    name: 'PostHog', icon: '🦔', data_scope: 'public',
    pullType: '全量', pullTarget: '索引元数据',
    interval: '每天 06:00',
    description: '拉取 Dashboard 列表和 Insight 数据分析图表的元数据（名称、类型、URL）。数据更新频率低，每天同步一次足够。',
    dataTypes: 'Dashboard · Insight',
    supportsFulltext: false,
  },
  figma_v1: {
    name: 'Figma', icon: '🎨', data_scope: 'personal',
    pullType: '按需', pullTarget: '设计文件元数据',
    interval: '手动触发',
    description: 'Figma 为个人数据源，每位设计师需配置自己的 Access Token。拉取你有权限的设计文件、组件库的元数据。',
    dataTypes: '设计文件 · 组件',
    configKey: 'figma_token',
    supportsFulltext: false,
  },
  outlook_v1: {
    name: 'Outlook / Microsoft 365', icon: '📮', data_scope: 'personal',
    pullType: '增量（近 50 封）', pullTarget: '索引元数据',
    interval: '按需（授权后手动同步）',
    description: '个人邮箱数据源。每位用户单独 OAuth 授权自己的 Microsoft 账号，仅本人可见。',
    dataTypes: '邮件',
    supportsFulltext: false,
  },
  gmail_v1: {
    name: 'Gmail', icon: '📬', data_scope: 'personal',
    pullType: '增量（近 50 封）', pullTarget: '索引元数据',
    interval: '按需（依赖 Google 授权）',
    description: '个人邮箱数据源。读取你的 Gmail 收件箱元数据，仅本人可见。',
    dataTypes: '邮件',
    supportsFulltext: false,
  },
  email_v1: {
    name: '邮箱组', icon: '📧', data_scope: 'group',
    pullType: '增量（近7天）', pullTarget: '索引元数据',
    interval: '每 2 小时',
    description: '支持两种邮箱：①群组邮箱（如 support@fluxvita.com），由管理员统一配置授权码，组内成员共享可见。②个人邮箱，由本人在「个人数据」中填写授权码，仅本人可见。',
    dataTypes: '邮件（主题/发件人/分类/SLA）',
    configKey: 'email',
    supportsFulltext: true,
  },
  feishu_chat: {
    name: '飞书群消息', icon: '💬', data_scope: 'group',
    pullType: '实时 + 增量', pullTarget: '完整消息内容',
    interval: '实时(WebSocket) + 每 3 小时补漏',
    description: '实时同步 Bot 所在飞书群的消息到本地数据库，支持全文搜索。包含文本消息、富文本、消息中的文档链接自动下载全文。',
    dataTypes: '群聊消息 · 文档链接',
    isVirtual: true, // 非 connector，不走健康检查
  },
};

const SCOPE_CONFIG = {

  dev:      { label: '研发数据', icon: '🔧', subtitle: '研发部门可见', badgeClass: 'badge-orange' },

let _autoRetryTimer = null;
let _autoRetryCount = 0;
function isAdminRole(role) {
  return role === 'owner' || role === 'admin';
}

async function init() {
  const isAdmin = isAdminRole(currentUser?.role);
  try {
    const [connList, health, stats, bindings, entitlements] = await Promise.all([
      apiFetch('/api/connectors').catch(() => ({ connectors: [] })),
      apiFetch('/api/connectors/health').catch(() => ({ health: {} })),
      apiFetch('/api/dashboard/overview').catch(() => ({})),
      isAdmin
        ? apiFetch('/api/group-bindings').catch(() => ({ bindings: [] }))
        : apiFetch('/api/group-bindings/mine').catch(() => ({ bindings: [] })),
      apiFetch('/api/connectors/entitlements').catch(() => null),
    ]);
    healthData = health.health || {};
    statsData = stats;
    groupBindings = bindings.bindings || [];
    connectorEntitlements = entitlements;

    // 管理员额外加载可选数据源
    if (isAdmin) {
      groupSources = await apiFetch('/api/group-bindings/sources').catch(() => ({ feishu_chats: [], email_accounts: [] }));
    }

    const total = stats.total_objects || 0;
    document.getElementById('meta-info').textContent = `已索引 ${total} 条数据`;
    renderPlanInfo();
    applyPlanControls(isAdmin);

    renderAll(connList.connectors || []);

    // 非管理员且 full 模式：隐藏公共/研发/群组导航入口
    if (VIEW_MODE === 'full') {
      document.querySelectorAll('.nav-btn[data-scope]').forEach(btn => {
        const scope = btn.dataset.scope;
        if (scope !== 'personal') {
          btn.style.display = isAdmin ? '' : 'none';
        }
      });
    }

    // 观察分区
    document.querySelectorAll('.section').forEach(s => observer.observe(s));

    if (total === 0 && !_autoRetryTimer && _autoRetryCount < 3) {
      _autoRetryCount++;
      document.getElementById('meta-info').textContent = `数据为空，10s 后自动重试（${_autoRetryCount}/3）`;
      _autoRetryTimer = setTimeout(() => { _autoRetryTimer = null; init(); }, 10000);
    } else {
      _autoRetryCount = 0;
      if (_autoRetryTimer) { clearTimeout(_autoRetryTimer); _autoRetryTimer = null; }
    }
  } catch (e) {
    document.getElementById('main-content').innerHTML = `<div class="empty">${friendlyError(e, '加载失败')}</div>`;
  }
}

function waitConnectorOAuthResult(popup, connectorId) {
  return new Promise((resolve, reject) => {
    let done = false;
    const clean = () => {
      if (done) return;
      done = true;
      window.removeEventListener('message', onMsg);
      clearInterval(watchClosed);
    };
    const onMsg = (ev) => {
      const d = ev?.data || {};
      if (d.type === 'oauth_success' && d.connector_id === connectorId) {
        clean();
        resolve(true);
        return;
      }
      if (d.type === 'oauth_error') {
        clean();
        const raw = String(d.error || 'oauth_error');
        reject(new Error(decodeURIComponent(raw)));
      }
    };
    const watchClosed = setInterval(() => {
      if (popup.closed) {
        clean();
        reject(new Error('授权窗口已关闭'));
      }
    }, 400);
    window.addEventListener('message', onMsg);
  });
}

async function connectConnectorOAuth(id) {
  try {
    const data = await apiFetch(`/api/connectors/${id}/oauth/url`);
    if (!data?.url) { alert('服务器未返回授权地址，请检查连接器配置'); return; }
    const popup = window.open(data.url, 'oauth_' + id, 'width=700,height=760');
    if (!popup) {
      alert('无法打开授权窗口，请检查浏览器弹窗设置');
      return;
    }
    await waitConnectorOAuthResult(popup, id);
    await init();
    alert('授权成功');
  } catch (e) {
    alert(friendlyError(e, '授权失败'));
  }
}

async function disconnectConnectorOAuth(id) {
  if (!confirm('确认断开该连接器授权？')) return;
  try {
    await apiFetch(`/api/connectors/${id}/oauth`, { method: 'DELETE' });
    await init();
    alert('已断开授权');
  } catch (e) {
    alert(friendlyError(e, '断开失败'));
  }
}

  const panel = document.getElementById('group-edit-panel');
  const btn = document.getElementById('group-edit-btn');
  if (!panel) return;
  const show = panel.style.display === 'none';
  panel.style.display = show ? 'block' : 'none';
  if (btn) {
    btn.textContent = show ? '收起' : '编辑';
    btn.style.opacity = show ? '1' : '.6';
  }
  if (show) {

  }
}

  if (sourceType === 'email_account') {
    for (const a of groupSources.email_accounts || []) {
      const opt = document.createElement('option');
      opt.value = a.account_id;
      opt.textContent = a.address;
      opt.dataset.name = a.address || '';
      instanceSelect.appendChild(opt);
    }
  }
}

async function addGroupBinding() {

  const sourceType = document.getElementById('bind-source-type').value;

// ── 个人配置 ──
let _personalFigmaSet = false;
let _personalFigmaMask = '';
let _personalEmails = [];

async function loadPersonalConfig() {
  // 记住编辑面板当前展开状态
  const editPanel = document.getElementById('personal-edit-panel');
  const wasOpen = editPanel && editPanel.style.display !== 'none';

  try {
    const r1 = await apiFetch('/api/settings/figma_token').catch(() => null);
    _personalFigmaSet = r1?.is_set || false;
    _personalFigmaMask = r1?.value_mask || r1?.value || '';
  } catch {}
  try {
    const r2 = await apiFetch('/api/settings/personal_emails').catch(() => null);
    if (r2?.is_set && r2.value) {
      try { _personalEmails = JSON.parse(r2.value); } catch {}
    }
  } catch {}

  // 标题栏的状态 badge
  const badgesEl = document.getElementById('personal-status-badges');
  if (badgesEl) {
    const figmaStatus = _personalFigmaSet
      ? '<span class="badge badge-green">Figma 已配置</span>'
      : '<span class="badge badge-gray">Figma 未配置</span>';
    const emailCount = _personalEmails.length;
    const emailStatus = emailCount > 0
      ? `<span class="badge badge-green">${emailCount} 个邮箱</span>`
      : '<span class="badge badge-gray">邮箱未配置</span>';
    badgesEl.innerHTML = `${figmaStatus}${emailStatus}`;
  }

  // 编辑面板内容（预渲染但隐藏）
  const editEl = document.getElementById('personal-edit-panel');
  if (!editEl) return;
  editEl.innerHTML = renderPersonalEditPanel();

  // 恢复之前的展开状态
  if (wasOpen) {
    editEl.style.display = 'block';
    const btn = document.getElementById('personal-edit-btn');
    if (btn) { btn.textContent = '收起'; btn.style.opacity = '1'; }
  }
}

function togglePersonalEdit() {
  const panel = document.getElementById('personal-edit-panel');
  const btn = document.getElementById('personal-edit-btn');
  if (!panel) return;
  const show = panel.style.display === 'none';
  panel.style.display = show ? 'block' : 'none';
  if (btn) {
    btn.textContent = show ? '收起' : '编辑';
    btn.style.opacity = show ? '1' : '.6';
  }
}

  }
  return `<div class="email-list">` + emails.map((em, i) => `
    <div class="email-item">
      <span class="ei-addr">${escHtml(em.user)}</span>
      <span class="ei-type">${escHtml(em.host)}</span>

function renderStorageBar(storageSrc) {
  const total = storageSrc.total || 1;
  const local = storageSrc.local_count || 0;
  const pct = Math.round((local / total) * 100);
  const sizeMb = (storageSrc.total_content_bytes / (1024 * 1024)).toFixed(1);
  return `<div class="storage-bar">
    <div class="storage-bar-track"><div class="storage-bar-fill" style="width:${pct}%"></div></div>
    <span>${local}/${total}</span>
    <span>${sizeMb}MB</span>
  </div>`;
}

async function syncConnector(id, supportsFulltext) {
  const btn = document.getElementById('sync-btn-' + id);
  const progressEl = document.getElementById('sync-progress-' + id);
  const barEl = document.getElementById('sync-bar-' + id);
  const textEl = document.getElementById('sync-text-' + id);

  if (!btn || !progressEl || !textEl) return;

  // 展开详情行，显示进度
  const detailRow = document.getElementById('detail-' + id);
  if (detailRow) detailRow.style.display = '';

  btn.textContent = '同步中...';
  btn.disabled = true;
  progressEl.classList.add('show');
  barEl.classList.add('indeterminate');
  textEl.className = 'sync-progress-text';

  const isFulltext = supportsFulltext === 'true' || supportsFulltext === true;

  if (!isFulltext) {
    textEl.textContent = '注意：此数据源不支持全文存储，将只同步索引元数据（标题、状态等）到服务器。';
  } else {
    textEl.textContent = '正在连接数据源...';
  }

  try {
    await fetchSSESync(id, isFulltext, btn, barEl, textEl, progressEl);
  } catch (e) {
    textEl.className = 'sync-progress-text error';
    textEl.textContent = friendlyError(e, '同步失败');
    barEl.classList.remove('indeterminate');
    btn.textContent = '同步到服务器';
    btn.disabled = false;
  }
}

async function fetchSSESync(id, isFulltext, btn, barEl, textEl, progressEl) {
  const resp = await fetch(API + '/api/connectors/' + id + '/discover/stream', {
    headers: { Authorization: 'Bearer ' + authToken },
  });

  if (!resp.ok) {
    const raw = await resp.text();
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; } catch { data = null; }
    const err = new Error(data?.error || friendlyHttpStatus(resp.status));
    err.status = resp.status;
    err.code = data?.code;
    err.data = data;
    throw err;
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    // 解析 SSE 事件
    const blocks = buf.split('\n\n');
    buf = blocks.pop(); // 保留未完整的块

    for (const block of blocks) {
      const eventMatch = block.match(/^event: (\w+)/m);
      const dataMatch = block.match(/^data: (.+)/m);
      if (!eventMatch || !dataMatch) continue;

      const event = eventMatch[1];
      let data;
      try { data = JSON.parse(dataMatch[1]); } catch { continue; }

      if (event === 'start') {
        textEl.className = 'sync-progress-text';
        textEl.textContent = data.message || '同步中...';
      } else if (event === 'done') {
        barEl.classList.remove('indeterminate');
        barEl.style.width = '100%';
        textEl.className = 'sync-progress-text done';
        textEl.textContent = data.message || `完成：${data.discovered} 条`;
        btn.textContent = `✓ 已同步 ${data.discovered} 条`;
        btn.disabled = false;
        // 3秒后刷新数据
        setTimeout(() => { btn.textContent = '同步到服务器'; init(); }, 3000);
      } else if (event === 'error') {
        barEl.classList.remove('indeterminate');
        textEl.className = 'sync-progress-text error';
        textEl.textContent = '同步失败：' + (data.message || '未知错误');
        btn.textContent = '同步到服务器';
        btn.disabled = false;
      }
    }
  }
}

async function saveFigmaToken() {
  const val = document.getElementById('figma-token-input').value.trim();
  if (!val || val === _personalFigmaMask) return;
  try {
    await apiFetch('/api/settings/figma_token', {
      method: 'PUT',
      body: JSON.stringify({ value: val })
    });
    const st = document.getElementById('figma-save-status');
    st.style.display = 'inline';
    setTimeout(() => { st.style.display = 'none'; }, 2000);
    _personalFigmaSet = true;
    loadPersonalConfig();
  } catch (e) {
    alert(friendlyError(e, '保存失败'));
  }
}

async function clearFigmaToken() {
  try {
    await apiFetch('/api/settings/figma_token', { method: 'DELETE' });
    _personalFigmaSet = false;
    loadPersonalConfig();
  } catch (e) {
    alert(friendlyError(e, '清除失败'));
  }
}

async function addPersonalEmail() {
  const user = document.getElementById('email-addr').value.trim();
  const host = document.getElementById('email-host').value.trim();
  const pass = document.getElementById('email-pass').value.trim();
  const port = parseInt(document.getElementById('email-port').value) || 993;
  if (!user || !host || !pass) { alert('请填写邮箱地址、服务器和授权码'); return; }

  try {
    let cur = [];
    try {
      const r = await apiFetch('/api/settings/personal_emails');
      if (r.is_set && r.value) cur = JSON.parse(r.value);
    } catch {}
    const withPass = [...cur, { user, host, port, pass, tls: true }];
    await apiFetch('/api/settings/personal_emails', {
      method: 'PUT',
      body: JSON.stringify({ value: JSON.stringify(withPass) })
    });
    const st = document.getElementById('email-save-status');
    st.style.display = 'inline';
    setTimeout(() => { st.style.display = 'none'; }, 2000);
    ['email-addr','email-host','email-pass'].forEach(id => document.getElementById(id).value = '');
    _personalEmails = withPass.map(e => ({ ...e, pass: undefined }));
    // 刷新编辑面板和摘要
    document.getElementById('personal-emails').innerHTML = renderPersonalEmailList(_personalEmails);
    loadPersonalConfig();
  } catch (e) {
    alert(friendlyError(e, '保存失败'));
  }
}

async function removePersonalEmail(idx) {
  try {
    let cur = [];
    try {
      const r = await apiFetch('/api/settings/personal_emails');
      if (r.is_set && r.value) cur = JSON.parse(r.value);
    } catch {}
    cur.splice(idx, 1);
    await apiFetch('/api/settings/personal_emails', {
      method: 'PUT',
      body: JSON.stringify({ value: JSON.stringify(cur) })
    });
    _personalEmails = cur.map(e => ({ ...e, pass: undefined }));
    document.getElementById('personal-emails').innerHTML = renderPersonalEmailList(_personalEmails);
    loadPersonalConfig();
  } catch (e) {
    alert(friendlyError(e, '移除失败'));
  }
}
