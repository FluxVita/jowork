<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoWork — Sign In</title>
<link rel="stylesheet" href="/styles/tokens.css">
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="/friendly-error.js"></script>
<script src="/tauri-bridge.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--text);
  font-family: var(--font);
  font-size: var(--font-body, 14px);
  padding: var(--space-page, 24px);
  -webkit-font-smoothing: antialiased;
}
[data-theme="light"] body {
  background-image: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
}

.card {
  width: 100%;
  max-width: 400px;
  background: rgba(28, 28, 30, 0.78);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border: 0.5px solid var(--border);
  border-radius: 18px;
  padding: 44px 40px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.04) inset;
}
[data-theme="light"] .card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-color: rgba(0,0,0,0.07);
  box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 1px 0 rgba(255,255,255,0.9) inset;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.logo img {
  width: 56px;
  height: 56px;
  border-radius: 14px;
}
.logo-name {
  font-size: var(--font-h3, 15px);
  font-weight: 700;
}

h2 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 28px;
  line-height: 1.5;
}

.error {
  color: var(--red, #ff4d6a);
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
  text-align: center;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--red-bg, rgba(255,77,106,0.08));
}
.error:empty {
  padding: 0;
  background: transparent;
  min-height: 0;
}

.btn-google {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  border: 0.5px solid var(--border);
  cursor: pointer;
  transition: opacity 0.15s;
  background: rgba(255,255,255,0.06);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: inherit;
}
[data-theme="light"] .btn-google {
  background: #fff;
  color: #3c4043;
  border-color: #dadce0;
}
.btn-google:hover { opacity: 0.85; }
.btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-google svg { flex-shrink: 0; }

.divider {
  text-align: center;
  font-size: 12px;
  color: var(--text2);
  margin: 28px 0;
  position: relative;
}
.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 40%;
  height: 0.5px;
  background: var(--border);
}
.divider::before { left: 0; }
.divider::after { right: 0; }

.btn-local {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  border: 0.5px solid var(--border);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  background: transparent;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
}
.btn-local:hover {
  color: var(--text);
  border-color: var(--border-hover);
}
.btn-local svg { flex-shrink: 0; opacity: 0.6; }

.terms {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  margin-top: 24px;
  line-height: 1.5;
}
.terms a {
  color: inherit;
  text-decoration-color: var(--text3);
}
.terms a:hover {
  color: var(--text);
}

.loading {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  font-size: 14px;
  color: var(--text2);
}
.loading.active { display: flex; }

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/app-icon.png" alt="JoWork">
    <span class="logo-name">JoWork</span>
  </div>

  <h2>Welcome to JoWork</h2>
  <p class="subtitle">Your AI-powered workspace assistant.<br>Sign in to get started.</p>

  <button class="btn-google" id="google-btn" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span>Sign in with Google</span>
  </button>

  <div class="loading" id="google-loading">
    <div class="spinner"></div>
    <span>Checking Google login...</span>
  </div>

  <div class="error" id="error-msg"></div>

  <div id="local-section" style="display:none">
    <div class="divider">or</div>
    <button class="btn-local" id="local-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Run locally — no sign-up needed</span>
    </button>
  </div>

  <p class="terms">By continuing, you agree to our <a href="/terms.html" target="_blank">Terms</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a>.</p>
</div>

<script>
var API = (window.__JOWORK_GATEWAY_URL__ || window.__TAURI_PROXY_BASE__ || '').replace(/\/$/, '');
var TOKEN_KEY = 'jowork_token';

// Already logged in → go to shell
if (localStorage.getItem(TOKEN_KEY)) {
  location.replace('/shell.html');
}

// Show URL errors (e.g. from Google OAuth redirect)
var _urlError = new URLSearchParams(location.search).get('error');
if (_urlError) {
  document.getElementById('error-msg').textContent = decodeURIComponent(_urlError).replace(/_/g, ' ');
}

// Show local mode option in Tauri desktop app
if (window.__TAURI__ && window.__TAURI__.core) {
  document.getElementById('local-section').style.display = '';
}

// Check Google OAuth availability
(async function() {
  var btn = document.getElementById('google-btn');
  var loading = document.getElementById('google-loading');
  loading.classList.add('active');
  try {
    var r = await fetch(API + '/api/auth/google/status', { signal: AbortSignal.timeout(8000) });
    var d = await r.json();
    if (d.enabled) {
      btn.disabled = false;
    } else {
      btn.style.display = 'none';
      document.getElementById('error-msg').textContent = 'Google login is not configured on this server.';
    }
  } catch (e) {
    document.getElementById('error-msg').textContent = 'Cannot reach server. Check your connection.';
  } finally {
    loading.classList.remove('active');
  }
})();

// ── Button handlers via addEventListener (onclick attributes don't work in Tauri WKWebView) ──

document.getElementById('google-btn').addEventListener('click', function() {
  if (this.disabled) return;
  this.disabled = true;
  this.querySelector('span').textContent = 'Redirecting...';
  window.location.href = API + '/api/auth/google?mode=web';
});

document.getElementById('local-btn').addEventListener('click', async function() {
  try {
    await window.__TAURI__.core.invoke('set_app_mode', { mode: 'local' });
    location.replace('/shell.html');
  } catch (e) {
    document.getElementById('error-msg').textContent = 'Failed to set local mode: ' + e;
  }
});
</script>
</body>
</html>
