<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="x-app-id" content="jowork">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jowork</title>
<link rel="stylesheet" href="/styles/tokens.css">
<!-- Vercel 部署时注入后端地址，本地运行时此文件不存在（忽略错误） -->
<script src="/runtime-config.js" onerror="void 0"></script>
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="/friendly-error.js"></script>
<script src="/tauri-bridge.js"></script>
<script src="/conn-retry.js"></script>
<script src="/vue.global.prod.js"></script>
<style>
/* ── Shell 专用颜色层级 ── */
:root {
  --sh-bg:      #0f0f12;
  --sh-sidebar: #18181b;
  --sh-card:    #252528;
  --sh-sep:     rgba(255,255,255,0.09);
}
[data-theme="light"] {
  --sh-bg:      #f0f0ed;
  --sh-sidebar: #e8e8e4;
  --sh-card:    #ffffff;
  --sh-sep:     rgba(0,0,0,0.09);
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: var(--sh-bg);
  color: var(--text);
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════
   Login screen
   ═══════════════════════════════════════ */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background-color: var(--sh-bg);
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  display: none;
  align-items: center;
  justify-content: center;
}
[data-theme="light"] #login-screen {
  background-image: radial-gradient(circle, rgba(0,0,0,0.04) 1px, transparent 1px);
}

.login-box {
  background: rgba(37, 37, 40, 0.88);
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-radius: 18px;
  padding: 40px 36px;
  width: 360px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
  position: relative;
  overflow: hidden;
}
[data-theme="light"] .login-box {
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid rgba(0,0,0,0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.8) inset;
}

/* 顶部品牌色条 */
.login-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gradient-brand, linear-gradient(90deg,#9DD84A,#5CC8D8,#C4B8E8,#E8A898));
}

/* 登录页 logo */
.login-logo-mark {
  width: 64px;
  height: 64px;
  border-radius: 10px;
  margin: 0 auto 20px;
  display: block;
  object-fit: contain;
}

.login-box h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 8px;
  letter-spacing: -0.4px;
}
.login-box p {
  color: var(--text2);
  font-size: 13px;
  margin: 0 0 24px;
  line-height: 1.55;
}

.login-input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 12px;
  box-sizing: border-box;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--sh-sep);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
.login-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(157,216,74,0.18);
}
[data-theme="light"] .login-input {
  background: rgba(0,0,0,0.04);
}
[data-theme="light"] .login-input:focus {
  box-shadow: 0 0 0 3px rgba(90,138,26,0.15);
}

.btn-primary {
  background: var(--accent, #9DD84A);
  color: #0a0a0b;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  width: 100%;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s, box-shadow .15s;
  box-shadow: 0 3px 14px rgba(157,216,74,0.28);
}
.btn-primary:hover {
  opacity: .9;
  box-shadow: 0 5px 20px rgba(157,216,74,0.4);
}
.btn-primary:active { opacity: .76; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

.login-error {
  margin-top: 12px;
  padding: 8px 12px;
  background: var(--red-bg, rgba(255,59,48,0.1));
  border-radius: 8px;
  color: var(--red, #ff6b6b);
  font-size: 11px;
  display: none;
}

/* ═══════════════════════════════════════
   Sidebar
   ═══════════════════════════════════════ */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--glass-sidebar-dark, rgba(28,28,30,0.72));
  backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  -webkit-backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  border-right: 0.5px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  position: relative;
  transition: width .22s var(--ease-spring, cubic-bezier(0.16, 1, 0.3, 1));
  z-index: 10;
  -webkit-user-select: none;
  user-select: none;
}
[data-theme="light"] .sidebar {
  background: var(--glass-sidebar-light, rgba(242,242,239,0.82));
  border-right: 0.5px solid rgba(0,0,0,0.06);
}
.sidebar.collapsed { width: 54px; }

.sidebar-resize-handle {
  position: absolute;
  right: -3px; top: 0; bottom: 0;
  width: 6px;
  cursor: col-resize;
  z-index: 20;
  transition: background .15s;
}
.sidebar-resize-handle:hover,
.sidebar-resize-handle.dragging {
  background: rgba(157,216,74,0.25);
}
.sidebar.collapsed .sidebar-resize-handle { display: none; }

/* ── Tauri drag zone ── */
.drag-zone {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  -webkit-app-region: drag;
  z-index: 2;
  display: none;
  pointer-events: auto;
}
html[data-platform="tauri"]:not(.fullscreen) .drag-zone { display: block; }

/* Brand */
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 12px 12px;
  flex-shrink: 0;
}
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand { padding-top: 44px; }
html[data-platform="tauri"].fullscreen .sidebar-brand { padding-top: 16px; }
html[data-platform="tauri"]:not(.fullscreen) .sidebar-brand {
  -webkit-backdrop-filter: blur(40px) saturate(1.5);
  backdrop-filter: blur(40px) saturate(1.5);
  background: rgba(22,22,25,0.8) !important;
}
html[data-platform="tauri"][data-theme="light"]:not(.fullscreen) .sidebar-brand {
  background: rgba(232,232,228,0.85) !important;
}

/* Logo mark */
.brand-logo {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  flex-shrink: 0;
  cursor: default;
  object-fit: contain;
}
.sidebar.collapsed .brand-logo {
  cursor: pointer;
  width: 30px;
  height: 30px;
  margin: 0 auto;
}
.sidebar.collapsed .brand-logo:hover { opacity: .85; }

.brand-text {
  flex: 1;
  min-width: 0;
}
.brand-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-sub {
  font-size: 11px;
  color: var(--text2);
  opacity: 0.65;
  white-space: nowrap;
}

.collapse-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text2);
  padding: 2px;
  opacity: 0.6;
  border-radius: 4px;
  transition: opacity .15s, background .15s, transform .22s cubic-bezier(0.16,1,0.3,1);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-app-region: no-drag;
  width: 20px;
  height: 20px;
}
.collapse-btn:hover {
  opacity: 1;
  background: var(--accent-bg, rgba(157,216,74,0.08));
  color: var(--accent);
}
.sidebar.collapsed .brand-text { display: none; }
.sidebar.collapsed .collapse-btn { display: none; }

.sidebar-divider {
  height: 0.5px;
  background: var(--sh-sep);
  margin: 0 12px;
  flex-shrink: 0;
}
.sidebar.collapsed .sidebar-divider { margin: 0 8px; }

/* Nav */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  scrollbar-width: none;
}

.nav-group { margin-bottom: 8px; }
.nav-group-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  opacity: 0.55;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 20px 12px 8px;
  display: block;
}
/* first group doesn't need extra top padding */
.nav-group:first-child .nav-group-label {
  padding-top: 8px;
}
.sidebar.collapsed .nav-group-label { display: none; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  width: 100%;
  text-align: left;
  transition: background .15s, color .15s;
  letter-spacing: -0.1px;
  position: relative;
  margin-bottom: 4px;
}
.nav-item:last-child { margin-bottom: 0; }
.nav-item:hover {
  background: var(--surface-hover, rgba(255,255,255,0.06));
  color: var(--text);
}
.nav-item.active {
  background: var(--accent-bg, rgba(157,216,74,0.10));
  color: var(--accent-text, var(--accent));
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 2px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
}
.nav-item-icon {
  width: 16px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.6;
  transition: opacity .15s, color .15s;
  color: var(--text2);
}
.nav-item.active .nav-item-icon {
  opacity: 1;
  color: var(--accent);
}
.nav-item:hover .nav-item-icon {
  opacity: 1;
  color: inherit;
}
.sidebar.collapsed .nav-item {
  justify-content: center;
  padding: 0;
  font-size: 0;
  margin-bottom: 4px;
}
.sidebar.collapsed .nav-item.active::before { display: none; }
.sidebar.collapsed .nav-item-icon { width: auto; }

[data-theme="light"] .nav-item:hover {
  background: var(--surface-hover, rgba(0,0,0,0.05));
}
[data-theme="light"] .nav-item.active {
  background: rgba(90,138,26,0.09);
}
[data-theme="light"] .nav-item.active::before {
  background: var(--accent2, #5a8a1a);
}
[data-theme="light"] .nav-item.active .nav-item-icon {
  color: var(--accent2, #5a8a1a);
}

/* Sidebar footer */
.sidebar-footer {
  flex-shrink: 0;
  padding: 8px 12px 12px;
}
.sidebar-actions {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 8px;
  border-top: var(--separator, 0.5px solid rgba(255,255,255,0.07));
  padding-top: 8px;
}
.action-btn {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, color .15s;
  width: 100%;
}
.action-btn:hover {
  background: var(--surface-hover, rgba(255,255,255,0.06));
  color: var(--text);
}
.action-btn.danger:hover {
  background: var(--red-bg, rgba(255,59,48,0.12));
  color: var(--red, #ff6b6b);
}
.action-btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  pointer-events: none;
}
.action-btn-label {
  font-size: 11px;
  line-height: 1;
  pointer-events: none;
}
.action-btn svg { pointer-events: none; }
.sidebar.collapsed .action-btn-label { display: none; }
.sidebar.collapsed .action-btn { padding: 8px; }
[data-theme="light"] .action-btn { color: rgba(0,0,0,0.4); }
[data-theme="light"] .action-btn:hover {
  background: rgba(0,0,0,0.05);
  color: rgba(0,0,0,0.65);
}

/* User row */
.sidebar-user-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .15s;
}
.sidebar-user-row:hover {
  background: var(--surface-hover, rgba(255,255,255,0.06));
}
[data-theme="light"] .sidebar-user-row:hover {
  background: rgba(0,0,0,0.05);
}
.sidebar-user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent-bg);
  border: 1.5px solid var(--accent-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}
.sidebar-user-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.14);
  flex-shrink: 0;
}
.status-dot.online {
  background: var(--accent);
  animation: status-pulse 2.5s ease-out infinite;
}
@keyframes status-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(157,216,74,0.55); }
  60%  { box-shadow: 0 0 0 5px rgba(157,216,74,0);    }
  100% { box-shadow: 0 0 0 0   rgba(157,216,74,0);    }
}
.status-dot.offline { background: var(--red, #ff6b6b); }
.sidebar.collapsed .sidebar-user-name { display: none; }
.sidebar.collapsed .sidebar-user-row { justify-content: center; }
[data-theme="light"] .sidebar-user-avatar {
  background: rgba(90,138,26,0.1);
  border-color: rgba(90,138,26,0.2);
  color: #5a8a1a;
}
[data-theme="light"] .sidebar-user-name { color: rgba(0,0,0,0.5); }
[data-theme="light"] .status-dot { background: rgba(0,0,0,0.14); }

/* Tooltip */
.nav-tooltip {
  position: fixed;
  z-index: 9999;
  background: rgba(30, 30, 32, 0.88);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.08);
  color: var(--text);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(0,0,0,0.28);
  transform: translateY(-50%);
}
.nav-tooltip.visible { opacity: 1; }
[data-theme="light"] .nav-tooltip {
  background: rgba(248, 248, 248, 0.98);
  border: none;
  color: rgba(0,0,0,0.82);
  box-shadow: 0 2px 8px rgba(0,0,0,0.16), 0 0 0 0.5px rgba(0,0,0,0.08);
}

@keyframes panelFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.panel-frame.fade-in {
  animation: panelFadeIn .22s cubic-bezier(0.16, 1, 0.3, 1);
}

/* File tree panel */
#file-tree-panel {
  width: 0;
  flex-shrink: 0;
  overflow: hidden;
  border-right: 0px solid var(--sh-sep);
  transition: width .22s var(--ease-spring, cubic-bezier(0.16, 1, 0.3, 1));
  background: var(--glass-sidebar-dark, rgba(28,28,30,0.72));
  backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  -webkit-backdrop-filter: var(--glass-blur, blur(20px) saturate(180%));
  position: relative;
}
#file-tree-panel.open {
  width: 260px;
  border-right-width: 0.5px;
}
#file-tree-panel > iframe {
  width: 260px;
  height: 100%;
  border: none;
  display: block;
}

/* Content area */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: var(--sh-bg);
}

/* Tab bar (file tabs only) */
.panel-tabbar {
  display: none;
  align-items: center;
  gap: 4px;
  padding: 0 12px;
  height: 40px;
  flex-shrink: 0;
  background: rgba(13,13,16,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--sh-sep);
  -webkit-app-region: drag;
  -webkit-user-select: none;
  user-select: none;
}
.panel-tabbar.visible { display: flex; }
[data-theme="light"] .panel-tabbar { background: rgba(240,240,237,0.92); }

.panel-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.1px;
  transition: background .15s, color .15s;
  -webkit-app-region: no-drag;
}
.panel-tab:hover {
  color: var(--text);
  background: rgba(255,255,255,0.06);
}
.panel-tab.active {
  color: var(--accent-text, var(--accent));
  background: var(--surface2, rgba(255,255,255,0.1));
  font-weight: 600;
}
.panel-tab-icon { font-size: 12px; }
.panel-tab-close {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1;
  color: var(--text2);
  margin-left: 4px;
  transition: color .15s, background .15s;
  pointer-events: all;
}
.panel-tab-close:hover {
  color: var(--text);
  background: rgba(255,255,255,0.1);
}
[data-theme="light"] .panel-tab { color: rgba(0,0,0,0.4); }
[data-theme="light"] .panel-tab:hover { color: rgba(0,0,0,0.72); background: rgba(0,0,0,0.05); }
[data-theme="light"] .panel-tab.active {
  color: var(--accent-text, var(--accent));
  background: var(--surface2, rgba(0,0,0,0.06));
}

/* Panels */
.panels {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--sh-bg);
}
.panel-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: transparent;
}
.panel-frame.active { display: block; }

/* CSS loading spinner */
.panel-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--sh-bg);
  pointer-events: none;
  transition: opacity .3s;
}
.panel-loading::after {
  content: '';
  width: 24px;
  height: 24px;
  border: 2px solid rgba(255,255,255,0.07);
  border-top-color: var(--accent, #9DD84A);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
[data-theme="light"] .panel-loading::after {
  border-color: rgba(0,0,0,0.07);
  border-top-color: var(--accent2, #5a8a1a);
}
.panel-loading.hidden { opacity: 0; pointer-events: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Offline banner */
.offline-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9997;
  background: rgba(220,40,40,0.11);
  border-bottom: 1px solid rgba(255,100,80,0.18);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  font-size: 12px;
  color: var(--red, #ff6b6b);
  border-radius: 0 0 10px 10px;
  animation: banner-slide-down .22s ease-out;
}
@keyframes banner-slide-down {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
.offline-banner-msg { flex: 1; }
.offline-retry {
  padding: 4px 12px;
  background: transparent;
  border: 1px solid rgba(255,100,80,0.3);
  border-radius: 8px;
  color: var(--red, #ff6b6b);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.offline-retry:hover { background: rgba(255,100,80,0.1); }
[data-theme="light"] .offline-banner {
  background: rgba(255,59,48,0.07);
  border-bottom-color: rgba(255,59,48,0.15);
}

/* Update bar */
.update-bar {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--sh-card);
  border: 1px solid var(--accent-border, rgba(157,216,74,.18));
  border-radius: 12px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 9999;
  animation: slideUp .3s cubic-bezier(0.16,1,0.3,1);
}
.update-bar.hidden { display: none !important; }
.update-version {
  color: var(--accent);
  font-weight: 600;
}
.update-btn {
  padding: 6px 14px;
  background: var(--accent);
  color: #0a0a0b;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.update-dismiss {
  padding: 6px 14px;
  background: transparent;
  border: none;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.btn-secondary {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--sh-sep);
  border-radius: 8px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, color .15s;
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}
[data-theme="light"] .btn-secondary { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .btn-secondary:hover { background: rgba(0,0,0,0.05); }

/* ═══════════════════════════════════════

}
.settings-dialog {

.settings-header {

.settings-close {

.settings-body {

.pref-row {

<script>
// Vercel 部署时使用 runtime-config.js 注入的后端地址，本地运行时为空（相对路径）
const API = (window.__JOWORK_GATEWAY_URL__ || window.__TAURI_PROXY_BASE__ || '').replace(/\/$/, '');
const TOKEN_KEY = 'jowork_token';
const AUTO_USER_KEY = 'jowork_local_user';

// OAuth 回调通过 URL 参数传递 token（兼容 Tauri localStorage 隔离）
(function() {
  var p = new URLSearchParams(location.search);
  var t = p.get('token');
  if (t) {
    localStorage.setItem(TOKEN_KEY, t);
    p.delete('token');
    var clean = p.toString();
    history.replaceState(null, '', location.pathname + (clean ? '?' + clean : ''));
  }
})();

function hidePanelLoading(panelName) {
  const loading = document.getElementById('panel-loading');
  if (!loading) return;
  if (panelName && shellState.activePanel !== panelName) return;
  loading.classList.add('hidden');
}

function watchFrameReady(frame, panelName) {
  let settled = false;
  const finish = () => {
    if (settled) return;
    settled = true;
    hidePanelLoading(panelName);
  };

  frame.onload = () => {
    injectToken(frame);
    setTimeout(() => injectToken(frame), 200);
    finish();
  };

  let attempts = 0;
  const timer = setInterval(() => {
    attempts += 1;
    try {
      const readyState = frame.contentDocument?.readyState;
      if (readyState === 'complete' && frame.contentDocument?.body) {
        clearInterval(timer);
        finish();
        return;
      }
    } catch {
      clearInterval(timer);
      finish();
      return;
    }

    if (attempts >= 40) {
      clearInterval(timer);
      finish();
    }
  }, 250);
}

// ── Sidebar resize ──
(function () {
  const sidebar = document.querySelector('.sidebar');
  const handle = document.getElementById('sidebar-resize');
  const MIN_W = 160, MAX_W = 400, W_KEY = 'jw_sidebar_width';
  const savedW = parseInt(localStorage.getItem(W_KEY));
  if (savedW && !sidebar.classList.contains('collapsed')) sidebar.style.width = savedW + 'px';
  handle.addEventListener('mousedown', (e) => {
    if (sidebar.classList.contains('collapsed')) return;
    e.preventDefault();
    handle.classList.add('dragging');
    const startX = e.clientX, startW = sidebar.offsetWidth;
    function onMove(e) { sidebar.style.width = Math.min(MAX_W, Math.max(MIN_W, startW + e.clientX - startX)) + 'px'; }
    function onUp() {
      handle.classList.remove('dragging');
      localStorage.setItem(W_KEY, sidebar.offsetWidth);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── Connection Log (ring buffer, 记录所有连接事件用于诊断断联) ──
const ConnLog = (() => {
  const MAX = 200;
  const entries = [];
  const listeners = [];

  function add(type, detail) {
    const entry = { ts: new Date().toISOString(), t: Date.now(), type, ...detail };
    entries.push(entry);
    if (entries.length > MAX) entries.shift();
    listeners.forEach(fn => fn(entry));
  }

  function getAll() { return entries.slice(); }
  function onEntry(fn) { listeners.push(fn); return () => { const i = listeners.indexOf(fn); if (i >= 0) listeners.splice(i, 1); }; }
  function exportText() {
    return entries.map(e => {
      const time = e.ts.slice(11, 23);
      const parts = [time, `[${e.type}]`];
      if (e.latency != null) parts.push(`${e.latency}ms`);
      if (e.status != null) parts.push(`status=${e.status}`);
      if (e.code != null) parts.push(`code=${e.code}`);
      if (e.reason) parts.push(`reason=${e.reason}`);
      if (e.error) parts.push(`err=${e.error}`);
      if (e.msg) parts.push(e.msg);
      return parts.join(' ');
    }).join('\n');
  }

  return { add, getAll, onEntry, exportText };
})();

// ── Gateway status (grace period: 连续 3 次失败才标记离线, 指数退避) ──
const OFFLINE_THRESHOLD = 3;
let _consecutiveFailures = 0;

function setGatewayStatus(online) {
  shellState.gatewayOnline = Boolean(online);
  shellState.gatewayChecked = true;
}

// 离线 banner 倒计时
let _countdownTimer = null;
function _updateRetryInfo(nextMs) {
  const el = document.getElementById('offline-retry-info');
  if (!el) return;
  const offlineRetries = Math.max(0, _consecutiveFailures - OFFLINE_THRESHOLD + 1);
  clearInterval(_countdownTimer);
  let remaining = Math.ceil(nextMs / 1000);
  el.textContent = '第 ' + offlineRetries + ' 次重连，' + remaining + 's 后重试';
  _countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(_countdownTimer); el.textContent = '正在重连…'; return; }
    el.textContent = '第 ' + offlineRetries + ' 次重连，' + remaining + 's 后重试';
  }, 1000);
}

let _prevGatewayOnline = null;
async function checkGatewayStatus() {
  const t0 = Date.now();
  try {
    const r = await fetch(API + '/health', { signal: AbortSignal.timeout(4000) });
    const latency = Date.now() - t0;
    if (r.ok) {
      const wasOffline = _prevGatewayOnline === false;
      _consecutiveFailures = 0;
      clearInterval(_countdownTimer);
      setGatewayStatus(true);
      _prevGatewayOnline = true;
      ConnLog.add('health_ok', { latency });
      if (wasOffline) ConnLog.add('gateway_recovered', { msg: 'Gateway reconnected', latency });
    } else {
      _consecutiveFailures++;
      ConnLog.add('health_fail', { status: r.status, latency, attempt: _consecutiveFailures });
      if (_consecutiveFailures >= OFFLINE_THRESHOLD) {
        const wasOnline = _prevGatewayOnline;
        setGatewayStatus(false);
        _prevGatewayOnline = false;
        if (wasOnline === true) ConnLog.add('gateway_lost', { msg: 'Gateway connection lost (after ' + _consecutiveFailures + ' failures)' });
      }
    }
  } catch (err) {
    const latency = Date.now() - t0;
    _consecutiveFailures++;
    ConnLog.add('health_error', { error: err?.message || String(err), latency, attempt: _consecutiveFailures });
    if (_consecutiveFailures >= OFFLINE_THRESHOLD) {
      const wasOnline = _prevGatewayOnline;
      setGatewayStatus(false);
      _prevGatewayOnline = false;
      if (wasOnline === true) ConnLog.add('gateway_lost', { msg: 'Gateway connection lost (after ' + _consecutiveFailures + ' failures)', error: err?.message });
    }
  }
}
let _healthTimer = null;
function startGatewayMonitor() {
  if (shellState.appMode === 'local') return;
  checkGatewayStatus();
  _scheduleHealthCheck();
}
function _scheduleHealthCheck() {
  if (_healthTimer) clearTimeout(_healthTimer);
  let interval;
  if (_consecutiveFailures === 0) {
    interval = 30000; // 在线：30s
  } else if (_consecutiveFailures < OFFLINE_THRESHOLD) {
    interval = 3000; // grace period：3s 快速重试
  } else {
    // 已确认离线：指数退避 3s → 6s → 12s → 24s → max 30s
    const offlineCount = _consecutiveFailures - OFFLINE_THRESHOLD;
    interval = Math.min(3000 * Math.pow(2, offlineCount), 30000);
  }
  // 已确认离线时更新 banner 倒计时
  if (_consecutiveFailures >= OFFLINE_THRESHOLD) _updateRetryInfo(interval);
  _healthTimer = setTimeout(async () => {
    await checkGatewayStatus();
    _scheduleHealthCheck();
  }, interval);
}

// ── Init: verify token ──
(async function init() {
  // 个人本地版：无 Gateway，跳过认证直接进入
  if (window.__TAURI__?.core) {
    try {
      const mode = await window.__TAURI__.core.invoke('get_app_mode');
      if (mode === 'local') {
        shellState.appMode = 'local';
        shellState.currentUser = { name: 'Local User', role: 'admin' };
        enterApp();
        return;
      }
    } catch { /* ignore */ }
  }

  // 有 token → 立即进入主界面，后台验证
  if (shellState.token) {
    try {
      const cachedUser = localStorage.getItem('jowork_user');
      if (cachedUser) shellState.currentUser = JSON.parse(cachedUser);
    } catch {}
    enterApp();
    // 后台验证 + setup 检查
    _backgroundVerify();
    return;
  }

  // 无 token → 先检查 setup，再决定登录方式
  try {
    const setupResp = await fetch(API + '/api/system/setup-status', { signal: AbortSignal.timeout(3000) });
    if (setupResp.ok) {
      const setupData = await setupResp.json();
      if (!setupData.done) {
        location.href = '/setup.html';
        return;
      }
    }
  } catch { /* gateway 离线时跳过检查 */ }

  // SaaS 模式：跳转到 signup.html 让用户正式注册/登录
  if (!window.__TAURI__?.core || shellState.appMode === 'saas') {
    location.href = '/signup.html';
    return;
  }

  // Self-hosted / 开发模式：尝试 auto-login
  const result = await autoLocalLogin();
  if (result !== true) {
    showLoginScreen();
    if (result === 'offline') setTimeout(() => showLoginError('Server is offline — please try again later'), 50);
  }
})();

async function _backgroundVerify() {
  // Setup wizard 检查（后台）
  try {
    const setupResp = await fetch(API + '/api/system/setup-status', { signal: AbortSignal.timeout(3000) });
    if (setupResp.ok) {
      const setupData = await setupResp.json();
      if (!setupData.done) {
        location.href = '/setup.html';
        return;
      }
    }
  } catch { /* ignore */ }

  // Token 验证
  try {
    const resp = await fetch(API + '/api/auth/me', {
      headers: { Authorization: 'Bearer ' + shellState.token },
      signal: AbortSignal.timeout(8000),
    });
    if (!resp.ok) throw new Error('token invalid');
    const data = await resp.json();
    shellState.currentUser = data.user;
    try { localStorage.setItem('jowork_user', JSON.stringify(data.user)); } catch {}
  } catch {
    shellState.token = null;
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem('jowork_user');
    const result = await autoLocalLogin();
    if (result !== true) {
      showLoginScreen();
      if (result === 'offline') setTimeout(() => showLoginError('Server is offline — please try again later'), 50);
    }
  }
}

// ── Local login ──
async function localLogin(input) {
  const usernameEl = document.getElementById('login-username');
  const displayEl = document.getElementById('login-displayname');
  const username = (input?.username ?? usernameEl.value).trim();
  const display_name = (input?.display_name ?? displayEl.value).trim() || username;
  if (!username || username.length < 2) { showLoginError('Username must be at least 2 characters'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const resp = await fetch(API + '/api/auth/local', {
      signal: AbortSignal.timeout(8000),
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, display_name }),
    });
    const data = await resp.json();
    if (data.token) {
      shellState.token = data.token;
      shellState.currentUser = data.user;
      localStorage.setItem(TOKEN_KEY, shellState.token);
      if (window.__TAURI__?.core?.invoke) window.__TAURI__.core.invoke('persist_token', { token: shellState.token }).catch(function(){});
      try { localStorage.setItem('jowork_user', JSON.stringify(data.user)); } catch {}
      document.getElementById('login-screen').style.display = 'none';
      enterApp();
    } else {
      showLoginError(friendlyError(data.error, '登录失败'));
      btn.disabled = false; btn.textContent = '开始使用';
    }
  } catch {
    showLoginError('无法连接服务器，请检查网络');
    btn.disabled = false; btn.textContent = '开始使用';
  }
}

async function autoLocalLogin() {
  const saved = localStorage.getItem(AUTO_USER_KEY);
  const username = (saved && saved.trim()) || `local_${Math.random().toString(36).slice(2, 10)}`;
  const display_name = (saved && saved.trim()) || 'Local User';
  try {
    const resp = await fetch(API + '/api/auth/local', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, display_name }),
      signal: AbortSignal.timeout(5000),
    });
    const data = await resp.json();
    if (!data.token) return false;
    shellState.token = data.token;
    shellState.currentUser = data.user;
    localStorage.setItem(TOKEN_KEY, shellState.token);
    if (window.__TAURI__?.core?.invoke) window.__TAURI__.core.invoke('persist_token', { token: shellState.token }).catch(function(){});
    try { localStorage.setItem('jowork_user', JSON.stringify(data.user)); } catch {}
    localStorage.setItem(AUTO_USER_KEY, username);
    document.getElementById('login-screen').style.display = 'none';
    enterApp();
    return true;
  } catch { return 'offline'; }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function logout() {
  shellState.token = null;
  shellState.currentUser = null;
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem('jowork_user');
  location.reload();
}

function forceReload() {
  document.querySelectorAll('.panel-frame').forEach(f => { f.src = 'about:blank'; });
  loadedPanels.clear();
  const frame = document.getElementById(`frame-${shellState.activePanel}`);
  if (frame) {
    const src = frame.dataset.src || getFileTabSrcByPanel(shellState.activePanel);
    if (!src) return;
    const ts = Date.now();
    const sep = src.includes('?') ? '&' : '?';
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    watchFrameReady(frame, shellState.activePanel);
    frame.src = src + sep + '_t=' + ts + '#token=' + encodeURIComponent(shellState.token || '');
    loadedPanels.add(shellState.activePanel);
  }
}

// ── Preferences ──
async function loadUserPrefs() {
  if (!shellState.token) return;
  try {
    const resp = await fetch(API + '/api/preferences', {
      headers: { Authorization: 'Bearer ' + shellState.token },
      signal: AbortSignal.timeout(5000),
    });
    if (!resp.ok) return;
    const data = await resp.json();
    shellState.userPrefs = data.preferences || {};
    shellState.userPrefsApiKeySet = !!data.api_key_set;
    shellState.userPrefsApiKeyMasked = data.api_key_masked || null;
  } catch { /* 忽略：不影响主流程 */ }
}

async function updatePref(key, value) {
  if (!shellState.token) return;
  try {
    const resp = await fetch(API + '/api/preferences', {
      signal: AbortSignal.timeout(8000),
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + shellState.token },
      body: JSON.stringify({ [key]: value }),
    });
    if (resp.ok) {
      const data = await resp.json();
      shellState.userPrefs = data.preferences || {};
      shellState.userPrefsApiKeySet = !!data.api_key_set;
      shellState.userPrefsApiKeyMasked = data.api_key_masked || null;
    }
  } catch { /* ignore */ }
}

function doPromptChangeApiKey() {
  const key = prompt('Enter your new API key (leave blank to cancel):');
  if (!key || !key.trim()) return;
  fetch(API + '/api/preferences', {
    signal: AbortSignal.timeout(8000),
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + shellState.token },
    body: JSON.stringify({ api_key: key.trim() }),
  }).then(r => r.json()).then(data => {
    shellState.userPrefsApiKeySet = !!data.api_key_set;
    shellState.userPrefsApiKeyMasked = data.api_key_masked || null;
  }).catch(() => {});
}

// ── Local mode API key ──
async function _loadLocalApiConfig() {
  if (!window.__TAURI__?.core) return;
  try {
    const cfg = await window.__TAURI__.core.invoke('get_local_api_key');
    shellState._localApiKey = cfg.api_key || '';
    shellState._localApiProvider = cfg.api_provider || 'openrouter';
  } catch {}
}
async function _saveLocalApiKey(apiKey, apiProvider) {
  if (!window.__TAURI__?.core) return;
  try {
    await window.__TAURI__.core.invoke('set_local_api_key', {
      api_key: apiKey, api_provider: apiProvider || undefined,
    });
    shellState._localApiKey = apiKey;
    shellState._localApiProvider = apiProvider;
  } catch (e) { alert('Save failed: ' + (e.message || e)); }
}
function _promptLocalApiKey() {
  const key = prompt('Enter your API key (OpenRouter / Anthropic / OpenAI):');
  if (!key || !key.trim()) return;
  _saveLocalApiKey(key.trim(), shellState._localApiProvider || 'openrouter');
}

// ── Enter app ──
async function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  const isLocal = shellState.appMode === 'local';

  if (isLocal) {
    // Local mode: hide gateway-dependent nav items
    ['dashboard','logs','billing','aiservices','admin'].forEach(p => {
      const el = document.querySelector(`[data-panel="${p}"]`);
      if (el) el.style.display = 'none';
    });
    // Hide logout button (no auth in local mode)
    const logoutBtn = document.querySelector('.action-btn.danger');
    if (logoutBtn) logoutBtn.style.display = 'none';
    // Load local API config from Tauri
    _loadLocalApiConfig();
  } else {
    // Non-blocking: filter nav items after services load
    if (typeof ServicesGuard !== 'undefined') {
      ServicesGuard.ready.then(() => {
        document.querySelectorAll('[data-service]').forEach(el => {
          const svcId = el.getAttribute('data-service');
          if (svcId && !ServicesGuard.hasService(svcId)) el.style.display = 'none';
        });
      }).catch(() => {});
    }
    // Non-blocking: load user prefs in background
    loadUserPrefs();
  }

  // 读取桌面端 App 模式（必须 await，后续 injectToken 需要 appMode）
  if (window.__TAURI__?.core) {
    try {
      shellState.appMode = await window.__TAURI__.core.invoke('get_app_mode');
    } catch {}
  }

  // 从 Stripe 付款页返回时的处理
  const urlParams = new URLSearchParams(location.search);
  const billingResult = urlParams.get('billing');
  if (billingResult === 'success') {
    switchPanel('billing');
    history.replaceState(null, '', location.pathname); // 清除 query string
    setTimeout(() => {
      const bar = document.getElementById('update-bar');
      if (bar) {
        bar.querySelector('.update-version') && (bar.querySelector('.update-version').textContent = '');
        bar.innerHTML = '<span style="color:#9dd84a">✓ 订阅成功！积分已更新，可以开始使用了。</span><button class="update-dismiss" onclick="this.parentElement.classList.add(\'hidden\')">关闭</button>';
        bar.classList.remove('hidden');
        setTimeout(() => bar.classList.add('hidden'), 6000);
      }
    }, 500);
  } else if (billingResult === 'cancel') {
    switchPanel('chat');
    history.replaceState(null, '', location.pathname);
  } else {
    switchPanel('chat');
  }
  updateThemeBtn();
  startGatewayMonitor();
  if (shellState.fileTreeOpen) toggleFileTree(true);
}

// ── Panel switching ──
function syncActivePanelsFromState() {
  const active = shellState.activePanel;
  document.querySelectorAll('.panel-frame').forEach(f => {
    const isActive = f.id === `frame-${active}`;
    f.classList.toggle('active', isActive);
    if (isActive) { f.classList.remove('fade-in'); void f.offsetWidth; f.classList.add('fade-in'); }
  });
}

function switchPanel(name) {
  if (shellState.activePanel === name && loadedPanels.has(name)) return;
  shellState.activePanel = name;
  syncActivePanelsFromState();

  if (!loadedPanels.has(name)) {
    loadedPanels.add(name);
    const frame = document.getElementById(`frame-${name}`);
    const src = frame.dataset.src;
    const loading = document.getElementById('panel-loading');
    loading.classList.remove('hidden');
    watchFrameReady(frame, name);
    frame.src = src + '#token=' + encodeURIComponent(shellState.token || '');
  } else {
    hidePanelLoading(name);
  }
}

function injectToken(frame) {
  try { frame.contentWindow.postMessage({ type: 'SHELL_TOKEN', token: shellState.token, user: shellState.currentUser, appMode: shellState.appMode }, '*'); } catch {}
}

window.addEventListener('message', (e) => {
  if (e.data?.type === 'REQUEST_TOKEN') {
    const allFrames = [
      ...document.querySelectorAll('.panel-frame'),
      document.getElementById('frame-files-tree'),
    ].filter(Boolean);
    allFrames.forEach(f => {
      try {
        if (f.contentWindow === e.source) {
          injectToken(f);
          const panelName = f.id.startsWith('frame-') ? f.id.slice('frame-'.length) : undefined;
          hidePanelLoading(panelName);
        }
      } catch {}
    });
  }
  if (e.data?.type === 'LOGOUT') logout();
  if (e.data?.type === 'relogin') { localStorage.removeItem(TOKEN_KEY); shellState.token = null; location.reload(); }
  if (e.data?.type === 'NAVIGATE') { const panel = e.data.panel; if (panel) switchPanel(panel); }
  if (e.data?.type === 'OPEN_FILE') openFileTab(e.data);
});

// ── File tabs ──
function _fileTabId(path) {
  let h = 5381;
  for (let i = 0; i < path.length; i++) h = ((h << 5) + h) ^ path.charCodeAt(i);
  return 'file_' + (h >>> 0).toString(36);
}
function getFileTab(fileId) { return shellState.fileTabs.find(t => t.id === fileId); }
function getFileTabSrc(tab) { return `/file-viewer.html?path=${encodeURIComponent(tab.path)}`; }
function getFileTabSrcByPanel(panelId) { const tab = getFileTab(panelId); return tab ? getFileTabSrc(tab) : ''; }

function openFileTab({ path, name, ext }) {
  if (!path) return;
  const fileId = _fileTabId(path);
  if (getFileTab(fileId)) { activateFileTab(fileId); return; }
  const fallbackName = path.split('/').pop() || 'Untitled';
  const normalizedExt = ext || fallbackName.split('.').pop() || '';
  shellState.fileTabs.push({ id: fileId, path, name: name || fallbackName, ext: normalizedExt });
  activateFileTab(fileId);
}
function activateFileTab(fileId) { shellState.activePanel = fileId; syncActivePanelsFromState(); }
function closeFileTab(fileId) {
  const wasActive = shellState.activePanel === fileId;
  shellState.fileTabs = shellState.fileTabs.filter(t => t.id !== fileId);
  if (wasActive) {
    const remaining = shellState.fileTabs.map(t => t.id);
    if (remaining.length > 0) activateFileTab(remaining[remaining.length - 1]);
    else switchPanel('chat');
  } else { syncActivePanelsFromState(); }
}

// ── File tree ──
const FILE_TREE_KEY = 'jw_file_tree_open';
let fileTreeLoaded = false;
function toggleFileTree(forceOpen) {
  if (!shellState.token) return;
  const isOpen = typeof forceOpen === 'boolean' ? forceOpen : !shellState.fileTreeOpen;
  shellState.fileTreeOpen = isOpen;
  localStorage.setItem(FILE_TREE_KEY, shellState.fileTreeOpen ? '1' : '0');
  if (shellState.fileTreeOpen && !fileTreeLoaded) {
    fileTreeLoaded = true;
    const frame = document.getElementById('frame-files-tree');
    frame.onload = () => { injectToken(frame); setTimeout(() => injectToken(frame), 200); };
    frame.src = '/files.html#token=' + encodeURIComponent(shellState.token || '');
  } else if (shellState.fileTreeOpen) {
    injectToken(document.getElementById('frame-files-tree'));
  }
}

// ── Tauri ──
if (window.__TAURI__) {
  window.__TAURI__.event.listen('health-status', (event) => { setGatewayStatus(event.payload.online); });
}
if (window.__TAURI__) {
  window.__TAURI__.event.listen('update-available', (event) => {
    const { version } = event.payload;
    document.getElementById('update-version').textContent = `v${version}`;
    document.getElementById('update-bar').classList.remove('hidden');
  });
}
async function doUpdate() {
  if (!window.__TAURI__) return;
  document.querySelector('.update-btn').textContent = '更新中...';
  try {
    await window.__TAURI__.core.invoke('install_update');
    document.getElementById('update-bar').classList.add('hidden');
  } catch (e) { alert('更新失败: ' + e); document.querySelector('.update-btn').textContent = '立即更新'; }
}
if (window.__TAURI__?.window) {
  try {
    const appWin = window.__TAURI__.window.getCurrentWindow();
    async function syncFullscreen() {
      const isFs = await appWin.isFullscreen();
      document.documentElement.classList.toggle('fullscreen', isFs);
    }
    syncFullscreen();
    appWin.listen('tauri://resize', syncFullscreen);
    appWin.listen('tauri://enter-full-screen', () => document.documentElement.classList.add('fullscreen'));
    appWin.listen('tauri://leave-full-screen', () => document.documentElement.classList.remove('fullscreen'));
  } catch (_) {}
}
if (window.__TAURI__?.window) {
  document.querySelector('.sidebar').addEventListener('mousedown', async (e) => {
    if (e.button !== 0) return;
    // WKWebView: SVG 子元素的 closest() 可能无法跨越 SVG-HTML 边界
    let el = e.target;
    while (el && el !== e.currentTarget) {
      if (el.matches && el.matches('button, a, input, .nav-item, .action-btn, .sidebar-footer')) return;
      el = el.parentElement || el.parentNode;
    }
    try { await window.__TAURI__.window.getCurrentWindow().startDragging(); } catch (_) {}
  });
}

if (window.Vue) {
  window.__joworkShellVue = Vue.createApp({
    setup() {
      const tl = (key) => (window.__jowork_i18n && window.__jowork_i18n[key]) || key;
      const userDisplayName = Vue.computed(() => shellState.currentUser?.name || tl('nav.loading'));
      const userInitial = Vue.computed(() => (shellState.currentUser?.name?.charAt(0) || '?').toUpperCase());
      Vue.watch(() => shellState.activePanel, () => { syncActivePanelsFromState(); });
      function localLoginVue() {
        return localLogin({ username: loginForm.username, display_name: loginForm.displayName });
      }
      function onNavClick(panel) { if (!shellState.token) return; switchPanel(panel); }
      function onToggleFileTree() { return toggleFileTree(); }
      function onFileTabClick(fileId, event) {
        if (event?.target?.classList?.contains('panel-tab-close')) return closeFileTab(fileId);
        return activateFileTab(fileId);
      }
      function onFileFrameLoad(event) {
        const frame = event?.target;
        if (!frame) return;
        injectToken(frame);
        setTimeout(() => injectToken(frame), 200);
      }
      function fileTabIcon(ext) {
        const normalized = String(ext || '').toLowerCase();
        return normalized === 'md' || normalized === 'markdown' ? '📝' : '🌐';
      }
      function fileTabSrc(tab) { return getFileTabSrc(tab); }
      function doCheckGateway() { checkGatewayStatus(); }
      return {
        shellState, loginForm, localLoginVue, onNavClick, onToggleFileTree,
        userDisplayName, userInitial, onFileTabClick, onFileFrameLoad, fileTabIcon, fileTabSrc,
        doCheckGateway, updatePref, tl,
      };
    },
    data() { return { bootedAt: Date.now() }; },
  }).mount('#shell-root');
}
</script>
<script src="/feedback-widget.js"></script>
<script>
// ── macOS 窗口失焦变暗 ──
(function() {
  window.addEventListener('focus', () => document.documentElement.classList.remove('window-inactive'));
  window.addEventListener('blur',  () => document.documentElement.classList.add('window-inactive'));
})();

// ── NSVisualEffectView vibrancy 检测 ──
(function() {
  if (!window.__TAURI__) return;
  window.__TAURI__.core.invoke('is_vibrancy_active').then(active => {
    if (active) document.documentElement.setAttribute('data-vibrancy', '');
  }).catch(() => {});
})();

// ── 菜单栏事件处理 ──
(function() {
  if (!window.__TAURI__) return;
  window.__TAURI__.event.listen('menu-action', ({ payload }) => {
    if (payload === 'toggle_sidebar') {
      if (typeof toggleSidebar === 'function') toggleSidebar();
    }
  });
})();

// ── 右键菜单：shell 层（侧边栏 + 空白区域）──
(function() {
  if (!window.__TAURI__) return;
  const invoke = window.__TAURI__.core.invoke;
  const listen = window.__TAURI__.event.listen;

  document.addEventListener('contextmenu', e => {
    e.preventDefault();
    // iframe 内部的 contextmenu 不会冒泡到这里，各页面自己处理

    // 可编辑区（如搜索框）→ 原生 Cut/Copy/Paste
    if (e.target.closest('input, textarea, [contenteditable]')) {
      invoke('show_context_menu', { contextType: 'editable', data: null });
      return;
    }

    // 有文字选中 → 原生 Copy
    const sel = window.getSelection()?.toString().trim();
    if (sel) {
      invoke('show_context_menu', { contextType: 'selection', data: { text: sel } });
      return;
    }
    // 其他区域：仅拦截不展示菜单（消除浏览器默认菜单即可）
  });

  listen('context-menu-action', ({ payload }) => {
    if (payload.action === 'copy_sel' && payload.data?.text) {
      navigator.clipboard.writeText(payload.data.text);
    }
  });
})();
</script>
