<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订阅与计划</title>
<link rel="stylesheet" href="/styles/tokens.css">
<script src="/theme.js"></script>
<script src="/i18n.js"></script>
<script src="/friendly-error.js"></script>
<script src="/tauri-bridge.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg, #0f0f12);
  color: var(--text, #e8e8e8);
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
  font-size: 14px;
  padding: 40px 48px 60px;
  max-width: 960px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.subtitle {
  color: var(--text2, #888);
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 40px;
}

/* Current plan card */
.current-plan-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 24px 28px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.plan-badge {
  background: var(--accent, #9dd84a);
  color: #111;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.plan-badge.free { background: var(--border); color: var(--text2, #888); }
.credits-section { flex: 1; min-width: 200px; }
.credits-label { font-size: 12px; color: var(--text2, #888); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 8px; }
.credits-bar-wrap { background: rgba(255,255,255,0.07); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 6px; }
.credits-bar { height: 100%; border-radius: 4px; background: var(--accent, #9dd84a); transition: width 0.4s; }
.credits-bar.warn { background: #f59e0b; }
.credits-bar.danger { background: #ef4444; }
.credits-text { font-size: 13px; color: var(--text2, #888); }
.plan-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
  font-family: inherit;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--accent, #9dd84a); color: #111; }
.btn-secondary { background: rgba(255,255,255,0.08); color: var(--text, #e8e8e8); border: 0.5px solid var(--border); }
[data-theme="light"] .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); }

/* Billing cycle toggle */
.billing-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  font-size: 13px;
}
.toggle-wrap {
  display: flex;
  background: rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 3px;
}
.toggle-btn {
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text2, #888);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.15s;
}
.toggle-btn.active {
  background: var(--surface2);
  color: var(--text, #e8e8e8);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.save-badge {
  background: #22c55e;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 12px;
}

/* Pricing cards */
.plans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.plan-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  transition: border-color 0.2s;
}
.plan-card.current { border-color: var(--accent, #9dd84a); }
.plan-card.popular::before {
  content: '最受欢迎';
  position: absolute;
  top: -11px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent, #9dd84a);
  color: #111;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 12px;
  border-radius: 12px;
}
.plan-name { font-size: 16px; font-weight: 600; }
.plan-price { font-size: 32px; font-weight: 700; line-height: 1; }
.plan-price span { font-size: 13px; font-weight: 400; color: var(--text2, #888); }
.plan-credits { font-size: 13px; color: var(--text2, #888); }
.plan-divider { height: 0.5px; background: var(--border); }
.plan-features {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 1;
}
.plan-features li {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text2, #888);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}
.plan-features li::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent, #9dd84a);
  flex-shrink: 0;
}
.plan-features li.locked { color: rgba(255,255,255,0.25); }
.plan-features li.locked::before { background: rgba(255,255,255,0.15); }
.btn-plan { width: 100%; margin-top: auto; }
.btn-plan.current-plan {
  background: rgba(157,216,74,0.1);
  color: var(--accent, #9dd84a);
  border: 1px solid rgba(157,216,74,0.25);
  cursor: default;
}

/* Info box */
.info-box {
  background: rgba(157,216,74,0.07);
  border: 1px solid rgba(157,216,74,0.2);
  border-radius: 14px;
  padding: 20px 24px;
  font-size: 14px;
  color: var(--text2, #888);
  line-height: 1.6;
}

/* Loading */
.loading { color: var(--text2, #888); font-size: 14px; }

/* Stripe disabled notice */
.stripe-disabled {
  background: rgba(255,255,255,0.04);
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 20px 24px;
  font-size: 14px;
  color: var(--text2, #888);
  text-align: center;
}
</style>
</head>
<body>
<h1>订阅与计划</h1>
<p class="subtitle">管理你的 JoWork 订阅</p>

<div id="current-plan-section" class="loading">加载中...</div>

<div class="billing-toggle" id="billing-toggle" style="display:none">
  <div class="toggle-wrap">
    <button class="toggle-btn active" id="btn-monthly" onclick="setBillingCycle('monthly')">月付</button>
    <button class="toggle-btn" id="btn-annual" onclick="setBillingCycle('annual')">年付 <span class="save-badge">省 30%</span></button>
  </div>
</div>

<div class="plans-grid" id="plans-grid"></div>

<div id="extra-info"></div>

<script>
const API = '';
let token = localStorage.getItem('jowork_token');

// 接收 shell 注入的 token
window.addEventListener('message', (e) => {
  if (e.data?.type === 'SHELL_TOKEN') {
    if (e.data.appMode === 'local') {
      document.getElementById('current-plan-section').innerHTML = '<div class="info-box" style="text-align:center;padding:32px 16px;font-size:var(--font-h3, 15px)">本地模式 — 使用你自己的 API Key，无需订阅</div>';
      initDone = true;
      return;
    }
    if (e.data.token) {
      token = e.data.token;
      localStorage.setItem('jowork_token', token);
      if (!initDone) init();
    }
  }
});

// 向 shell 请求 token（首次加载时）
if (!token && window.parent !== window) {
  window.parent.postMessage({ type: 'REQUEST_TOKEN' }, '*');
}

let billingCycle = 'monthly';
let currentPlan = 'free';
let stripeEnabled = false;
let prices = [];
let balance = { total: 0, used: 0, remaining: 0 };
let initDone = false;

const PLAN_META = {
  free:            { name: '免费版',   order: 0, credits: 100,  popular: false },
  personal_basic:  { name: '基础版',   order: 1, credits: 500,  popular: false },
  personal_pro:    { name: '专业版',   order: 2, credits: 2000, popular: true  },
  personal_max:    { name: '旗舰版',   order: 3, credits: 8000, popular: false },
};

const PLAN_FEATURES = {
  free:            ['100 积分 / 月', '基础 AI 对话', '3 个数据源'],
  personal_basic:  ['500 积分 / 月', '高级搜索', 'MCP 工具', '5 个数据源'],
  personal_pro:    ['2,000 积分 / 月', '自动化任务', '代码提交', '代码工作区', '无限数据源'],
  personal_max:    ['8,000 积分 / 月', '全部功能', '优先支持', '无限数据源'],
};

const PLAN_LOCKED = {
  free:            ['高级搜索', 'MCP 工具', '自动化任务'],
  personal_basic:  ['自动化任务', '代码提交', '代码工作区'],
  personal_pro:    [],
  personal_max:    [],
};

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    signal: AbortSignal.timeout(8000),
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error(friendlyHttpStatus(res.status));
  return res.json();
}

function setBillingCycle(cycle) {
  billingCycle = cycle;
  document.getElementById('btn-monthly').classList.toggle('active', cycle === 'monthly');
  document.getElementById('btn-annual').classList.toggle('active', cycle === 'annual');
  renderPlans();
}

function getPrice(planId) {
  const suffix = billingCycle === 'annual' ? '_y' : '_m';
  const key = planId.replace('personal_', 'price_') + suffix;
  const match = prices.find(p => p.id === key);
  return match || null;
}

function formatPrice(cents, cycle) {
  if (cents === 0) return '免费';
  const dollars = (cents / 100).toFixed(0);
  return '$' + dollars + (cycle === 'annual' ? ' / 年' : ' / 月');
}

function renderCurrentPlan() {
  const section = document.getElementById('current-plan-section');
  const meta = PLAN_META[currentPlan] || { name: currentPlan, credits: 0 };
  const pct = balance.total > 0 ? Math.min((balance.used / balance.total) * 100, 100) : 0;
  const barClass = pct > 90 ? 'danger' : pct > 70 ? 'warn' : '';
  const isFree = currentPlan === 'free';

  section.innerHTML = `
    <div class="current-plan-card">
      <div>
        <div style="font-size:var(--font-xs, 11px);color:var(--text2);margin-bottom:6px">当前计划</div>
        <span class="plan-badge ${isFree ? 'free' : ''}">${meta.name}</span>
      </div>
      ${balance.total > 0 ? `
      <div class="credits-section">
        <div class="credits-label">本月积分用量</div>
        <div class="credits-bar-wrap">
          <div class="credits-bar ${barClass}" style="width:${pct}%"></div>
        </div>
        <div class="credits-text">${balance.used.toLocaleString()} / ${balance.total.toLocaleString()} 积分已使用（剩余 ${balance.remaining.toLocaleString()}）</div>
      </div>
      ` : '<div class="credits-section"><div class="credits-text" style="color:var(--text2)">积分不限</div></div>'}
      <div class="plan-actions">
        ${!isFree && stripeEnabled ? `<button class="btn btn-secondary" onclick="openPortal()">管理订阅</button>` : ''}
        ${isFree ? `<button class="btn btn-primary" onclick="document.getElementById('billing-toggle').scrollIntoView({behavior:'smooth'})">查看升级方案</button>` : ''}
      </div>
    </div>
  `;
}

function renderPlans() {
  const grid = document.getElementById('plans-grid');
  const plans = Object.entries(PLAN_META).sort((a, b) => a[1].order - b[1].order);

  grid.innerHTML = plans.map(([planId, meta]) => {
    const isCurrent = planId === currentPlan;
    const priceObj = planId === 'free' ? null : getPrice(planId);
    const priceText = planId === 'free' ? '免费' : (priceObj ? formatPrice(priceObj.amount_cents, billingCycle) : '—');
    const features = PLAN_FEATURES[planId] || [];
    const locked = PLAN_LOCKED[planId] || [];

    const btnText = isCurrent ? '当前计划' : '升级';
    const btnClass = isCurrent ? 'btn btn-plan current-plan' : 'btn btn-plan btn-primary';
    const canUpgrade = !isCurrent && stripeEnabled && priceObj?.stripe_price_id;

    return `
      <div class="plan-card ${isCurrent ? 'current' : ''} ${meta.popular ? 'popular' : ''}">
        <div>
          <div class="plan-name">${meta.name}</div>
        </div>
        <div class="plan-price">${priceText.replace(' / 月','').replace(' / 年','')}<span>${planId === 'free' ? '' : (billingCycle === 'annual' ? ' / 年' : ' / 月')}</span></div>
        <div class="plan-credits">${meta.credits ? meta.credits.toLocaleString() + ' 积分 / 月' : '不限积分'}</div>
        <div class="plan-divider"></div>
        <ul class="plan-features">
          ${features.map(f => `<li>${f}</li>`).join('')}
          ${locked.map(f => `<li class="locked">${f}</li>`).join('')}
        </ul>
        <button class="${btnClass}" ${isCurrent ? 'disabled' : ''} onclick="${canUpgrade ? `checkout('${priceObj?.id}')` : 'showStripeDisabled()'}">
          ${btnText}
        </button>
      </div>
    `;
  }).join('');
}

async function checkout(priceId) {
  try {
    const { url } = await apiFetch('/api/billing/checkout', {
      method: 'POST',
      body: JSON.stringify({ price_id: priceId })
    });
    window.open(url, '_blank');
  } catch (e) {
    console.error('[billing] checkout failed:', e);
    alert(friendlyError(e, '创建支付链接失败'));
  }
}

async function openPortal() {
  try {
    const { url } = await apiFetch('/api/billing/portal', { method: 'POST' });
    window.open(url, '_blank');
  } catch (e) {
    console.error('[billing] openPortal failed:', e);
    alert(friendlyError(e, '打开管理页面失败'));
  }
}

function showStripeDisabled() {
  document.getElementById('extra-info').innerHTML = `
    <div class="stripe-disabled">
      付款功能尚未配置（Stripe 未接入）。如需升级，请联系管理员。
    </div>
  `;
}

async function init() {
  initDone = true;
  if (!token) {
    document.getElementById('current-plan-section').textContent = '请先登录';
    return;
  }
  // Render cached billing data immediately
  try {
    const cached = localStorage.getItem('_billing_cache');
    if (cached) {
      const c = JSON.parse(cached);
      currentPlan = c.plan || 'free';
      stripeEnabled = c.stripeEnabled || false;
      prices = c.prices || [];
      balance = c.balance || { total: 0, used: 0, remaining: 0 };
      renderCurrentPlan();
      renderPlans();
      document.getElementById('billing-toggle').style.display = stripeEnabled ? 'flex' : 'none';
    }
  } catch {}
  // Async refresh from API
  try {
    const [planData, creditsData, pricesData] = await Promise.all([
      apiFetch('/api/billing/plan'),
      apiFetch('/api/billing/credits'),
      apiFetch('/api/billing/prices'),
    ]);

    currentPlan = planData.plan || 'free';
    stripeEnabled = pricesData.stripe_enabled || false;
    prices = pricesData.prices || [];
    balance = creditsData;

    renderCurrentPlan();
    renderPlans();

    document.getElementById('billing-toggle').style.display = stripeEnabled ? 'flex' : 'none';

    // Cache for next load
    try { localStorage.setItem('_billing_cache', JSON.stringify({ plan: currentPlan, stripeEnabled, prices, balance })); } catch {}

    if (!stripeEnabled) {
      document.getElementById('extra-info').innerHTML = `
        <div class="info-box">
          当前为本地部署版本，付款功能尚未启用。积分与功能限制仍然生效，付款接入后可自动解锁对应计划。
        </div>
      `;
    }
  } catch (e) {
    console.error('[billing] init failed:', e);
    // Only show error if we have no cached data
    if (!localStorage.getItem('_billing_cache')) {
      document.getElementById('current-plan-section').textContent = friendlyError(e, '加载失败');
    }
  }
}

if (token) init();
</script>
</body>
</html>
